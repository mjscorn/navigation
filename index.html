<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nav A</title>
<link rel="icon" type="image/svg+xml" href="favicon-skull.svg?v=3" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; }
  .nav-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .nav-scroll { scrollbar-width: none; }
  .canvas-widget-scroll::-webkit-scrollbar { width: 6px; }
  .canvas-widget-scroll::-webkit-scrollbar-track { background: transparent; }
  .canvas-widget-scroll::-webkit-scrollbar-thumb { background: rgba(43, 49, 53, 0.14); border-radius: 999px; }
  .canvas-widget-scroll { scrollbar-width: thin; scrollbar-color: rgba(43, 49, 53, 0.14) transparent; }
  .dropdown-scroll::-webkit-scrollbar { width: 4px; }
  .dropdown-scroll::-webkit-scrollbar-track { background: transparent; }
  .dropdown-scroll::-webkit-scrollbar-thumb { background: #d0d7dc; border-radius: 4px; }
  .dropdown-scroll::-webkit-scrollbar-thumb:hover { background: #b0bac0; }
  .company-dd--dark.dropdown-scroll { scrollbar-color: rgba(255,255,255,0.28) transparent; }
  .company-dd--dark.dropdown-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.22); }
  .company-dd--dark.dropdown-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.34); }
  .company-dd--dark input::placeholder { color: #8B9499; opacity: 1; }
  @keyframes dropIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes navFlyoutExpand {
    from { opacity: 0; transform: scale(0.86); clip-path: inset(0 100% 100% 0 round 8px); }
    to { opacity: 1; transform: scale(1); clip-path: inset(0 0 0 0 round 8px); }
  }
  @keyframes tooltipIn { from { opacity: 0; } to { opacity: 1; } }
  .a-company-switcher-slot {
    transition: opacity 220ms cubic-bezier(0.2, 0.8, 0.2, 1), transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1), max-height 220ms cubic-bezier(0.2, 0.8, 0.2, 1), padding 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
    will-change: opacity, transform;
  }
  /* Profile flyout — stroked Sign out button */
  .profile-flyout-outline-btn:hover { background-color: rgba(22, 88, 122, 0.08) !important; }
  /* Profile flyout — borderless Privacy / Give feedback (same hover fill as Sign out, no stroke) */
  .profile-flyout-ghost-btn {
    transition: background-color 120ms ease;
    border-radius: 6px;
  }
  .profile-flyout-ghost-btn:hover { background-color: rgba(22, 88, 122, 0.08) !important; }
  .profile-flyout-row-btn {
    transition: background-color 120ms ease;
    width: calc(100% - 8px) !important;
    margin-left: 4px;
    margin-right: 4px;
    border-radius: 6px;
    box-sizing: border-box;
  }
  .profile-flyout-row-btn:hover { background-color: rgba(22, 88, 122, 0.08) !important; }
  .profile-flyout-row-label {
    min-width: 0;
    flex: 1;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .profile-flyout-row-btn--bookmarkable .profile-flyout-row-label {
    /* Keep label truncation stable by reserving a fixed icon slot in row layout. */
    min-width: 0;
  }
  .profile-flyout-shortcut-star {
    position: static;
    width: 18px;
    height: 18px;
    margin-left: 8px;
    flex: 0 0 18px;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 120ms ease;
  }
  .profile-flyout-row-btn:hover .profile-flyout-shortcut-star {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }
  .profile-flyout-link-btn { border-radius: 4px; transition: background-color 120ms ease; }
  .profile-flyout-link-btn:hover { background-color: rgba(22, 88, 122, 0.08) !important; }
  .profile-flyout-icon-btn { border-radius: 4px; transition: background-color 120ms ease; }
  .profile-flyout-icon-btn:hover { background-color: rgba(22, 88, 122, 0.08) !important; }
  .profile-flyout-header-btn { border-radius: 4px; transition: background-color 120ms ease; }
  .profile-flyout-header-btn:hover { background-color: rgba(22, 88, 122, 0.08) !important; }

  /* —— Customize modal (from responsive-nav.html) —— */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:5000;display:none;align-items:center;justify-content:center;padding:clamp(16px,4vh,40px)}
  .modal-overlay.open{display:flex}
  .global-nav-search-input::placeholder{color:var(--global-search-placeholder,#859299);opacity:1}
  .global-nav-search-result{border:none;outline:none;box-shadow:none;cursor:pointer;padding:8px 4px;background:transparent;font:inherit;color:inherit}
  .global-nav-search-result:focus,.global-nav-search-result:focus-visible{outline:none;box-shadow:none}
  .global-nav-search-result--focused{background-color:var(--global-search-focus-bg,rgba(22,88,122,0.08))!important}
  .modal{background:#fff;border:1px solid #e2e9ed;border-radius:8px;box-shadow:0 2px 8px rgba(76,85,91,.2);width:100%;max-width:720px;max-height:100%;display:flex;flex-direction:column;overflow:hidden;font-family:'Avenir Next','Avenir Next forINTUIT',-apple-system,BlinkMacSystemFont,system-ui,sans-serif}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:24px 24px 0 24px;flex-shrink:0}
  .modal-title{font-size:28px;font-weight:500;color:#2B3135;line-height:1.3}
  .modal-close{width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:none;background:none;border-radius:4px}
  .modal-close:hover{background:rgba(0,0,0,.06)}
  .modal-close svg{width:16px;height:16px}
  .modal-mid{display:flex;gap:24px;flex:1;overflow:hidden;padding:24px;min-height:0;align-items:stretch}
  .modal-sidebar{display:flex;flex-direction:column;gap:4px;flex-shrink:0;width:200px;position:sticky;top:0}
  .sidebar-item{height:36px;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:14px;font-weight:400;color:#2B3135;cursor:pointer;line-height:1.3;border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
  .sidebar-item.act{font-weight:500;background:rgba(133,146,153,.2)}
  .sidebar-item:hover:not(.act){background:rgba(0,0,0,.04)}
  .sidebar-item-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#2B3135}
  .modal-content{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:24px;padding:1px 30px 1px 1px;min-height:0;scrollbar-width:thin;scrollbar-color:transparent transparent}
  .modal-content:hover,.modal-content:focus-within{scrollbar-color:#c3ced5 transparent}
  .modal-content::-webkit-scrollbar{width:6px}
  .modal-content::-webkit-scrollbar-thumb{background:transparent;border-radius:3px;transition:background .2s ease}
  .modal-content:hover::-webkit-scrollbar-thumb,.modal-content:focus-within::-webkit-scrollbar-thumb{background:#c3ced5}
  .section-title{font-size:16px;font-weight:500;color:#2B3135;line-height:1.5}
  .section-title--sticky{position:sticky;top:-1px;z-index:2;background:#fff;margin-top:-1px;padding-top:9px;padding-bottom:8px}
  .section-desc{font-size:16px;font-weight:400;color:#2B3135;line-height:1.5;margin-top:4px}
  .section-with-switch{display:flex;align-items:flex-start;gap:12px}
  .section-with-switch-text{flex:1;min-width:0}
  .setting-switch{position:relative;width:44px;height:24px;border-radius:12px;border:none;padding:0;cursor:pointer;background:#babec5;transition:background 150ms ease;flex-shrink:0}
  .setting-switch--compact{width:36px;height:20px;border-radius:10px}
  .setting-switch.on{background:rgba(22,88,122,0.80)}
  .appearance-radios input[type="radio"]{accent-color:rgba(22,88,122,0.80)}
  .setting-switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform 150ms ease;box-shadow:0 1px 2px rgba(0,0,0,0.15)}
  .setting-switch--compact::after{width:16px;height:16px}
  .setting-switch.on::after{transform:translateX(20px)}
  .setting-switch--compact.on::after{transform:translateX(16px)}
  .section-behavior-radios{display:flex;flex-direction:column;gap:16px;margin-top:16px}
  .section-behavior-radio{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:2px 0;border:none;background:transparent;width:100%;text-align:left;font:inherit}
  .section-behavior-radio:hover{opacity:.85}
  .section-behavior-radio-label{font-size:16px;font-weight:400;color:#2B3135;line-height:1.3}
  .section-behavior-radio-dot{width:20px;height:20px;border-radius:50%;border:2px solid #8a9499;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .section-behavior-radio-dot.on{border-color:rgba(22,88,122,0.80)}
  .section-behavior-radio-dot.on::after{content:'';width:10px;height:10px;border-radius:50%;background:rgba(22,88,122,0.80)}
  .illus-cards{display:flex;gap:24px;margin-top:16px}
  .illus-card{flex:1;border-radius:8px;overflow:hidden;cursor:pointer;border:none;background:transparent;padding:0;font:inherit;text-align:left}
  .illus-card .card-radio{padding:12px;display:flex;align-items:center;gap:8px;font-size:16px;font-weight:400;color:#2B3135;line-height:1.3}
  .illus-card.sel .card-radio{background:rgba(0,133,109,.1);border:1px solid #003e31;border-bottom:none;border-radius:8px 8px 0 0}
  .illus-card:not(.sel) .card-radio{border:1px solid #c3ced5;border-bottom:none;border-radius:8px 8px 0 0}
  .illus-card .card-vis{height:160px;background:#f8fafb;display:flex;align-items:flex-end;justify-content:center;padding-bottom:0;overflow:hidden}
  .illus-card.sel .card-vis{border:1px solid #003e31;border-top:none;border-radius:0 0 8px 8px}
  .illus-card:not(.sel) .card-vis{border:1px solid #c3ced5;border-top:none;border-radius:0 0 8px 8px}
  @media(max-width:860px){
    .illus-cards{flex-direction:column;gap:16px}
    .illus-card{display:flex;flex-direction:row;flex:none;overflow:hidden;border-radius:8px;border:1px solid #c3ced5}
    .illus-card.sel{border-color:#003e31}
    .illus-card .card-radio{border-radius:0;border:none;min-width:140px;flex-shrink:0}
    .illus-card.sel .card-radio{background:rgba(0,133,109,.1);border:none;border-radius:0}
    .illus-card:not(.sel) .card-radio{border:none;border-radius:0}
    .illus-card .card-vis{border-radius:0;border:none;border-left:1px solid #c3ced5;height:80px;min-height:80px;flex:1;align-items:flex-start;justify-content:center;padding-top:20px;padding-bottom:0;overflow:hidden}
    .illus-card.sel .card-vis{border-left-color:#003e31;border-radius:0}
    .illus-card:not(.sel) .card-vis{border-radius:0}
    .illus-card .card-vis .layout-vis{transform:scale(.5);transform-origin:top center}
  }
  .radio-dot{width:20px;height:20px;border-radius:50%;border:2px solid #8a9499;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .radio-dot.on{border-color:#003e31}
  .radio-dot.on::after{content:'';width:10px;height:10px;border-radius:50%;background:#003e31}
  .appearance-radios{display:flex;flex-direction:column;gap:16px;margin-top:16px}
  .app-radio{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:2px 0;border:none;background:transparent;width:100%;text-align:left;font:inherit}
  .app-radio:hover{opacity:.85}
  .app-radio-text{display:flex;flex-direction:column;gap:2px}
  .app-radio-label{font-size:16px;font-weight:400;color:#2B3135;line-height:1.3}
  .radio-indent{padding-left:34px;display:none;align-items:center;gap:8px;cursor:pointer;margin-top:-4px;border:none;background:transparent;width:100%;text-align:left;font:inherit}
  .radio-indent.vis{display:flex}
  .checkbox-box{width:20px;height:20px;border-radius:4px;border:2px solid #8a9499;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .checkbox-box.on{background:#003e31;border-color:#003e31}
  .checkbox-box.on::after{content:'';display:block;width:10px;height:6px;border-left:2px solid white;border-bottom:2px solid white;transform:rotate(-45deg) translateY(-1px)}
  .checkbox-label{font-size:16px;font-weight:400;color:#2B3135;line-height:1.3}
  .app-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .app-list-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:transparent;transition:background-color .1s ease}
  .app-list-item--pinned-l0{position:relative;min-height:40px;box-sizing:border-box}
  .app-list-item--pinned-l0.has-row-actions{padding-right:142px}
  .app-list-item--pinned-l0 .app-list-row-actions{position:absolute;right:10px;top:50%;transform:translateY(-50%);margin-left:0;width:132px;justify-content:flex-end}
  .app-list-item:hover{background:rgba(133,146,153,.16)}
  .app-list-item--no-drop-hover:hover{background:transparent}
  .app-list-grip{width:20px;height:20px;display:flex;align-items:center;justify-content:center;opacity:.4;flex-shrink:0}
  .app-list-grip svg{width:20px;height:20px}
  .app-list-l1-group .app-list-grip{opacity:1}
  .app-list-check{width:20px;height:20px;flex-shrink:0}
  .app-list-check img{width:20px;height:20px}
  .app-list-icon{width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:visible}
  .app-list-icon img{width:20px;height:20px;object-fit:contain;flex-shrink:0}
  .app-list-name{font-size:16px;font-weight:400;color:#2B3135;line-height:1.5}
  .app-list--single-app-icon .app-list-item{align-items:center}
  .app-list--single-app-icon .app-list-icon{flex-shrink:0}
  .app-list-row-actions{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
  .app-list-edit-btn{opacity:0;transition:opacity 150ms ease}
  .app-list-item:hover .app-list-edit-btn,.app-list-item.is-editing-l1 .app-list-edit-btn{opacity:1}
  .app-list-item--l1{margin-left:28px}
  .app-list-l1-default-label{font-size:12px;font-weight:400;color:#6A737A;line-height:1.5;white-space:nowrap;flex-shrink:0;margin-left:auto}
  .app-list-l1-group{display:flex;flex-direction:column;gap:4px;padding:2px 0 8px}
  .app-list-icon-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:4px;color:#8A9499;cursor:pointer;padding:0;flex-shrink:0}
  .app-list-icon-btn:hover{background:rgba(22,88,122,0.08);color:#2B3135}
  .modal-footer{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:24px;border-top:1px solid #e2e9ed;flex-shrink:0}
  .modal-footer-right{display:flex;align-items:center;gap:8px}
  .btn-tertiary{padding:6px 12px;border-radius:4px;font-size:13px;font-weight:400;color:#16587A;background:none;border:none;cursor:pointer;line-height:1.3;font-family:inherit}
  .btn-tertiary:hover{background:rgba(22,88,122,0.08)}
  .btn-modal-primary{height:32px;padding:0 12px;border-radius:6px;font-size:13px;font-weight:400;color:#FFFFFF;background:rgba(22,88,122,0.80);border:none;cursor:pointer;line-height:1.3;font-family:inherit;display:flex;align-items:center}
  .btn-modal-primary:hover{background:rgba(22,88,122,0.85)}
  .btn-modal-secondary{height:32px;padding:0 12px;border-radius:6px;font-size:13px;font-weight:400;color:#16587A;background:transparent;border:1px solid rgba(22,88,122,0.80);cursor:pointer;line-height:1.3;font-family:inherit;display:flex;align-items:center}
  .btn-modal-secondary:hover{background:rgba(22,88,122,0.08)}
  .btn-modal-secondary-sm{height:28px;padding:0 10px;border-radius:6px;font-size:12px;font-weight:400;color:#16587A;background:transparent;border:1px solid rgba(22,88,122,0.80);cursor:pointer;line-height:1.3;font-family:'Avenir Next','Avenir Next forINTUIT',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;display:flex;align-items:center;flex-shrink:0;white-space:nowrap}
  .btn-modal-secondary-sm:hover{background:rgba(22,88,122,0.08)}
  .btn-primary{padding:6px 12px;border-radius:4px;font-size:16px;font-weight:300;color:#FFFFFF;background:rgba(22,88,122,0.80);border:none;cursor:pointer;line-height:1.3;font-family:inherit}
  .btn-primary:hover{background:rgba(22,88,122,0.85)}
  .layout-vis{width:220px;height:130px;background:#f0f4f6;border:1px solid #e2e9ed;border-radius:2px;position:relative;overflow:hidden;margin:0 auto -1px}
  .lv-rail{position:absolute;left:3px;top:6px;display:flex;flex-direction:column;gap:4.8px;align-items:flex-start}
  .lv-dot{width:6px;height:6px;border-radius:999px;background:#d5dee3;flex-shrink:0}
  .lv-dot.logo{background:none;border-radius:2px;overflow:hidden}
  .lv-dot.logo img{width:6px;height:6px;display:block}
  .lv-divider{width:6px;height:1px;background:#e2e9ed}
  .lv-app-row{display:flex;align-items:center;gap:2.5px}
  .lv-app-text{height:3px;border-radius:1px;background:#f0f4f6}
  .lv-body{position:absolute;right:2px;top:2px;bottom:0;background:white;border-radius:2px 2px 0 0}
  .lv-header-line{position:absolute;top:16px;height:1px;background:#e2e9ed}
  .lv-header-text{position:absolute;top:6px;height:6px;border-radius:1px;background:#f0f4f6}
  .lv-content-box{position:absolute;border-radius:4px;background:#f0f4f6}
  .lv-vdivider{position:absolute;width:1px;background:#e2e9ed}

  /* —— Keyboard shortcuts pane (customize modal) —— */
  .kb-intro{font-size:14px;font-weight:400;color:#6b7280;line-height:1.4;margin:0}
  .kb-search{display:flex;align-items:center;gap:8px;height:36px;border:1px solid #c3ced5;border-radius:8px;padding:0 12px;background:#fff;box-sizing:border-box}
  .kb-search:focus-within{border-color:rgba(22,88,122,0.80)}
  .kb-search svg{width:14px;height:14px;flex-shrink:0;color:#6b7280}
  .kb-search input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-family:inherit;font-size:14px;color:#2B3135}
  .kb-scroll{display:flex;flex-direction:column;gap:8px;flex:1;min-height:0;overflow-y:auto;scrollbar-gutter:stable;padding:1px 4px 1px 1px;scrollbar-width:thin;scrollbar-color:transparent transparent}
  .kb-scroll::-webkit-scrollbar{width:6px}
  .kb-scroll::-webkit-scrollbar-thumb{background:transparent;border-radius:3px;transition:background .2s ease}
  .kb-scroll.kb-scroll--scrolling{scrollbar-color:#c3ced5 transparent}
  .kb-scroll.kb-scroll--scrolling::-webkit-scrollbar-thumb{background:#c3ced5}
  .kb-group{display:flex;flex-direction:column}
  .kb-group-header{display:flex;align-items:center;gap:6px;padding:8px 4px;border:none;background:transparent;cursor:pointer;font-family:inherit;width:100%;text-align:left}
  .kb-group-header:hover{background:rgba(0,0,0,.03);border-radius:6px}
  .kb-group-chevron{width:16px;height:16px;flex-shrink:0;color:#6b7280;transition:transform .15s ease}
  .kb-group-chevron.open{transform:rotate(90deg)}
  .kb-group-title{font-size:14px;font-weight:500;color:#2B3135;line-height:1.3}
  .kb-row{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:36px;padding:4px 8px 4px 26px;border-radius:6px}
  .kb-row:hover{background:rgba(0,0,0,.03)}
  .kb-row-label{font-size:14px;font-weight:400;color:#2B3135;line-height:1.4;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .kb-recorder-controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .kb-recorder-error{font-size:12px;font-weight:400;color:#B0203C;line-height:1.3;white-space:nowrap}
  .kb-recorder-btn{height:28px;padding:0 10px;border-radius:6px;border:1px solid #c3ced5;background:#fff;font-family:inherit;font-size:12px;font-weight:400;color:#16587A;cursor:pointer;line-height:1.3;white-space:nowrap}
  .kb-recorder-btn:hover{background:#f8fafb}
  .kb-recorder-btn-recording{border-color:rgba(22,88,122,0.80);background:rgba(22,88,122,0.08);color:#16587A}
  .kb-kbd{height:28px;min-width:36px;padding:0 10px;border-radius:6px;border:1px solid #c3ced5;background:#f8fafb;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;font-weight:500;color:#2B3135;cursor:pointer;line-height:1.3;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap}
  .kb-kbd:hover{border-color:rgba(22,88,122,0.80)}
  .kb-clear-btn{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:4px;cursor:pointer;color:#6b7280}
  .kb-clear-btn:hover{background:rgba(0,0,0,.06);color:#2B3135}

        ))}
      </div>
      <div style={{ padding: "8px 12px", borderTop: "1px solid #eef1f3", backgroundColor: "white", flexShrink: 0 }}>
        <button
          type="button"
          onClick={() => onClose()}
          style={{
            width: "100%",
            cursor: "pointer",
            border: "none",
            background: "transparent",
            fontFamily: FONT,
            fontWeight: 500,
            fontSize: 13,
            lineHeight: 1.3,
            color: shell.isNazgul ? "#FFFFFF" : TEXT_PRIMARY,
            textAlign: "left",
            padding: "4px 0",
            display: "flex",
            alignItems: "center",
            gap: 4,
          }}
        >
          <AddShortcutPlusIcon size={14} />
          <span>Add shortcut</span>
        </button>
      </div>
    </div>
  );

  if (typeof ReactDOM.createPortal === "function") {
    return ReactDOM.createPortal(menu, document.body);
  }
  return menu;
}

// ═══════════════════════════════════
// Collapse Handle — Stripe-style
// ═══════════════════════════════════
function CollapseHandle({ collapsed, onToggle }) {

  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      onClick={onToggle}

        top: 0,

        height: "100%",

        justifyContent: "flex-start",

      {/* The thin bar — morphs to pill with chevron, expands left→right */}
      <div style={{
        width: hovered ? 20 : 3,
        height: hovered ? 28 : 32,
        borderRadius: hovered ? 10 : 2,
        backgroundColor: "#d0d7dc",
        opacity: hovered ? 1 : 0.5,
        transition: `all 200ms cubic-bezier(0.4, 0, 0.2, 1)`,

// ═══════════════════════════════════
// Company Switcher
// ═══════════════════════════════════
function CompanySwitcher({ companies, activeCompany, onSwitch, collapsed, onOpenChange, alignLogoWithNav = false, compact = false, iconOnly = false, anchorIconExpandRight = false, iconOnlyFlyoutBelow = false, buttonRef = null }) {
  const shell = useShell();
  const [open, setOpen] = useState(false);
  const [hovered, setHovered] = useState(false);
  const [search, setSearch] = useState("");
  const [dropPos, setDropPos] = useState({ top: 0, left: 0 });
  const ref = useRef(null);
  const btnRef = useRef(null);
  const searchRef = useRef(null);
  const assignButtonRef = (node) => {
    btnRef.current = node;
    if (buttonRef) buttonRef.current = node;
  };

  const activeCo = companies.find(c => c.name === activeCompany);
  const anchoredExpand = anchorIconExpandRight;
  const revealDetails = anchoredExpand ? !iconOnly : (!collapsed && !iconOnly);
  const showLabel = anchoredExpand || (!collapsed && !iconOnly);
  const showChevron = anchoredExpand || (!collapsed && !iconOnly);
  const effectiveIconOnly = iconOnly && !anchoredExpand;
  const showIconTooltip = iconOnly && !open && (!anchoredExpand || !revealDetails);

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) {
        const drop = document.getElementById("company-dropdown");
        if (drop && drop.contains(e.target)) return;
        setOpen(false);
      }
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  useEffect(() => {
    if (open && searchRef.current) setTimeout(() => searchRef.current && searchRef.current.focus(), 50);
    if (!open) setSearch("");
  }, [open]);

  const ROW_HEIGHT = 48;
  const MAX_VISIBLE = 10;
  const listMaxHeight = ROW_HEIGHT * MAX_VISIBLE;
  const COMPANY_DROPDOWN_WIDTH = 280;

  const filtered = companies.filter(co =>
    co.name.toLowerCase().includes(search.toLowerCase()) ||
    co.sku.toLowerCase().includes(search.toLowerCase())
  );

  const estimateDropdownHeight = React.useCallback(() => {
    const dropdown = document.getElementById("company-dropdown");
    if (dropdown) return dropdown.getBoundingClientRect().height;
    const searchHeaderHeight = 52;
    const rowCount = Math.max(filtered.length, 1);
    const listHeight = Math.min(rowCount * ROW_HEIGHT + 8, listMaxHeight);
    return searchHeaderHeight + listHeight;
  }, [filtered.length, listMaxHeight]);

  const computeDropPos = React.useCallback(() => {
    if (!btnRef.current) return { top: 0, left: 0 };
    const r = btnRef.current.getBoundingClientRect();
    const margin = 8;
    const dropHeight = estimateDropdownHeight();

    if (iconOnlyFlyoutBelow || anchorIconExpandRight) {
      let top = r.bottom + 4;
      top = Math.max(margin, Math.min(top, window.innerHeight - dropHeight - margin));
      return { top, left: r.left };
    }
    if (collapsed && iconOnly) {
      let top = r.bottom - dropHeight;
      top = Math.max(margin, Math.min(top, window.innerHeight - dropHeight - margin));
      return { top, left: r.right + 4 };
    }
    if (collapsed) {
      let top = r.top;
      if (top + dropHeight > window.innerHeight - margin) {
        top = Math.max(margin, r.bottom - dropHeight);
      }
      return { top, left: r.right + 4 };
    }
    let top = r.bottom + 4;
    top = Math.max(margin, Math.min(top, window.innerHeight - dropHeight - margin));
    return { top, left: r.left };
  }, [collapsed, iconOnly, anchorIconExpandRight, iconOnlyFlyoutBelow, estimateDropdownHeight]);

  const updateDropPos = React.useCallback(() => {
    setDropPos(computeDropPos());
  }, [computeDropPos]);

  useEffect(() => {
    if (!open) return;
    updateDropPos();
    window.addEventListener("resize", updateDropPos);
    window.addEventListener("scroll", updateDropPos, true);
    return () => {
      window.removeEventListener("resize", updateDropPos);
      window.removeEventListener("scroll", updateDropPos, true);
    };
  }, [open, updateDropPos]);

  useLayoutEffect(() => {
    if (!open) return;
    updateDropPos();
  }, [open, filtered.length, updateDropPos]);

  useEffect(() => {
    if (typeof onOpenChange === "function") onOpenChange(open);
  }, [open, onOpenChange]);

  const ddBg = shell.isNazgul ? shell.searchBarBg : "white";
  const ddBorder = shell.isNazgul ? shell.searchBarBorder : "1px solid #BABEC5";
  const ddShadow = shell.isNazgul
    ? "0 12px 40px rgba(0,0,0,0.55), 0 1px 4px rgba(0,0,0,0.4)"
    : "0 8px 32px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08)";
  const ddHeaderBorder = shell.isNazgul ? "1px solid rgba(255,255,255,0.1)" : "1px solid #eef1f3";
  const searchInnerBg = shell.isNazgul ? "rgba(0,0,0,0.28)" : "#f5f7f8";
  const searchInnerBorder = shell.isNazgul ? "1px solid rgba(255,255,255,0.1)" : "1px solid #e4eaee";
  const searchIconStroke = shell.isNazgul ? "#9AA0A6" : "#8e9aa4";

  const switcherButton = (
    <div ref={assignButtonRef} onClick={() => { if (!open) setDropPos(computeDropPos()); setOpen(!open); }}
      onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{
        display: "flex",
        flexDirection: "row",
        alignItems: "center",
        gap: revealDetails ? 8 : 0,
        width: anchoredExpand ? "auto" : (effectiveIconOnly || compact ? "auto" : (collapsed ? "calc(100% - 8px)" : "100%")),
        maxWidth: anchoredExpand || compact ? 220 : undefined,
        marginLeft: collapsed && !anchoredExpand ? 4 : 0,
        marginRight: collapsed && !anchoredExpand ? 4 : 0,
        paddingLeft: anchoredExpand ? 0 : (collapsed || effectiveIconOnly ? 0 : (compact ? 0 : (alignLogoWithNav ? COMPANY_LOGO_NAV_ALIGN_INSET : 0))),
        paddingRight: anchoredExpand ? 4 : (collapsed || effectiveIconOnly ? 0 : 4),
        paddingTop: 4, paddingBottom: 4,
        cursor: "pointer", borderRadius: 6,
        backgroundColor: hovered ? shell.hoverBg : "transparent",
        transition: `background-color 150ms ease, gap ${TRANSITION}, padding ${TRANSITION}, width ${TRANSITION}, margin ${TRANSITION}, max-width ${TRANSITION}`,
        userSelect: "none", overflow: "hidden",
        justifyContent: anchoredExpand ? "flex-start" : (collapsed || effectiveIconOnly ? "center" : "flex-start"),
        boxSizing: "border-box",
      }}>
      <div style={{ flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <CompanyMarkIcon companyId={activeCo?.id || "acme"} size={NAV_ICON} usePrimaryStyle={true} />
      </div>
      {showLabel ? (
        <span style={{
          flex: anchoredExpand ? "0 1 auto" : (collapsed ? 0 : 1),
          minWidth: 0,
          maxWidth: anchoredExpand ? (revealDetails ? 180 : 0) : undefined,
          opacity: anchoredExpand ? (revealDetails ? 1 : 0) : 1,
          fontFamily: FONT, fontWeight: NAV_L0_FONT_WEIGHT, fontSize: compact ? 12 : NAV_L0_FONT_SIZE, lineHeight: NAV_LABEL_LINE_HEIGHT, color: shell.navTextInactive,
          overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
          transition: `max-width ${TRANSITION}, opacity ${TRANSITION}`,
        }}>
          {activeCompany}
        </span>
      ) : null}
      {showChevron ? (
        <div style={{
          flexShrink: 0,
          width: (revealDetails && (hovered || open)) ? NAV_ICON : 0,
          height: NAV_ICON,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          overflow: "hidden",
          transition: `transform 200ms ease, opacity 150ms ease, width ${TRANSITION}`,
          transform: open ? "rotate(180deg)" : "rotate(0)",
          opacity: revealDetails && (hovered || open) ? 1 : 0,
          pointerEvents: "none",
        }}>
          <div style={navIconHolderStyle()}>
            <ChevronDownSvg size={NAV_GLYPH} color={shell.navIconInactive} />
          </div>
        </div>
      ) : null}
    </div>
  );

  return (
    <div ref={ref} style={{ position: "relative" }}>
      {showIconTooltip ? (
        <Tooltip label={activeCompany} enabled={!open} shrinkWrap offsetX={8}>
          {switcherButton}
        </Tooltip>
      ) : switcherButton}

      {open ? (() => {
        const dropdown = (
        <div id="company-dropdown" onClick={(e) => e.stopPropagation()} className={shell.isNazgul ? "company-dd--dark" : ""} style={{
          position: "fixed", top: dropPos.top, left: dropPos.left, width: 280,
          backgroundColor: ddBg,
          borderRadius: collapsed ? "1px 6px 6px 6px" : "1px 6px 6px 6px",
          border: ddBorder,
          boxShadow: ddShadow,
          zIndex: 2600, animation: "dropIn 150ms ease",
          display: "flex", flexDirection: "column",
          overflow: "hidden",
        }}>
          <div style={{
            position: "sticky", top: 0, zIndex: 2, backgroundColor: ddBg,
            padding: "10px 12px 8px", borderBottom: ddHeaderBorder,
          }}>
            <div style={{
              display: "flex", alignItems: "center", gap: 6,
              backgroundColor: searchInnerBg, borderRadius: 8, padding: "6px 10px",
              border: searchInnerBorder,
            }}>
              <svg width={16} height={16} viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}>
                <circle cx="7" cy="7" r="4.5" stroke={searchIconStroke} strokeWidth="1.2"/>
                <path d="M10.5 10.5L13.5 13.5" stroke={searchIconStroke} strokeWidth="1.2" strokeLinecap="round"/>
              </svg>
              <input
                ref={searchRef}
                value={search}
                onChange={(e) => setSearch(e.target.value)}
                placeholder="Search companies..."
                style={{
                  border: "none", outline: "none", backgroundColor: "transparent",
                  fontSize: 13, fontFamily: FONT, color: shell.textPrimary, width: "100%",
                }}
              />
              {search && (
                <div onClick={(e) => { e.stopPropagation(); setSearch(""); }} style={{ cursor: "pointer", flexShrink: 0, display: "flex" }}>
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 3L9 9M9 3L3 9" stroke={searchIconStroke} strokeWidth="1.3" strokeLinecap="round"/></svg>
                </div>
              )}
            </div>
          </div>

          <div className={"dropdown-scroll" + (shell.isNazgul ? " company-dd--dark" : "")} style={{
            maxHeight: listMaxHeight, overflowY: "auto", overflowX: "hidden",
            padding: "4px 0",
            display: "flex",
            flexDirection: "column",
            gap: 4,
          }}>
            {filtered.length === 0 ? (
              <div style={{ padding: "16px 12px", textAlign: "center", fontSize: 13, color: shell.textSecondary }}>No companies found</div>
            ) : (
              filtered.map((co) => (
                <CompanyRow
                  key={co.id}
                  companyId={co.id}
                  name={co.name}
                  sku={co.sku}
                  isActive={co.name === activeCompany}
                  onClick={() => { onSwitch(co.name); setOpen(false); }}
                />
              ))
            )}
          </div>
        </div>
        );
        if (typeof ReactDOM.createPortal === "function") {
          return ReactDOM.createPortal(dropdown, document.body);
        }
        return dropdown;
      })() : null}
    </div>
  );
}

function CompanyRow({ companyId, name, sku, isActive, onClick }) {
  const shell = useShell();
  const [hovered, setHovered] = useState(false);
  const rowBg = isActive ? shell.activeRowBg : (hovered ? shell.hoverBg : "transparent");
  return (
    <div onClick={onClick} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{
        display: "flex", alignItems: "center", gap: 8,
        paddingLeft: 4, paddingRight: 4, paddingTop: 4, paddingBottom: 4,
        marginLeft: NAV_ITEM_ROW_MARGIN, marginRight: NAV_ITEM_ROW_MARGIN,

        boxSizing: "border-box",
        borderRadius: 6,
        cursor: "pointer",
        backgroundColor: rowBg,
        transition: "background-color 150ms ease",
      }}>
      <CompanyMarkIcon companyId={companyId || "acme"} size={NAV_ICON} />

          fontSize: 13, fontWeight: isActive ? boostedWeight(500) : 400, color: shell.textPrimary,

      </div>
      {isActive ? <NavCheckIcon /> : null}
    </div>
  );
}

// ─── Animated collapsible ───
function SubItems({ items, isOpen, activeSubItem, onSubItemClick, collapsed }) {

  useEffect(() => {
    if (contentRef.current) setHeight(effectiveOpen ? contentRef.current.scrollHeight : 0);

      <span style={{ fontFamily: FONT, fontWeight: NAV_L1_FONT_WEIGHT, fontSize: NAV_L1_FONT_SIZE, lineHeight: NAV_LABEL_LINE_HEIGHT, color: isActive ? shell.navTextActive : shell.navTextInactive, whiteSpace: "nowrap" }}>

// Same height transition as SubItems — keeps reports list in DOM so open/close matches app rows.
function AnimatedNavSection({ isOpen, collapsed, measureDep, children }) {
  const contentRef = useRef(null);
  const [height, setHeight] = useState(0);
  const effectiveOpen = isOpen && !collapsed;
  useEffect(() => {
    if (contentRef.current) setHeight(effectiveOpen ? contentRef.current.scrollHeight : 0);
  }, [effectiveOpen, measureDep]);
  useEffect(() => {
    if (!effectiveOpen) return;
    const onResize = () => {
      if (contentRef.current) setHeight(contentRef.current.scrollHeight);
    };
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [effectiveOpen]);
  return (
    <div style={{ overflow: "hidden", transition: `height 220ms cubic-bezier(0.4, 0, 0.2, 1)`, height: height + "px" }}>
      <div ref={contentRef} style={{ display: "flex", flexDirection: "column", gap: 4, paddingTop: 6 }}>
        {children}
      </div>
    </div>
  );
}

// ─── Delayed Tooltip ───
function Tooltip({ label, enabled, children }) {
  const [show, setShow] = useState(false);
  const [pos, setPos] = useState({ top: 0, left: 0 });
  const timerRef = useRef(null);
  const elRef = useRef(null);

  const handleEnter = () => {
    if (!enabled) return;
    timerRef.current = setTimeout(() => {
      if (elRef.current) {
        const r = elRef.current.getBoundingClientRect();
        setPos({ top: r.top + r.height / 2, left: r.right + 4 });
      }
      setShow(true);
    }, 100);
  };
  const handleLeave = () => {
    clearTimeout(timerRef.current);
    setShow(false);
  };

  useEffect(() => () => clearTimeout(timerRef.current), []);

  return (
    <div ref={elRef} onMouseEnter={handleEnter} onMouseLeave={handleLeave}>
      {children}
      {show && enabled && (
        <div style={{
          position: "fixed", top: pos.top, left: pos.left,
          transform: "translateY(-50%)",
          backgroundColor: "#2B2D30", color: "white",
          fontSize: 12, fontFamily: "'Avenir Next forINTUIT', 'Avenir Next', sans-serif", fontWeight: 400,
          padding: "4px 10px", borderRadius: 5, whiteSpace: "nowrap",
          pointerEvents: "none", zIndex: 9999,
          animation: "tooltipIn 150ms ease-out",
          boxShadow: "0 2px 8px rgba(0,0,0,0.18)",
        }}>
          {label}
        </div>
      )}
    </div>
  );
}

const LIVE_EXPERTS_TOOLTIP = "Ask Live Expert";

function measureLiveExpertTooltipWidth() {
  if (measureLiveExpertTooltipWidth._w != null) return measureLiveExpertTooltipWidth._w;
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  ctx.font = "400 12px 'Avenir Next forINTUIT', 'Avenir Next', sans-serif";
  measureLiveExpertTooltipWidth._w = ctx.measureText(LIVE_EXPERTS_TOOLTIP).width + 20;
  return measureLiveExpertTooltipWidth._w;
}

function computeLiveExpertTooltipPos(anchor, placement) {
  const margin = 12;
  const gap = 8;
  const tipW = measureLiveExpertTooltipWidth();
  const tipH = 28;

  if (placement === "below") {
    const top = anchor.bottom + gap;
    let left = anchor.left + anchor.width / 2;
    const halfW = tipW / 2;
    left = Math.max(margin + halfW, Math.min(left, window.innerWidth - margin - halfW));
    return { top, left, transform: "translateX(-50%)" };
  }

  const left = anchor.right + gap;
  let top = anchor.top + anchor.height / 2;
  const halfH = tipH / 2;
  top = Math.max(margin + halfH, Math.min(top, window.innerHeight - margin - halfH));
  return { top, left, transform: "translateY(-50%)" };
}

function LiveExpertIconButton({ tooltipPlacement = "right", variant = "header", style: buttonStyle }) {
  const shell = useShell();
  const [hovered, setHovered] = useState(false);

  const tooltipTimerRef = useRef(null);
  const elRef = useRef(null);

  const handleEnter = () => {
    setHovered(true);
    tooltipTimerRef.current = setTimeout(() => {
      if (!elRef.current) return;
      setTooltip(computeLiveExpertTooltipPos(elRef.current.getBoundingClientRect(), tooltipPlacement));
    }, 100);
  };

  const handleLeave = () => {
    setHovered(false);
    clearTimeout(tooltipTimerRef.current);
    setTooltip(null);
  };

  useEffect(() => () => clearTimeout(tooltipTimerRef.current), []);

  return (
    <div ref={elRef} onMouseEnter={handleEnter} onMouseLeave={handleLeave} style={{ position: "relative", flexShrink: 0 }}>
      <button
        type="button"
        aria-label="Live Experts"
        style={{

          ...buttonStyle,
        }}
      >
        <div style={{ position: "relative", width: NAV_ICON, height: NAV_ICON, flexShrink: 0 }}>
          <img
            src={iconExpertNav}
            alt=""
            aria-hidden="true"
            width={NAV_ICON}

          />
          <span
            aria-hidden="true"
            style={{
              position: "absolute",
              bottom: -1,
              right: -1,
              width: 6,
              height: 6,
              borderRadius: 200,
              backgroundColor: "#236CFF",
              boxShadow: "0 0 0 2px #fff",

            fontSize: 12,

            lineHeight: 1.4,
            padding: "6px 10px",

          }}
        >
          {LIVE_EXPERTS_TOOLTIP}
        </div>
      ) : null}
    </div>
  );
}

function PanelResizeHandleHint({ enabled = true, isResizing = false, onMouseEnter, onMouseLeave, onMouseDown, style, children }) {
  const [hintVisible, setHintVisible] = useState(false);
  const [cursorPos, setCursorPos] = useState({ x: 0, y: 0 });
  const hintTimerRef = useRef(null);

  const clearHintTimer = () => {
    if (hintTimerRef.current) {
      clearTimeout(hintTimerRef.current);
      hintTimerRef.current = null;
    }
  };

  const hideHint = () => {
    clearHintTimer();
    setHintVisible(false);
  };

  useEffect(() => {
    if (isResizing) hideHint();
  }, [isResizing]);

  useEffect(() => () => clearHintTimer(), []);

  const handleEnter = (event) => {
    if (typeof onMouseEnter === "function") onMouseEnter(event);
    if (!enabled || isResizing) return;
    clearHintTimer();
    setCursorPos({ x: event.clientX, y: event.clientY });
    hintTimerRef.current = setTimeout(() => setHintVisible(true), 600);
  };

  const handleMove = (event) => {
    setCursorPos({ x: event.clientX, y: event.clientY });
  };

  const handleLeave = (event) => {
    hideHint();
    if (typeof onMouseLeave === "function") onMouseLeave(event);
  };

  const handleDown = (event) => {
    hideHint();
    if (typeof onMouseDown === "function") onMouseDown(event);
  };

  const hintNode = hintVisible && enabled && !isResizing ? (
    <div
      role="tooltip"
      style={{
        position: "fixed",
        top: cursorPos.y,
        left: cursorPos.x + 12,
        transform: "translateY(-50%)",
        backgroundColor: "#2B2D30",
        color: "#FFFFFF",
        fontSize: 12,
        fontFamily: FONT,
        fontWeight: 400,
        lineHeight: 1.35,
        padding: "6px 10px",
        borderRadius: 5,
        pointerEvents: "none",
        zIndex: 10000,
        boxShadow: "0 2px 8px rgba(0,0,0,0.18)",
        animation: "tooltipIn 150ms ease-out",
      }}
    >
      <div style={{ whiteSpace: "nowrap" }}>⌘ + \ to expand or collapse.</div>
      <div>Drag to resize.</div>
    </div>
  ) : null;

  return (
    <React.Fragment>
      <div
        onMouseEnter={handleEnter}
        onMouseMove={handleMove}
        onMouseLeave={handleLeave}
        onMouseDown={handleDown}
        style={style}
      >
        {children}
      </div>
      {hintNode && typeof ReactDOM.createPortal === "function" ? ReactDOM.createPortal(hintNode, document.body) : hintNode}
    </React.Fragment>
  );
}
