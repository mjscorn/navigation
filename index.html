function CreateNavSection({ collapsed, navRailRef, flyoutOpen, setFlyoutOpen, closeOtherFlyouts, closeHoverFlyouts }) {
  const anchorRef = useRef(null);
  const [menuPos, setMenuPos] = useState({ top: 0, left: 0 });
  const [createLauncherModalOpen, setCreateLauncherModalOpen] = useState(false);
  const [createMenuExpanded, setCreateMenuExpanded] = useState(false);
  const [suspendCreateHoverUntilLeave, setSuspendCreateHoverUntilLeave] = useState(false);
  const createFlyoutOpenTimerRef = useRef(null);
  const createFlyoutCloseTimerRef = useRef(null);

  const commitMenuPosition = React.useCallback(() => {
    const anchor = anchorRef.current;
    if (!anchor) return;
    const ar = anchor.getBoundingClientRect();
    const left = Math.round(ar.right) - 6;
    const top = Math.round(ar.top);
    setMenuPos({ top, left });
  }, [navRailRef]);

  useLayoutEffect(() => {
    if (!flyoutOpen) return;
    commitMenuPosition();
    let rafInner = null;
    const rafOuter = requestAnimationFrame(() => {
      rafInner = requestAnimationFrame(() => commitMenuPosition());
    });
    const onWin = () => commitMenuPosition();
    window.addEventListener("resize", onWin);
    let roA;
    let roR;
    if (typeof ResizeObserver !== "undefined") {
      if (anchorRef.current) {
        roA = new ResizeObserver(() => commitMenuPosition());
        roA.observe(anchorRef.current);
      }
      if (navRailRef && navRailRef.current) {
        roR = new ResizeObserver(() => commitMenuPosition());
        roR.observe(navRailRef.current);
      }
    }
    return () => {
      cancelAnimationFrame(rafOuter);
      if (rafInner != null) cancelAnimationFrame(rafInner);
      window.removeEventListener("resize", onWin);
      if (roA) roA.disconnect();
      if (roR) roR.disconnect();
    };
  }, [flyoutOpen, collapsed, commitMenuPosition, navRailRef]);

  useEffect(() => () => {
    clearTimeout(createFlyoutOpenTimerRef.current);
    clearTimeout(createFlyoutCloseTimerRef.current);
  }, []);

  useEffect(() => {
    if (!flyoutOpen) setCreateMenuExpanded(false);
  }, [flyoutOpen]);

  const clearCreateFlyoutHoverTimers = () => {
    clearTimeout(createFlyoutOpenTimerRef.current);
    clearTimeout(createFlyoutCloseTimerRef.current);
    createFlyoutOpenTimerRef.current = null;
    createFlyoutCloseTimerRef.current = null;
  };

  const scheduleCreateFlyoutOpen = () => {
    if (createLauncherModalOpen || suspendCreateHoverUntilLeave) return;
    clearTimeout(createFlyoutCloseTimerRef.current);
    createFlyoutCloseTimerRef.current = null;
    clearTimeout(createFlyoutOpenTimerRef.current);
    createFlyoutOpenTimerRef.current = setTimeout(() => {
      createFlyoutOpenTimerRef.current = null;
      if (typeof closeHoverFlyouts === "function") closeHoverFlyouts();
      else closeOtherFlyouts();
      setFlyoutOpen(true);
    }, 100);
  };

  const scheduleCreateFlyoutClose = () => {
    clearTimeout(createFlyoutOpenTimerRef.current);
    createFlyoutOpenTimerRef.current = null;
    clearTimeout(createFlyoutCloseTimerRef.current);
    createFlyoutCloseTimerRef.current = setTimeout(() => {
      createFlyoutCloseTimerRef.current = null;
      setFlyoutOpen(false);
    }, 200);
  };

  const cancelCreateFlyoutClose = () => {
    clearTimeout(createFlyoutCloseTimerRef.current);
    createFlyoutCloseTimerRef.current = null;
  };

  const handleCreatePointerLeave = () => {
    if (suspendCreateHoverUntilLeave) setSuspendCreateHoverUntilLeave(false);
    scheduleCreateFlyoutClose();
  };

  const handleRowClick = () => {
    clearCreateFlyoutHoverTimers();
    if (flyoutOpen && createMenuExpanded) {
      setCreateMenuExpanded(false);
      return;
    }
    if (flyoutOpen && !createMenuExpanded) {
      setCreateMenuExpanded(true);
      return;
    }
    if (typeof closeHoverFlyouts === "function") closeHoverFlyouts();
    else closeOtherFlyouts();
    setFlyoutOpen(true);
    setCreateMenuExpanded(true);
  };

  return (
    <div
      onPointerEnter={scheduleCreateFlyoutOpen}
      onPointerLeave={handleCreatePointerLeave}
    >
      <Tooltip label="Create new" enabled={collapsed && !flyoutOpen}>
        <div ref={anchorRef} style={{ width: "100%", position: "relative" }}>
          <CreateNavButton collapsed={collapsed} flyoutOpen={flyoutOpen} onClick={handleRowClick} />
        </div>
      </Tooltip>
      <CreateFlyoutMenu
        isOpen={flyoutOpen}
        fixedPos={menuPos}
        onClose={() => { clearCreateFlyoutHoverTimers(); setFlyoutOpen(false); }}
        anchorRef={anchorRef}
        onMenuPointerEnter={cancelCreateFlyoutClose}
        onMenuPointerLeave={scheduleCreateFlyoutClose}
        launcherModalOpen={createLauncherModalOpen}
        setLauncherModalOpen={(nextOpen) => {
          setCreateLauncherModalOpen(nextOpen);
          if (nextOpen) setSuspendCreateHoverUntilLeave(true);
        }}
        expanded={createMenuExpanded}
        onToggleExpanded={setCreateMenuExpanded}
        onActionTaken={() => setSuspendCreateHoverUntilLeave(true)}
      />
    </div>
  );
}

                  color: shell.isNazgul ? "#FFFFFF" : TEXT_PRIMARY,
                  textAlign: "left",
                  padding: "4px 0",
                  display: "flex",
                  alignItems: "center",
                  gap: 4,
                }}
              >
                <AddShortcutPlusIcon size={14} />
                <span>New chat</span>
              </button>
            </div>
          </AnimatedNavSection>
        </>

  );
}

function ReportsNavBlock({
  collapsed,
  openReports,
  setOpenReports,
  reportsSelection,
  onSelectReport,
  flyoutReports,
  setFlyoutReports,
  closeAppSections,
  allowMultipleOpen = false,
}) {
  const shell = useShell();
  const rowRef = useRef(null);
  const reportsFlyoutOpenTimerRef = useRef(null);
  const reportsFlyoutCloseTimerRef = useRef(null);
  const isFlyoutOpen = collapsed && flyoutReports;
  const iconActive = !!reportsSelection;

  const clearReportsFlyoutHoverTimers = () => {
    clearTimeout(reportsFlyoutOpenTimerRef.current);
    clearTimeout(reportsFlyoutCloseTimerRef.current);
    reportsFlyoutOpenTimerRef.current = null;
    reportsFlyoutCloseTimerRef.current = null;
  };

  useEffect(() => () => clearReportsFlyoutHoverTimers(), []);

  const scheduleReportsFlyoutOpen = () => {
    if (!collapsed) return;
    clearTimeout(reportsFlyoutCloseTimerRef.current);
    reportsFlyoutCloseTimerRef.current = null;
    clearTimeout(reportsFlyoutOpenTimerRef.current);
    reportsFlyoutOpenTimerRef.current = setTimeout(() => {
      reportsFlyoutOpenTimerRef.current = null;
      closeAppSections();
      setFlyoutReports(true);
    }, 100);
  };

  const scheduleReportsFlyoutClose = () => {
    if (!collapsed) return;
    clearTimeout(reportsFlyoutOpenTimerRef.current);
    reportsFlyoutOpenTimerRef.current = null;
    clearTimeout(reportsFlyoutCloseTimerRef.current);
    reportsFlyoutCloseTimerRef.current = setTimeout(() => {
      reportsFlyoutCloseTimerRef.current = null;
      setFlyoutReports(false);
    }, 200);
  };

  const cancelReportsFlyoutClose = () => {
    clearTimeout(reportsFlyoutCloseTimerRef.current);
    reportsFlyoutCloseTimerRef.current = null;
  };

  const handleRowClick = () => {
    if (collapsed) {
      clearReportsFlyoutHoverTimers();
      setFlyoutReports((prev) => {
        const next = !prev;
        if (next) closeAppSections();
        return next;
      });
      return;
    }
    setOpenReports((prev) => {
      const next = !prev;
      if (next && !allowMultipleOpen) closeAppSections();
      return next;
    });
  };

  const isL1Active = (name) => reportsSelection && reportsSelection.l1 === name && !reportsSelection.l2;

  return (
    <div
      ref={rowRef}
      {...(collapsed ? {
        onPointerEnter: scheduleReportsFlyoutOpen,
        onPointerLeave: scheduleReportsFlyoutClose,
      } : {})}
    >
      {collapsed ? (
        <>
          <Tooltip label="Reports" enabled={collapsed && !flyoutReports && !iconActive}>
            <NavItem icon={<ReportsIcon active={iconActive} />} label="Reports" hasChevron isExpanded={false} onClick={handleRowClick} collapsed={collapsed} isActive={iconActive} />
          </Tooltip>
          <ReportsFlyoutMenu
            isOpen={isFlyoutOpen}
            onClose={() => { clearReportsFlyoutHoverTimers(); setFlyoutReports(false); }}
            reportsSelection={reportsSelection}
            anchorRef={rowRef}
            onMenuPointerEnter={cancelReportsFlyoutClose}
            onMenuPointerLeave={scheduleReportsFlyoutClose}
            onPick={(l1, l2) => {
              onSelectReport(l1, l2);
              clearReportsFlyoutHoverTimers();
              setFlyoutReports(false);
            }}
          />
        </>
      ) : (
        <>
          <NavItem icon={<ReportsIcon active={iconActive} />} label="Reports" hasChevron isExpanded={openReports} onClick={handleRowClick} collapsed={collapsed} isActive={iconActive} />
          <AnimatedNavSection isOpen={openReports} collapsed={collapsed} measureDep={reportsSelection}>
            {reportsNavConfig.flatMap((entry) =>
              !entry.children
                ? [<SubItem key={entry.name} label={entry.name} isActive={isL1Active(entry.name)} onClick={() => onSelectReport(entry.name)} />]
                : entry.children.map((c) => (
                    <SubItem key={entry.name + ":" + c} label={c} isActive={!!(reportsSelection && reportsSelection.l1 === entry.name && reportsSelection.l2 === c)} onClick={() => onSelectReport(entry.name, c)} />
                  ))
            )}
          </AnimatedNavSection>
        </>
      )}
    </div>
  );
}

// ─── App item row: handles tooltip when collapsed idle, flyout when collapsed+clicked ───
function AppItemRow({ item, collapsed, openApp, openAppsByName = null, allowMultipleOpen = false, flyoutApp, activeSubItems, onToggle, onSubItemClick, onCloseFlyout }) {
  const rowRef = useRef(null);
  const isFlyoutOpen = collapsed && flyoutApp === item.name;
  const subItems = appSubItems[item.name] || [];
  const isActive = !!activeSubItems[item.name];
  const isOpen = allowMultipleOpen ? !!(openAppsByName && openAppsByName[item.name]) : openApp === item.name;

  // Auto-scroll the section title to the top of the nav scroll area when opened
  useEffect(() => {
    if (isOpen && !collapsed && rowRef.current) {
      setTimeout(() => {
        if (rowRef.current) {
          rowRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, 80);
    }
  }, [isOpen, collapsed]);

  const icon = item.iconFn(isActive);

  return (
    <div ref={rowRef}>
      {collapsed ? (
        <>
          {!isFlyoutOpen && (
            <Tooltip label={item.name} enabled={collapsed && !isActive}>
              <NavItem icon={icon} label={item.name} hasChevron isExpanded={false} onClick={onToggle} collapsed={collapsed} isActive={isActive} />
            </Tooltip>
          )}
          {isFlyoutOpen && (
            <NavItem icon={icon} label={item.name} hasChevron isExpanded={false} onClick={onToggle} collapsed={collapsed} isActive={isActive} />
          )}
          <FlyoutMenu
            label={item.name}
            items={subItems}
            isOpen={isFlyoutOpen}
            onClose={onCloseFlyout}
            onItemClick={(sub) => onSubItemClick(sub)}
            activeSubItem={activeSubItems[item.name]}
            anchorRef={rowRef}
          />
        </>
      ) : (
        <>
          <NavItem icon={icon} label={item.name} hasChevron isExpanded={isOpen} onClick={onToggle} collapsed={collapsed} isActive={isActive} />
          <SubItems items={subItems} isOpen={isOpen} activeSubItem={activeSubItems[item.name]} onSubItemClick={onSubItemClick} collapsed={collapsed} />
        </>
      )}
    </div>
  );
}

// ─── Flyout Menu for collapsed app items ───
function FlyoutMenu({ label, items, isOpen, onClose, onItemClick, activeSubItem, anchorRef, footer, onMenuPointerEnter, onMenuPointerLeave }) {
  const [pos, setPos] = useState({ top: 0, left: 0 });
  const menuRef = useRef(null);

  useEffect(() => {
    if (isOpen && anchorRef.current) {
      const r = anchorRef.current.getBoundingClientRect();
      setPos({ top: r.top, left: r.right + 4 });
    }
  }, [isOpen]);

  // Never scroll: if the menu would run off the bottom, shift it up to stay within 20px
  // of the bottom edge (grows upward instead of clipping/scrolling).
  useLayoutEffect(() => {
    if (!isOpen || !menuRef.current || !anchorRef.current) return;
    const h = menuRef.current.getBoundingClientRect().height;
    const anchorTop = anchorRef.current.getBoundingClientRect().top;
    const maxTop = Math.max(8, window.innerHeight - 20 - h);
    const next = Math.max(8, Math.min(anchorTop, maxTop));
    setPos((p) => (p.top === next ? p : { ...p, top: next }));
  }, [isOpen, items.length, label]);

  useEffect(() => {
    if (!isOpen) return;
    const handler = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target) && anchorRef.current && !anchorRef.current.contains(e.target)) {
        onClose();
      }
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [isOpen]);

  if (!isOpen) return null;

  return (
    <div ref={menuRef} onPointerEnter={onMenuPointerEnter} onPointerLeave={onMenuPointerLeave} onClick={(e) => e.stopPropagation()} style={{
      position: "fixed", top: pos.top, left: pos.left,
      backgroundColor: "white",
        borderRadius: 6,
      border: "1px solid #BABEC5",
      boxShadow: "0 8px 32px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08)",
      zIndex: 1000, animation: "dropIn 150ms ease",
      overflow: "hidden", minWidth: 180,
    }}>
      {/* Header */}
      <div style={{
        padding: "12px 14px", borderBottom: "1px solid #eef1f3",
        fontFamily: FONT_DEMI, fontWeight: NAV_L0_FONT_WEIGHT, fontSize: NAV_L0_FONT_SIZE, color: NAV_TEXT_ACTIVE, lineHeight: NAV_LABEL_LINE_HEIGHT,
        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
      }}>
        <span style={{ minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{label}</span>
        {label === "Bookmarks" ? (
          <button
            type="button"
            aria-label="Open bookmarks in new window"
            onClick={() => {}}
            style={{
              border: "none",
              background: "transparent",
              padding: 0,
              margin: 0,
              width: 20,
              height: 20,
              color: TEXT_PRIMARY,
              cursor: "pointer",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              flexShrink: 0,
            }}
          >
            <OpenInNewWindowIcon size={20} />
          </button>
        ) : null}
      </div>
      {/* Items */}
      <div style={{ padding: "4px 0" }}>
        {items.map((item) => (
          <FlyoutItem key={item} label={item} isActive={activeSubItem === item} onClick={() => onItemClick(item)} />
        ))}
      </div>
      {footer ? (
        <div style={{ padding: "8px 12px" }}>
          {footer}
        </div>
      ) : null}
    </div>
  );
}

function FlyoutItem({ label, isActive, onClick, paddingLeft = 12 }) {

function HoverNavFlyoutMenu({ isOpen, label, items, fixedPos, anchorRect, onClose, onItemClick, onMenuPointerEnter, onMenuPointerLeave, onOpenBookmarksWindow, onAddBookmark, onToggleBookmark, sourceCollapsed = true }) {
  const shell = useShell();
  const primaryMenuRef = useRef(null);
  const secondaryMenuRef = useRef(null);
  const [resolvedTop, setResolvedTop] = useState(fixedPos.top);
  const [resolvedLeft, setResolvedLeft] = useState(fixedPos.left);
  const [allAppsHoverEntry, setAllAppsHoverEntry] = useState(null);
  const [allAppsHoveredRowKey, setAllAppsHoveredRowKey] = useState(null);
  const [hoveredFlyoutRowKey, setHoveredFlyoutRowKey] = useState(null);
  const [secondaryTargetTop, setSecondaryTargetTop] = useState(fixedPos.top);
  const [secondaryResolvedTop, setSecondaryResolvedTop] = useState(fixedPos.top);
  const [primaryMeasuredWidth, setPrimaryMeasuredWidth] = useState(220);

  useEffect(() => {
    if (!isOpen) setHoveredFlyoutRowKey(null);
  }, [isOpen]);

  useEffect(() => {
    if (!isOpen) return;
    const handler = (e) => {
      const inPrimary = primaryMenuRef.current && primaryMenuRef.current.contains(e.target);
      const inSecondary = secondaryMenuRef.current && secondaryMenuRef.current.contains(e.target);
      if (!inPrimary && !inSecondary) onClose();
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [isOpen, onClose]);

  const isMoreAppsFlyout = label === "More apps";
  const allAppsSecondaryItems = (isMoreAppsFlyout && allAppsHoverEntry && Array.isArray(allAppsHoverEntry.children))
    ? allAppsHoverEntry.children
    : [];
  const hasAllAppsSecondary = isMoreAppsFlyout && allAppsSecondaryItems.length > 0;

  useEffect(() => {
    if (!isOpen || !isMoreAppsFlyout) {
      setAllAppsHoverEntry(null);
      setAllAppsHoveredRowKey(null);
      setHoveredFlyoutRowKey(null);
      return;
    }
    setAllAppsHoverEntry(null);
    setAllAppsHoveredRowKey(null);
    setHoveredFlyoutRowKey(null);
  }, [isOpen, isMoreAppsFlyout]);

  useEffect(() => {
    if (!isMoreAppsFlyout || !allAppsHoverEntry) return;
    const activeKey = allAppsHoverEntry.key || allAppsHoverEntry.label;
    const refreshedEntry = (items || []).find((entry) => (entry.key || entry.label) === activeKey);
    if (refreshedEntry && refreshedEntry !== allAppsHoverEntry) {
      setAllAppsHoverEntry(refreshedEntry);
    }
  }, [isMoreAppsFlyout, allAppsHoverEntry, items]);

  useLayoutEffect(() => {
    if (!isOpen) return;
    const nextTop = fixedPos.top;
    const nextLeft = fixedPos.left;
    if (!primaryMenuRef.current) {
      setResolvedTop(nextTop);
      setResolvedLeft(nextLeft);
      return;
    }
    const menuRect = primaryMenuRef.current.getBoundingClientRect();
    const menuHeight = menuRect.height;
    const menuWidth = menuRect.width;
    setPrimaryMeasuredWidth(Math.max(180, Math.round(menuWidth)));
    const bottomGutter = 20;
    const maxTop = Math.max(8, window.innerHeight - bottomGutter - menuHeight);
    const maxLeft = Math.max(8, window.innerWidth - 8 - menuWidth);
    setResolvedTop(Math.max(8, Math.min(nextTop, maxTop)));
    setResolvedLeft(Math.max(8, Math.min(nextLeft, maxLeft)));
  }, [isOpen, fixedPos.top, fixedPos.left, label, anchorRect, items.length]);

  useLayoutEffect(() => {
    if (!hasAllAppsSecondary) return;
    if (!secondaryMenuRef.current) {
      setSecondaryResolvedTop(secondaryTargetTop);
      return;
    }
    const menuHeight = secondaryMenuRef.current.getBoundingClientRect().height;
    const bottomGutter = 20;
    const maxTop = Math.max(8, window.innerHeight - bottomGutter - menuHeight);
    setSecondaryResolvedTop(Math.max(8, Math.min(secondaryTargetTop, maxTop)));
  }, [hasAllAppsSecondary, secondaryTargetTop, allAppsSecondaryItems.length]);

  if (!isOpen) return null;

  const menu = (
    <div
      ref={primaryMenuRef}
      onPointerEnter={onMenuPointerEnter}
      onPointerLeave={onMenuPointerLeave}
      onClick={(e) => e.stopPropagation()}
      style={{
        position: "fixed",
        left: resolvedLeft,
        top: resolvedTop,
        width: "max-content",
        minWidth: 180,
        maxWidth: "min(420px, calc(100vw - 24px))",
        maxHeight: "none",
        backgroundColor: "white",
        borderRadius: 6,
        border: "1px solid #BABEC5",
        boxShadow: "6px 8px 24px rgba(0,0,0,0.12), 2px 2px 4px rgba(0,0,0,0.06)",
        zIndex: 2400,
        animation: "dropIn 150ms ease",
        overflow: "hidden",
        display: "flex",
        flexDirection: "column",
      }}
    >
      {/* Title only when the source item is icon-only (collapsed rail); Bookmarks
          always shows its title. Hidden when the source row already shows its label
          (expanded nav / All-apps submenu). */}
      {(() => {
        const showTitle = !isMoreAppsFlyout && (sourceCollapsed || label === "Bookmarks");
        const showAction = label === "Bookmarks";
        if (!showTitle && !showAction) return null;
        return (
      <div style={{ padding: "12px 14px", borderBottom: "1px solid #eef1f3", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: showTitle ? "space-between" : "flex-end", gap: 8 }}>
        {showTitle ? (
        <div style={{ minWidth: 0, fontFamily: FONT, fontWeight: NAV_L0_FONT_WEIGHT, fontSize: NAV_L0_FONT_SIZE, color: shell.navTextInactive, lineHeight: NAV_LABEL_LINE_HEIGHT, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
          {label}
        </div>
        ) : null}
        {showAction ? (
          <button
            type="button"
            aria-label="Open bookmarks in new window"
            onClick={(event) => {
              event.stopPropagation();
              if (typeof onOpenBookmarksWindow === "function") onOpenBookmarksWindow();
              if (typeof onClose === "function") onClose();
            }}
            style={{ border: "none", background: "transparent", padding: 0, margin: 0, width: 20, height: 20, color: TEXT_PRIMARY, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}
          >
            <OpenInNewWindowIcon size={20} />
          </button>
        ) : null}
      </div>
        );
      })()}
      <div style={{ padding: "6px 0", overflowY: "visible", flex: "unset", minHeight: "auto" }}>
        {items.map((entry, entryIndex) => (
          entry.isDivider ? (
            <div key={entry.key || ("divider:" + entryIndex)} aria-hidden="true" style={{ height: 1, width: "100%", backgroundColor: "#eef1f3", margin: "6px 0" }} />
          ) : entry.isSectionTitle ? (
            <div
              key={entry.key || entry.label}
              style={{
                padding: (entryIndex === 0 ? "8px 14px 4px" : "10px 14px 4px"),
                fontFamily: FONT,
                fontWeight: NAV_L0_FONT_WEIGHT,
                fontSize: NAV_L0_FONT_SIZE,
                lineHeight: NAV_LABEL_LINE_HEIGHT,
                color: shell.navTextInactive,
                whiteSpace: "nowrap",
                overflow: "hidden",
                textOverflow: "ellipsis",
              }}
            >
              {entry.label}
            </div>
          ) : entry.isZeroState ? (
            <div
              key={entry.key || entry.label}
              style={{
                padding: "8px 14px 8px " + (14 + (entry.flyoutIndentPx || 0)) + "px",
                fontFamily: FONT,
                fontSize: 13,
                fontWeight: 400,
                lineHeight: 1.35,
                color: "#8D9BA8",
                fontStyle: "italic",
                userSelect: "none",
              }}
            >
              {entry.label}
            </div>
          ) : (
          (() => {
            const canToggleBookmark = typeof onToggleBookmark === "function"
              && !!entry.targetL0
              && !!entry.targetPage
              && !entry.financialPlanningParent
              && label !== "Bookmarks"
              && !isMoreAppsFlyout;
            const isBookmarked = !!entry.isShortcut;
            const rowKey = entry.key || entry.label;
            const isRowActive = label !== "Bookmarks" && !!entry.isActive;
            const isRowHovered = hoveredFlyoutRowKey === rowKey;
            const isMoreAppsRowActive = isMoreAppsFlyout && allAppsHoverEntry && (allAppsHoverEntry.key || allAppsHoverEntry.label) === rowKey;
            const isMoreAppsRowHovered = isMoreAppsFlyout && allAppsHoveredRowKey === rowKey;
            const rowBackground = isMoreAppsFlyout
              ? (isMoreAppsRowActive ? shell.activeRowBg : (isMoreAppsRowHovered ? shell.hoverBg : "transparent"))
              : (isRowActive ? shell.activeRowBg : (isRowHovered ? shell.hoverBg : "transparent"));
            return (
              <button
                key={rowKey}
                type="button"
                onClick={() => onItemClick(entry)}
                onPointerEnter={(event) => {
                  setHoveredFlyoutRowKey(rowKey);
                  if (!isMoreAppsFlyout) return;
                  setAllAppsHoveredRowKey(rowKey);
                  if (!Array.isArray(entry.children) || entry.children.length === 0) {
                    setAllAppsHoverEntry(null);
                    return;
                  }
                  const rowRect = event.currentTarget.getBoundingClientRect();
                  setAllAppsHoverEntry(entry);
                  setSecondaryTargetTop(Math.round(rowRect.top - 6));
                }}
                onPointerLeave={() => {
                  setHoveredFlyoutRowKey((prev) => (prev === rowKey ? null : prev));
                  if (!isMoreAppsFlyout) return;
                  setAllAppsHoveredRowKey((prev) => (prev === rowKey ? null : prev));
                }}
                style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  gap: 8,
                  position: "relative",
                  width: "calc(100% - 8px)",
                  marginLeft: 4,
                  marginRight: 4,
                  boxSizing: "border-box",
                  border: "none",
                  borderRadius: 6,
                  background: rowBackground,
                  cursor: "pointer",
                  fontFamily: FONT,
                  fontSize: NAV_L1_FONT_SIZE,
                  fontWeight: isRowActive ? NAV_L0_FONT_WEIGHT : NAV_L1_FONT_WEIGHT,
                  lineHeight: NAV_LABEL_LINE_HEIGHT,
                  color: isRowActive ? shell.navTextActive : shell.navTextInactive,
                  padding: "8px 14px 8px " + (14 + (entry.flyoutIndentPx || 0)) + "px",
                  textAlign: "left",
                  transition: "background-color 150ms ease",
                }}
              >
                {entry.icon ? (
                  <span style={{ width: NAV_ICON, height: NAV_ICON, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }} aria-hidden>
                    {entry.icon}
                  </span>
                ) : null}
                <span style={{ minWidth: 0, flex: 1, textAlign: "left", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{entry.label}</span>
                {entry.connectionStatus ? (
                  <Tooltip label={entry.connectionStatus === "down" ? "Connection down" : "Connected"} enabled={true}>
                    <span
                      role="img"
                      aria-label={entry.connectionStatus === "down" ? "Connection down" : "Connected"}
                      style={{ display: "block", width: 8, height: 8, borderRadius: "50%", flexShrink: 0, backgroundColor: entry.connectionStatus === "down" ? "#D52B1E" : "#2CA01C", cursor: "default" }}
                    />
                  </Tooltip>
                ) : null}
                {isMoreAppsFlyout && Array.isArray(entry.children) && entry.children.length > 0 ? (
                  <span style={{ display: "flex", flexShrink: 0, alignItems: "center", justifyContent: "center", opacity: (isMoreAppsRowHovered || isMoreAppsRowActive) ? 0.85 : 0, width: NAV_ICON, transition: "opacity 150ms ease" }} aria-hidden>
                    <ChevronDownIcon />
                  </span>
                ) : null}
                {canToggleBookmark ? (
                  <span
                    role="button"
                    tabIndex={0}
                    className="profile-flyout-shortcut-star"
                    aria-label={isBookmarked ? "Remove bookmark" : "Add to bookmarks"}
                    onClick={(event) => {
                      event.stopPropagation();
                      onToggleBookmark(entry.targetL0, entry.targetPage);
                    }}
                    onKeyDown={(event) => {
                      if (event.key === "Enter" || event.key === " ") {
                        event.preventDefault();

        ) : null}
      </div>
    </div>
  );

  const secondaryLeftBase = resolvedLeft + primaryMeasuredWidth - 1;
  const secondaryWidth = 220;
  const secondaryLeft = Math.max(8, Math.min(Math.round(secondaryLeftBase), window.innerWidth - secondaryWidth - 8));

      <div style={{ padding: "6px 0" }}>

              trailing={({ hovered, isActive }) => (canToggleBookmark ? (
                <span

                    event.stopPropagation();

                  }}

                    if (event.key === "Enter" || event.key === " ") {

                  style={{
                    color: "#16587A",
                    display: "flex",

                    justifyContent: "center",
                    opacity: (hovered || isActive) ? 1 : 0,
                    visibility: (hovered || isActive) ? "visible" : "hidden",
                    pointerEvents: (hovered || isActive) ? "auto" : "none",
                    transition: "opacity 120ms ease",

                  }}
                >

                </span>
              ) : null)}
            >
              <span style={{ minWidth: 0, flex: 1, textAlign: "left", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{entry.label}</span>
            </NavFlyoutRowButton>
          );
        })}
      </div>
    </div>
  ) : null;

  if (typeof ReactDOM.createPortal === "function") {
    return ReactDOM.createPortal(
      <>
        {menu}
        {secondaryMenu}
      </>,
      document.body
    );
  }
  return (
    <>
      {menu}
      {secondaryMenu}
    </>
  );
}

<div id="passkey-gate" role="dialog" aria-modal="true" aria-label="Enter passkey">
  <style>
    #passkey-gate {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(244, 247, 249, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-family: "Avenir Next", "Avenir Next forINTUIT", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      transition: opacity 220ms ease, visibility 220ms ease;
    }
    #passkey-gate.passkey-gate--hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .passkey-gate-card {
      background: #fff;
      border: 1px solid #d5dee3;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(43, 49, 53, 0.12);
      padding: 28px 32px 24px;
      text-align: center;
      min-width: 280px;
    }
    .passkey-gate-title {
      font-size: 16px;
      font-weight: 500;
      color: #2B3135;
      line-height: 1.4;
      margin: 0 0 20px;
    }
    .passkey-gate-fields {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .passkey-gate-digit {
      width: 44px;
      height: 52px;
      border: 1px solid #babec5;
      border-radius: 8px;
      font-size: 22px;
      font-weight: 500;
      text-align: center;
      color: #2B3135;
      background: #fff;
      outline: none;
      caret-color: #16587A;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .passkey-gate-digit:focus {
      border-color: rgba(22, 88, 122, 0.75);
      box-shadow: 0 0 0 3px rgba(22, 88, 122, 0.16);
    }
    .passkey-gate-digit.passkey-gate-digit--error {
      border-color: #c0392b;
      box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.12);
    }
    .passkey-gate-error {
      min-height: 20px;
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
      color: #c0392b;
      visibility: hidden;
    }
    .passkey-gate-error.passkey-gate-error--visible {
      visibility: visible;
    }
  </style>
  <div class="passkey-gate-card">
    <p class="passkey-gate-title">Enter passkey to continue</p>
    <div class="passkey-gate-fields" id="passkey-fields">
      <input class="passkey-gate-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 1" data-index="0" />
      <input class="passkey-gate-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 2" data-index="1" />
      <input class="passkey-gate-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 3" data-index="2" />
      <input class="passkey-gate-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 4" data-index="3" />
    </div>
    <p class="passkey-gate-error" id="passkey-error" aria-live="polite">Wrong passkey</p>
  </div>
</div>
<script>
(function () {
  var STORAGE_KEY = "nav_proto_passkey_ok";
  var REDIRECT = "";
  function todayPasskey() {
    var now = new Date();
    var month = now.getMonth() + 1;
    var day = now.getDate();
    return (month < 10 ? "0" : "") + month + (day < 10 ? "0" : "") + day;
  }
  function expectedPasskey() { return todayPasskey(); }
  function isUnlockedForToday() {
    try { return sessionStorage.getItem(STORAGE_KEY) === todayPasskey(); } catch (e) { return false; }
  }
  var gate = document.getElementById("passkey-gate");
  var inputs = Array.prototype.slice.call(document.querySelectorAll(".passkey-gate-digit"));
  var errorEl = document.getElementById("passkey-error");

  function unlock() {
    try { sessionStorage.setItem(STORAGE_KEY, expectedPasskey()); } catch (e) {}
    gate.classList.add("passkey-gate--hidden");
    setTimeout(function () {
      if (gate && gate.parentNode) gate.parentNode.removeChild(gate);
      if (REDIRECT) window.location.replace(REDIRECT);
    }, 240);
  }

  if (isUnlockedForToday()) {
    if (REDIRECT) { window.location.replace(REDIRECT); return; }
    if (gate && gate.parentNode) gate.parentNode.removeChild(gate);
    return;
  }

  function clearError() {
    errorEl.classList.remove("passkey-gate-error--visible");
    inputs.forEach(function (input) { input.classList.remove("passkey-gate-digit--error"); });
  }

  function showError() {
    errorEl.classList.add("passkey-gate-error--visible");
    inputs.forEach(function (input) {
      input.classList.add("passkey-gate-digit--error");
      input.value = "";
    });
    inputs[0].focus();
  }

  function readValue() {
    return inputs.map(function (input) { return input.value; }).join("");
  }

  function checkComplete() {
    var value = readValue();
    if (value.length < 4) return;
    if (value === expectedPasskey()) {
      unlock();
    } else {
      showError();
    }
  }

  inputs.forEach(function (input, index) {
    input.addEventListener("input", function () {
      clearError();
      var digit = input.value.replace(/\D/g, "").slice(-1);
      input.value = digit;
      if (digit && index < inputs.length - 1) inputs[index + 1].focus();
      if (digit) checkComplete();
    });

    input.addEventListener("keydown", function (event) {
      if (event.key === "Backspace" && !input.value && index > 0) {
        inputs[index - 1].focus();
        inputs[index - 1].value = "";
        clearError();
      }
    });

    input.addEventListener("paste", function (event) {
      event.preventDefault();
      var pasted = (event.clipboardData || window.clipboardData).getData("text").replace(/\D/g, "").slice(0, 4);
      if (!pasted) return;
      pasted.split("").forEach(function (ch, i) {
        if (inputs[i]) inputs[i].value = ch;
      });
      if (pasted.length === 4) checkComplete();
      else if (inputs[pasted.length]) inputs[pasted.length].focus();
    });
  });

  inputs[0].focus();
})();
</script>

</body>
