<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nav C</title>
  <base href="../" />
  <link rel="icon" type="image/svg+xml" href="favicon-skull.svg?v=3" />
  </head>
<body>
  <p>Redirecting to Dense list C...</p>

<div id="passkey-gate" role="dialog" aria-modal="true" aria-label="Enter passkey">
  <style>
    #passkey-gate {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(244, 247, 249, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-family: "Avenir Next", "Avenir Next forINTUIT", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      transition: opacity 220ms ease, visibility 220ms ease;
    }
    #passkey-gate.passkey-gate--hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .passkey-gate-card {
      background: #fff;
      border: 1px solid #d5dee3;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(43, 49, 53, 0.12);
      padding: 28px 32px 24px;
      text-align: center;
      min-width: 280px;
    }
    .passkey-gate-title {
      font-size: 16px;
      font-weight: 500;
      color: #2B3135;
      line-height: 1.4;
      margin: 0 0 20px;
    }
    .passkey-gate-fields {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .passkey-gate-digit {
      width: 44px;
      height: 52px;
      border: 1px solid #babec5;
      border-radius: 8px;
      font-size: 22px;
      font-weight: 500;
      text-align: center;
      color: #2B3135;
      background: #fff;
      outline: none;
      caret-color: #16587A;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .passkey-gate-digit:focus {
      border-color: rgba(22, 88, 122, 0.75);
      box-shadow: 0 0 0 3px rgba(22, 88, 122, 0.16);
    }
    .passkey-gate-digit.passkey-gate-digit--error {
      border-color: #c0392b;
      box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.12);
    }
    .passkey-gate-error {
      min-height: 20px;
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
      color: #c0392b;
      visibility: hidden;
    }
    .passkey-gate-error.passkey-gate-error--visible {
      visibility: visible;
    }
  </style>
  <div class="passkey-gate-card">
    <p class="passkey-gate-title">Enter passkey to continue</p>
    <div class="passkey-gate-fields" id="passkey-fields">
      <input class="passkey-gate-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 1" data-index="0" />
      <input class="passkey-gate-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 2" data-index="1" />
      <input class="passkey-gate-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 3" data-index="2" />
      <input class="passkey-gate-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 4" data-index="3" />
    </div>
    <p class="passkey-gate-error" id="passkey-error" aria-live="polite">Wrong passkey</p>
  </div>
</div>
<script>
(function () {
  var STORAGE_KEY = "nav_proto_passkey_ok";
  var REDIRECT = "./3.0/?variant=c";
  function todayPasskey() {
    var now = new Date();
    var month = now.getMonth() + 1;
    var day = now.getDate();
    return (month < 10 ? "0" : "") + month + (day < 10 ? "0" : "") + day;
  }
  function expectedPasskey() { return todayPasskey(); }
  function isUnlockedForToday() {
    try { return sessionStorage.getItem(STORAGE_KEY) === todayPasskey(); } catch (e) { return false; }
  }
  var gate = document.getElementById("passkey-gate");
  var inputs = Array.prototype.slice.call(document.querySelectorAll(".passkey-gate-digit"));
  var errorEl = document.getElementById("passkey-error");

  function unlock() {
    try { sessionStorage.setItem(STORAGE_KEY, expectedPasskey()); } catch (e) {}
    gate.classList.add("passkey-gate--hidden");
    setTimeout(function () {
      if (gate && gate.parentNode) gate.parentNode.removeChild(gate);
      if (REDIRECT) window.location.replace(REDIRECT);
    }, 240);
  }

  if (isUnlockedForToday()) {
    if (REDIRECT) { window.location.replace(REDIRECT); return; }
    if (gate && gate.parentNode) gate.parentNode.removeChild(gate);
    return;
  }

  function clearError() {
    errorEl.classList.remove("passkey-gate-error--visible");
    inputs.forEach(function (input) { input.classList.remove("passkey-gate-digit--error"); });
  }

  function showError() {
    errorEl.classList.add("passkey-gate-error--visible");
    inputs.forEach(function (input) {
      input.classList.add("passkey-gate-digit--error");
      input.value = "";
    });
    inputs[0].focus();
  }

  function readValue() {
    return inputs.map(function (input) { return input.value; }).join("");
  }

  function checkComplete() {
    var value = readValue();
    if (value.length < 4) return;
    if (value === expectedPasskey()) {
      unlock();
    } else {
      showError();
    }
  }

  inputs.forEach(function (input, index) {
    input.addEventListener("input", function () {
      clearError();
      var digit = input.value.replace(/\D/g, "").slice(-1);
      input.value = digit;
      if (digit && index < inputs.length - 1) inputs[index + 1].focus();
      if (digit) checkComplete();
    });

    input.addEventListener("keydown", function (event) {
      if (event.key === "Backspace" && !input.value && index > 0) {
        inputs[index - 1].focus();
        inputs[index - 1].value = "";
        clearError();
      }
    });

    input.addEventListener("paste", function (event) {
      event.preventDefault();
      var pasted = (event.clipboardData || window.clipboardData).getData("text").replace(/\D/g, "").slice(0, 4);
      if (!pasted) return;
      pasted.split("").forEach(function (ch, i) {
        if (inputs[i]) inputs[i].value = ch;
      });
      if (pasted.length === 4) checkComplete();
      else if (inputs[pasted.length]) inputs[pasted.length].focus();
    });
  });

  inputs[0].focus();
})();
</script>

</body>
</html>
