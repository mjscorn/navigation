<head>

<title>Nav D</title>
<link rel="icon" type="image/svg+xml" href="favicon-skull.svg?v=3" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; }
  .nav-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .nav-scroll { scrollbar-width: none; }
  .d-top-nav-tab-indicator {
    position: absolute;
    bottom: 0;
    height: 3px;
    border-radius: 999px;
    pointer-events: none;
    will-change: left, width;
    overflow: visible;
    backface-visibility: hidden;
    transition:
      left 380ms cubic-bezier(0.4, 0, 0.2, 1),
      width 380ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .d-top-nav-tab-indicator.is-traveling {
    transition: none;
    animation: dTopNavTabIndicatorTravel 300ms linear forwards;
  }
  @keyframes dTopNavTabIndicatorTravel {
    0% {
      left: var(--ind-from-left);
      width: var(--ind-from-width);
      animation-timing-function: cubic-bezier(0.5, 0.04, 0.18, 1);
    }
    38% {
      left: var(--ind-stretch-left);
      width: var(--ind-stretch-width);
      animation-timing-function: cubic-bezier(0.24, 0.92, 0.36, 1);
    }
    100% {
      left: var(--ind-to-left);
      width: var(--ind-to-width);
    }
  }
  @keyframes dBookmarksTabPulse {
    0% { transform: scale(1); }
    38% { transform: scale(1.14); }
    68% { transform: scale(0.97); }
    100% { transform: scale(1); }
  }
  .d-top-nav-bookmarks-tab-label--pulse {
    animation: dBookmarksTabPulse 520ms cubic-bezier(0.2, 0.8, 0.2, 1);
    transform-origin: center center;
  }
  @keyframes dBookmarkIconPulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.28); }
    55% { transform: scale(0.92); }
    78% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  .d-bookmark-current-page-icon--pulse {
    animation: dBookmarkIconPulse 560ms cubic-bezier(0.2, 0.8, 0.2, 1);
    transform-origin: center center;
  }
  .d-top-nav-bookmarks-tab-icon--pulse {
    animation: dBookmarkIconPulse 560ms cubic-bezier(0.2, 0.8, 0.2, 1);
    transform-origin: center center;
  }
  .d-task-nav-row-wrap {
    overflow: hidden;
    max-height: 72px;
    transition:
      max-height 280ms cubic-bezier(0.4, 0, 0.2, 1),
      opacity 220ms ease,
      margin 280ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .d-task-nav-row-wrap.is-collapsing {
    max-height: 0 !important;
    opacity: 0;
    margin-top: 0 !important;
    margin-bottom: 0 !important;
  }
  .canvas-widget-scroll::-webkit-scrollbar { width: 6px; }
  .canvas-widget-scroll::-webkit-scrollbar-track { background: transparent; }
  .canvas-widget-scroll::-webkit-scrollbar-thumb { background: rgba(43, 49, 53, 0.14); border-radius: 999px; }
  .canvas-widget-scroll { scrollbar-width: thin; scrollbar-color: rgba(43, 49, 53, 0.14) transparent; }
  .dropdown-scroll::-webkit-scrollbar { width: 4px; }
  .dropdown-scroll::-webkit-scrollbar-track { background: transparent; }
  .dropdown-scroll::-webkit-scrollbar-thumb { background: #d0d7dc; border-radius: 4px; }
  .dropdown-scroll::-webkit-scrollbar-thumb:hover { background: #b0bac0; }
  .company-dd--dark.dropdown-scroll { scrollbar-color: rgba(255,255,255,0.28) transparent; }
  .company-dd--dark.dropdown-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.22); }
  .company-dd--dark.dropdown-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.34); }
  .company-dd--dark input::placeholder { color: #8B9499; opacity: 1; }
  @keyframes dropIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes navFlyoutExpand {
    from { opacity: 0; transform: scale(0.86); clip-path: inset(0 100% 100% 0 round 8px); }
    to { opacity: 1; transform: scale(1); clip-path: inset(0 0 0 0 round 8px); }
  }
  @keyframes tooltipIn {
    from { opacity: 0; transform: translateY(-50%) translateX(-4px); }
    to { opacity: 1; transform: translateY(-50%) translateX(0); }
  }
  @keyframes tooltipAboveIn {
    from { opacity: 0; transform: translate(-50%, calc(-100% - 4px)); }
    to { opacity: 1; transform: translate(-50%, calc(-100% - 6px)); }
  }
  @keyframes clickTooltipIn { from { opacity: 0; } to { opacity: 1; } }
  /* Profile flyout — stroked Sign out button */
  .profile-flyout-outline-btn:hover { background-color: rgba(22, 88, 122, 0.08) !important; }
  /* Profile flyout — borderless Privacy / Give feedback (same hover fill as Sign out, no stroke) */
  .profile-flyout-ghost-btn {
    transition: background-color 120ms ease;
    border-radius: 6px;
  }
  .profile-flyout-ghost-btn:hover { background-color: rgba(22, 88, 122, 0.08) !important; }
  .profile-flyout-row-btn {
    transition: background-color 120ms ease;
    width: calc(100% - 8px) !important;
    margin-left: 4px;
    margin-right: 4px;
    border-radius: 6px;
    box-sizing: border-box;
  }
  .profile-flyout-row-btn:hover { background-color: rgba(22, 88, 122, 0.08) !important; }
  .profile-flyout-shortcut-star {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    width: 0;
    overflow: hidden;
    transition: opacity 120ms ease;
  }
  .profile-flyout-row-btn:hover .profile-flyout-shortcut-star {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    width: 20px;
  }
  @keyframes shortcutStarPulse {
    0% { transform: scale(1); }
    35% { transform: scale(1.16); }
    70% { transform: scale(0.96); }
    100% { transform: scale(1); }
  }
  .profile-flyout-shortcut-star--burst {
    opacity: 1 !important;
    visibility: visible !important;
    pointer-events: auto;
    animation: shortcutStarPulse 240ms cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .profile-flyout-secondary-chevron {
    opacity: 0;
    visibility: hidden;
    transition: opacity 120ms ease;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
  .profile-flyout-row-btn:hover .profile-flyout-secondary-chevron {
    opacity: 1;
    visibility: visible;
  }
  .nav-item-chevron-action {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-radius: 4px;
    transition: opacity 150ms ease, width 220ms cubic-bezier(0.2, 0.8, 0.2, 1), background-color 150ms ease;
  }
  /* Nav panel collapse handle: tight on the nav side, generous top/right slop. */
  .collapse-handle-hit-target {
    position: relative;
    cursor: pointer;
  }
  .collapse-handle-hit-target::before {
    content: "";
    position: absolute;
    top: -6px;
    bottom: -6px;
    left: 2px;
    right: -10px;
  }
  .nav-item-chevron-action.is-hovered {
    background: rgba(133, 146, 153, 0.24);
  }
  @keyframes homeGreetingLetterDrop {
    0% { opacity: 0; transform: translateY(var(--drop-y, -140px)) rotate(var(--drop-rot, -8deg)); }
    82% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 1; transform: translateY(0) rotate(0deg); }
  }
  @keyframes homeGreetingSubtitleFade {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes homeGreetingPillSlide {
    0% { opacity: 0; transform: translateX(calc(-220px - var(--pill-origin-shift, 0px))) rotate(-1.2deg); }
    78% { opacity: 1; transform: translateX(0) rotate(0deg); }
    100% { opacity: 1; transform: translateX(0) rotate(0deg); }
  }
  .profile-flyout-link-btn { border-radius: 6px; transition: background-color 120ms ease; }
  .profile-flyout-link-btn:hover { background-color: rgba(22, 88, 122, 0.08) !important; }
  .profile-flyout-icon-btn { border-radius: 6px; transition: background-color 120ms ease; }
  .profile-flyout-icon-btn:hover { background-color: rgba(22, 88, 122, 0.08) !important; }
  .profile-flyout-header-btn { border-radius: 6px; transition: background-color 120ms ease; }
  .profile-flyout-header-btn:hover { background-color: rgba(22, 88, 122, 0.08) !important; }

  /* —— Customize modal (from responsive-nav.html) —— */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:5000;display:none;align-items:center;justify-content:center;padding:clamp(16px,4vh,40px)}
  .modal-overlay.open{display:flex}
  .global-nav-search-input::placeholder{color:var(--global-search-placeholder,#859299);opacity:1}
  .global-nav-search-result{border:none;outline:none;box-shadow:none;cursor:pointer;padding:8px 4px;background:transparent;font:inherit;color:inherit}
  .global-nav-search-result:focus,.global-nav-search-result:focus-visible{outline:none;box-shadow:none}
  .global-nav-search-result--focused{background-color:var(--global-search-focus-bg,rgba(22,88,122,0.08))!important}
  .modal{background:#fff;border:1px solid #e2e9ed;border-radius:8px;box-shadow:0 2px 8px rgba(76,85,91,.2);width:100%;max-width:720px;max-height:100%;display:flex;flex-direction:column;overflow:hidden;font-family:'Avenir Next','Avenir Next forINTUIT',-apple-system,BlinkMacSystemFont,system-ui,sans-serif}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:24px 24px 0 24px;flex-shrink:0}
  .modal-title{font-size:28px;font-weight:500;color:#2B3135;line-height:1.3}
  .modal-close{width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:none;background:none;border-radius:4px}
  .modal-close:hover{background:rgba(0,0,0,.06)}
  .modal-close svg{width:16px;height:16px}
  .modal-mid{display:flex;gap:24px;flex:1;overflow:hidden;padding:24px;min-height:0;align-items:stretch}
  .modal-sidebar{display:flex;flex-direction:column;gap:4px;flex-shrink:0;width:200px;position:sticky;top:0}
  .sidebar-item{height:36px;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:14px;font-weight:400;color:#2B3135;cursor:pointer;line-height:1.3;border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
  .sidebar-item.act{font-weight:500;background:rgba(133,146,153,.2)}
  .sidebar-item:hover:not(.act){background:rgba(0,0,0,.04)}
  .sidebar-item-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#2B3135}
  .modal-content{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:24px;padding:1px 30px 1px 1px;min-height:0;scrollbar-width:thin;scrollbar-color:transparent transparent}
  .modal-content:hover,.modal-content:focus-within{scrollbar-color:#c3ced5 transparent}
  .modal-content::-webkit-scrollbar{width:6px}
  .modal-content::-webkit-scrollbar-thumb{background:transparent;border-radius:3px;transition:background .2s ease}
  .modal-content:hover::-webkit-scrollbar-thumb,.modal-content:focus-within::-webkit-scrollbar-thumb{background:#c3ced5}
  .section-title{font-size:16px;font-weight:500;color:#2B3135;line-height:1.5}
  .section-title--sticky{position:sticky;top:-1px;z-index:2;background:#fff;margin-top:-1px;padding-top:9px;padding-bottom:8px}
  .section-desc{font-size:16px;font-weight:400;color:#2B3135;line-height:1.5;margin-top:4px}
  .illus-cards{display:flex;gap:24px;margin-top:16px}
  .illus-card{flex:1;border-radius:8px;overflow:hidden;cursor:pointer;border:none;background:transparent;padding:0;font:inherit;text-align:left}
  .illus-card .card-radio{padding:12px;display:flex;align-items:center;gap:8px;font-size:16px;font-weight:400;color:#2B3135;line-height:1.3}
  .illus-card.sel .card-radio{background:rgba(0,133,109,.1);border:1px solid #003e31;border-bottom:none;border-radius:8px 8px 0 0}
  .illus-card:not(.sel) .card-radio{border:1px solid #c3ced5;border-bottom:none;border-radius:8px 8px 0 0}
  .illus-card .card-vis{height:160px;background:#f8fafb;display:flex;align-items:flex-end;justify-content:center;padding-bottom:0;overflow:hidden}
  .illus-card.sel .card-vis{border:1px solid #003e31;border-top:none;border-radius:0 0 8px 8px}
  .illus-card:not(.sel) .card-vis{border:1px solid #c3ced5;border-top:none;border-radius:0 0 8px 8px}
  @media(max-width:860px){
    .illus-cards{flex-direction:column;gap:16px}
    .illus-card{display:flex;flex-direction:row;flex:none;overflow:hidden;border-radius:8px;border:1px solid #c3ced5}
    .illus-card.sel{border-color:#003e31}
    .illus-card .card-radio{border-radius:0;border:none;min-width:140px;flex-shrink:0}
    .illus-card.sel .card-radio{background:rgba(0,133,109,.1);border:none;border-radius:0}
    .illus-card:not(.sel) .card-radio{border:none;border-radius:0}
    .illus-card .card-vis{border-radius:0;border:none;border-left:1px solid #c3ced5;height:80px;min-height:80px;flex:1;align-items:flex-start;justify-content:center;padding-top:20px;padding-bottom:0;overflow:hidden}
    .illus-card.sel .card-vis{border-left-color:#003e31;border-radius:0}
    .illus-card:not(.sel) .card-vis{border-radius:0}
    .illus-card .card-vis .layout-vis{transform:scale(.5);transform-origin:top center}
  }
  .radio-dot{width:20px;height:20px;border-radius:50%;border:2px solid #8a9499;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .radio-dot.on{border-color:#003e31}
  .radio-dot.on::after{content:'';width:10px;height:10px;border-radius:50%;background:#003e31}
  .appearance-radios{display:flex;flex-direction:column;gap:16px;margin-top:16px}
  .app-radio{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:2px 0;border:none;background:transparent;width:100%;text-align:left;font:inherit}
  .app-radio:hover{opacity:.85}
  .app-radio-text{display:flex;flex-direction:column;gap:2px}
  .app-radio-label{font-size:16px;font-weight:400;color:#2B3135;line-height:1.3}
  .section-behavior-radios{display:flex;flex-direction:column;gap:16px;margin-top:16px}
  .section-behavior-radio{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:2px 0;border:none;background:transparent;width:100%;text-align:left;font:inherit}
  .section-behavior-radio:hover{opacity:.85}
  .section-behavior-radio-label{font-size:16px;font-weight:400;color:#2B3135;line-height:1.3}
  .section-behavior-radio-dot{width:20px;height:20px;border-radius:50%;border:2px solid #8a9499;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .section-behavior-radio-dot.on{border-color:rgba(22,88,122,0.80)}
  .section-behavior-radio-dot.on::after{content:'';width:10px;height:10px;border-radius:50%;background:rgba(22,88,122,0.80)}
  .section-behavior-radio-row{display:flex;align-items:center;width:100%}
  .section-behavior-radio-row .section-behavior-radio{flex:0 1 auto;width:auto;min-width:0}
  .section-behavior-radio-row .section-behavior-info-btn{margin-left:8px;flex-shrink:0}
  .section-behavior-info-btn{display:flex;align-items:center;justify-content:center;flex-shrink:0;width:24px;height:24px;margin-top:0;border:none;background:transparent;border-radius:4px;color:#6A737A;cursor:pointer;padding:0}
  .section-behavior-info-btn:hover{background:rgba(22,88,122,0.08);color:#2B3135}
  .section-behavior-info-btn:focus-visible{outline:2px solid rgba(22,88,122,0.80);outline-offset:1px}
  .radio-indent{padding-left:34px;display:none;align-items:center;gap:8px;cursor:pointer;margin-top:-4px;border:none;background:transparent;width:100%;text-align:left;font:inherit}
  .radio-indent.vis{display:flex}
  .checkbox-box{width:20px;height:20px;border-radius:4px;border:2px solid #8a9499;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .checkbox-box.on{background:#003e31;border-color:#003e31}
  .checkbox-box.on::after{content:'';display:block;width:10px;height:6px;border-left:2px solid white;border-bottom:2px solid white;transform:rotate(-45deg) translateY(-1px)}
  .checkbox-label{font-size:16px;font-weight:400;color:#2B3135;line-height:1.3}

  .app-list-item--pinned-l0.has-row-actions{padding-right:142px}

const getDefaultL1PagesForL0 = (l0Name) => {
  if (Object.prototype.hasOwnProperty.call(appSubItems, l0Name) || APP_L0_NAMES.includes(l0Name)) {
    return appSubItemsWithDefault(l0Name);
  }
  return [];
};

const resolveL1PagesForL0 = (l0Name, l1OrderByL0) => {
  const defaults = getDefaultL1PagesForL0(l0Name);
  const saved = l1OrderByL0 && l1OrderByL0[l0Name];
  if (!Array.isArray(saved) || saved.length === 0) return defaults;
  const defaultSet = new Set(defaults);
  const merged = saved.filter((page) => defaultSet.has(page));
  defaults.forEach((page) => { if (!saved.includes(page)) merged.push(page); });
  return merged;
};

function formatDefaultLandingPageTooltip(pageName) {
  return "Click to go to Home / " + (pageName || DEFAULT_LANDING_PAGE);

function resolveDefaultLandingPageRoute(pageName) {
  const page = pageName || DEFAULT_LANDING_PAGE;
  if (page === "Home") return { type: "home" };
  if (page === "Dashboard") return { type: "dashboard" };
  for (const appName of APP_L0_NAMES) {
    if ((appSubItemsWithDefault(appName) || []).includes(page)) {
      return { type: "app", app: appName, sub: page };
    }
  }
  for (const report of reportsNavConfig) {
    if (report.children) {
      if (report.children.includes(page)) return { type: "report", l1: report.name, l2: page };
    } else if (report.name === page) {
      return { type: "report", l1: page, l2: null };
    }
  }
  return { type: "dashboard" };
}

  const submitPrompt = () => {

function clampOmniPanelWidthPx(widthPx) {
  const viewportWidth = typeof window !== "undefined" ? window.innerWidth : 1200;
  const maxWidthPx = Math.max(OMNI_PANEL_MIN_WIDTH_PX, Math.round((OMNI_PANEL_MAX_WIDTH_PERCENT / 100) * viewportWidth));
  return Math.min(maxWidthPx, Math.max(OMNI_PANEL_MIN_WIDTH_PX, Math.round(widthPx)));
}

function OmniAiSidePanelDock({
  open,
  onClose,
  widthPx,
  onWidthPxChange,
  messages,
  promptValue,
  onPromptChange,
  onSubmitPrompt,
  onNewChat,
}) {
  const shell = useShell();
  const [loaded, setLoaded] = useState(false);
  const [starterVisible, setStarterVisible] = useState(false);
  const [resizing, setResizing] = useState(false);
  const resizeSessionRef = useRef(null);
  const askInputRef = useRef(null);
  const transcriptRef = useRef(null);
  const panelMessages = messages || [];
  const hasConversation = panelMessages.length > 0;

  useEffect(() => {
    if (!open) {
      setLoaded(false);
      setStarterVisible(false);
      return;
    }
    const t1 = window.setTimeout(() => setLoaded(true), 50);
    const t2 = window.setTimeout(() => setStarterVisible(true), 150);
    const t3 = window.setTimeout(() => askInputRef.current?.focus(), 180);
    return () => {
      window.clearTimeout(t1);
      window.clearTimeout(t2);
      window.clearTimeout(t3);
    };
  }, [open]);

  useEffect(() => {
    if (!open || !transcriptRef.current) return;
    transcriptRef.current.scrollTop = transcriptRef.current.scrollHeight;
  }, [open, panelMessages]);

  const beginResize = (event) => {
    event.preventDefault();
    resizeSessionRef.current = { pointerX: event.clientX, startWidth: widthPx };
    setResizing(true);
    const onMove = (moveEvent) => {
      const session = resizeSessionRef.current;
      if (!session) return;
      const delta = session.pointerX - moveEvent.clientX;
      onWidthPxChange(clampOmniPanelWidthPx(session.startWidth + delta));
    };
    const onUp = () => {
      resizeSessionRef.current = null;
      setResizing(false);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  const submitPrompt = () => {
    const trimmed = (promptValue || "").trim();
    if (!trimmed) return;
    if (typeof onSubmitPrompt === "function") onSubmitPrompt(trimmed);
  };

  const dockWidth = open ? widthPx : 0;

  return (
    <div
      aria-hidden={!open}
      style={{
        flexShrink: 0,
        alignSelf: "stretch",
        height: "100%",
        width: dockWidth,
        overflow: "visible",
        position: "relative",
        transition: resizing ? "none" : "width 220ms ease-in-out",
        pointerEvents: open ? "auto" : "none",
        visibility: open ? "visible" : "hidden",
      }}
    >
      {open ? (
        <div
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize Intuit Intelligence panel"
          className="omni-panel-dock-resize"
          onMouseDown={beginResize}
          style={{
            position: "absolute",
            left: -OMNI_RESIZE_HANDLE_WIDTH,
            top: D_OMNI_PANEL_PADDING_TOP,
            bottom: D_OMNI_PANEL_PADDING_BOTTOM,
            width: OMNI_RESIZE_HANDLE_WIDTH,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            cursor: "col-resize",
          }}
        >
          <span style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {[0, 1, 2].map((dotIndex) => (
              <span key={dotIndex} className="omni-panel-resize-dot" style={{ width: 4, height: 4, borderRadius: "50%", background: "#d5dee3", display: "block", transition: "background-color 0.15s ease" }} />
            ))}
          </span>
        </div>
      ) : null}
      <div
        style={{
          width: "100%",
          height: "100%",
          padding: open ? (D_OMNI_PANEL_PADDING_TOP + "px " + D_OMNI_PANEL_PADDING_RIGHT + "px " + D_OMNI_PANEL_PADDING_BOTTOM + "px 0") : 0,
          boxSizing: "border-box",
          display: "flex",
          flexDirection: "column",
          minWidth: 0,
        }}
      >
        <div className={"omni-panel-root" + (loaded ? " loaded" : "")} style={{ border: D_SURFACE_BORDER, fontFamily: FONT }}>
          <div
            className="omni-panel-header"
            style={{
              minHeight: D_CANVAS_TOOLBAR_ROW_HEIGHT,
              boxSizing: "border-box",
              paddingTop: D_OMNI_PANEL_HEADER_PADDING_Y,
              paddingBottom: D_OMNI_PANEL_HEADER_PADDING_Y,
              paddingLeft: D_OMNI_PANEL_HEADER_PADDING_LEFT,
              paddingRight: D_OMNI_PANEL_HEADER_PADDING_RIGHT,
            }}
          >
            <div style={{ display: "flex", alignItems: "center", gap: D_CANVAS_TOOLBAR_CONTENT_GAP, minWidth: 0 }}>
              <div style={navIconHolderStyle()}>
                <IntuitAiOmniIcon size={NAV_ICON} />

              <span

              <span

            <div style={{ display: "flex", alignItems: "center", gap: D_OMNI_PANEL_HEADER_ACTIONS_GAP, flexShrink: 0 }}>

function HeaderCreateButton({ open, onClick, buttonRef, iconOnly = false, iconTrailing = false, variant = "default" }) {
  const shell = useShell();
  const [hovered, setHovered] = useState(false);
  const primaryStyle = variant === "primary";
  const secondaryStyle = variant === "secondary";
  const fg = secondaryStyle
    ? SECONDARY_BTN_COLOR
    : primaryStyle
      ? "#FFFFFF"
      : (shell.isNazgul ? "#FFFFFF" : TEXT_PRIMARY);
  const border = secondaryStyle
    ? SECONDARY_BTN_BORDER
    : primaryStyle
      ? "none"
      : (open && shell.isNazgul
        ? "1px solid #D0D7DC"
        : (shell.isNazgul ? "1px solid rgba(255,255,255,0.5)" : "1px solid " + TEXT_PRIMARY));
  const activeBg = shell.isNazgul ? "#FFFFFF" : shell.activeRowBg;
  const activeFg = shell.isNazgul ? "#21262A" : TEXT_PRIMARY;
  const backgroundColor = secondaryStyle
    ? ((open || hovered) ? SECONDARY_BTN_HOVER_BG : "transparent")
    : primaryStyle
      ? ((open || hovered) ? PRIMARY_BTN_BG_HOVER : PRIMARY_BTN_BG)
      : (iconOnly
        ? ((open || hovered) ? shell.headerIconHoverBg : "transparent")
        : (open ? activeBg : (hovered ? shell.hoverBg : "transparent")));
  const color = secondaryStyle ? SECONDARY_BTN_COLOR : (primaryStyle ? "#FFFFFF" : (open ? activeFg : fg));
  const buttonHeight = (primaryStyle || secondaryStyle) ? 32 : (NAV_ICON + 8);
  return (
    <button
      ref={buttonRef}
      type="button"
      aria-label="Create new"
      aria-expanded={open}
      onClick={onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        height: buttonHeight,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        gap: iconOnly ? 0 : 6,
        width: iconOnly ? (NAV_ICON + 8) : "auto",

        border: border,
        borderRadius: 6,
        backgroundColor,
        color,
        cursor: "pointer",
        fontFamily: FONT,
        fontSize: 13,
        fontWeight: 400,
        lineHeight: 1.2,
        transition: "background-color 150ms ease, color 150ms ease, border-color 150ms ease",

      {!iconOnly ? (
        <div style={{ width: 16, height: 16, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", color: "currentColor" }}>
          <CreateNavMarkIcon />
        </div>
      ) : null}
      {!iconOnly ? <span style={{ whiteSpace: "nowrap" }}>Create</span> : null}
      {iconTrailing ? (
        <div style={{ width: 16, height: 16, display: "flex", alignItems: "center", justifyContent: "center", color: "currentColor" }}>
          <ChevronDownIcon expanded={open} mode="up-down" color="currentColor" />

        <div style={{ width: 16, height: 16, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden", color: "currentColor" }}>
          <CreateNavMarkIcon />
        </div>
      ) : null)}
    </button>
  );
}

function HeaderShortcutsFlyoutMenu({ isOpen, onClose, onPick, activeShortcut, anchorRef, fixedPos }) {
  const shell = useShell();
  const menuRef = useRef(null);

  useEffect(() => {
    if (!isOpen) return;
    const handler = (e) => {
      const clickedAnchor = anchorRef && anchorRef.current ? anchorRef.current.contains(e.target) : false;
      if (menuRef.current && !menuRef.current.contains(e.target) && !clickedAnchor) {
        onClose();
      }
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [isOpen, onClose, anchorRef]);

  if (!isOpen) return null;

  const menu = (
    <div
      ref={menuRef}
      onClick={(e) => e.stopPropagation()}
      style={{
        position: "fixed",
        left: fixedPos.left,
        top: fixedPos.top,
        width: 240,
        maxHeight: "min(420px, calc(100vh - 16px))",
        backgroundColor: "white",
        borderRadius: "6px",
        border: "1px solid #BABEC5",
        boxShadow: "6px 8px 24px rgba(0,0,0,0.12), 2px 2px 4px rgba(0,0,0,0.06)",
        zIndex: 2400,
        animation: "dropIn 150ms ease",
        overflow: "hidden",
        display: "flex",
        flexDirection: "column",
      }}
    >
      <div style={{ padding: "8px 12px", borderBottom: "1px solid #eef1f3", fontFamily: FONT_DEMI, fontWeight: 500, fontSize: 13, color: TEXT_PRIMARY }}>Shortcuts</div>
      <div style={{ padding: "4px 0", overflowY: "auto", flex: 1, minHeight: 0 }}>
        {shortcutsNavItems.map((name) => (
          <FlyoutItem key={name} label={name} isActive={activeShortcut === name} onClick={() => onPick(name)} />
        ))}
      </div>
      <div style={{ padding: "8px 12px", borderTop: "1px solid #eef1f3", backgroundColor: "white", flexShrink: 0 }}>
        <button
          type="button"
          onClick={() => onClose()}
          style={{
            width: "100%",
            cursor: "pointer",
            border: "none",
            background: "transparent",
            fontFamily: FONT,
            fontWeight: 500,
            fontSize: 13,
            lineHeight: 1.3,
            color: shell.isNazgul ? "#FFFFFF" : TEXT_PRIMARY,
            textAlign: "left",
            padding: "4px 0",
            display: "flex",
            alignItems: "center",
            gap: 4,
          }}
        >
          <AddShortcutPlusIcon size={14} />
          <span>Add shortcut</span>
        </button>
      </div>
    </div>
  );

  if (typeof ReactDOM.createPortal === "function") {
    return ReactDOM.createPortal(menu, document.body);
  }
  return menu;
}

const D_NAV_PANEL_OUTER_X = 3.5;
const D_NAV_PANEL_OUTER_W = 17;
const D_NAV_PANEL_LEFT_SHARE = 0.42;
const D_NAV_PANEL_DIVIDER_X = D_NAV_PANEL_OUTER_X + D_NAV_PANEL_OUTER_W * D_NAV_PANEL_LEFT_SHARE;
const D_NAV_PANEL_LEFT_CENTER_X = D_NAV_PANEL_OUTER_X + (D_NAV_PANEL_DIVIDER_X - D_NAV_PANEL_OUTER_X) / 2;
const D_NAV_PANEL_RIGHT_CENTER_X = D_NAV_PANEL_DIVIDER_X + (D_NAV_PANEL_OUTER_X + D_NAV_PANEL_OUTER_W - D_NAV_PANEL_DIVIDER_X) / 2;
const D_NAV_PANEL_CHEVRON_HALF_W = 1.125;
const D_NAV_PANEL_CHEVRON_Y_TOP = 9.75;
const D_NAV_PANEL_CHEVRON_Y_MID = 12;
const D_NAV_PANEL_CHEVRON_Y_BOT = 14.25;

function dNavPanelChevronPath(centerX, direction, halfWidth = D_NAV_PANEL_CHEVRON_HALF_W) {
  if (direction === "left") {
    const pointX = centerX - halfWidth;
    const wingX = centerX + halfWidth;
    return `M${wingX} ${D_NAV_PANEL_CHEVRON_Y_TOP}L${pointX} ${D_NAV_PANEL_CHEVRON_Y_MID}L${wingX} ${D_NAV_PANEL_CHEVRON_Y_BOT}`;
  }
  const wingX = centerX - halfWidth;
  const pointX = centerX + halfWidth;
  return `M${wingX} ${D_NAV_PANEL_CHEVRON_Y_TOP}L${pointX} ${D_NAV_PANEL_CHEVRON_Y_MID}L${wingX} ${D_NAV_PANEL_CHEVRON_Y_BOT}`;
}

function DNavPanelIconFrame({ color, children }) {
  return (
    <>
      <rect x={D_NAV_PANEL_OUTER_X} y="4.5" width={D_NAV_PANEL_OUTER_W} height="15" rx="2" stroke={color} strokeWidth="1.5" />
      <path d={`M${D_NAV_PANEL_DIVIDER_X} 4.5v15`} stroke={color} strokeWidth="1.5" />
      {children}
    </>
  );
}

function DNavPanelToggleIcon({ expanded, size = NAV_ICON, color = NAV_TEXT_INACTIVE }) {
  const glyph = navGlyphSize(size);
  const centerX = expanded ? D_NAV_PANEL_LEFT_CENTER_X : D_NAV_PANEL_RIGHT_CENTER_X;
  const direction = expanded ? "left" : "right";
  return (
    <svg width={glyph} height={glyph} viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <DNavPanelIconFrame color={color}>
        <path d={dNavPanelChevronPath(centerX, direction)} stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
      </DNavPanelIconFrame>
    </svg>
  );
}

function DNavPanelToggleButton({ expanded, onClick, tooltipOffsetX = 8 }) {
  const shell = useShell();
  const iconColor = shell.isNazgul ? shell.textSecondary : shell.navIconInactive;
  const toggleAriaLabel = expanded ? "Collapse navigation" : "Expand navigation";
  const tooltip = expanded ? D_NAV_COLLAPSE_TOOLTIP : D_NAV_EXPAND_TOOLTIP;

  return (
    <Tooltip label={tooltip} enabled={true} delayMs={D_NAV_BRAND_TOOLTIP_DELAY_MS} shrinkWrap offsetX={tooltipOffsetX}>
      <button
        type="button"

function CompanySwitcher({ companies, activeCompany, onSwitch, collapsed, onOpenChange, alignLogoWithNav = false, compact = false, iconOnly = false, anchorIconExpandRight = false, iconOnlyFlyoutBelow = false, buttonRef = null }) {
  const shell = useShell();
  const [open, setOpen] = useState(false);
  const [hovered, setHovered] = useState(false);
  const [search, setSearch] = useState("");
  const [dropPos, setDropPos] = useState({ top: 0, left: 0 });
  const ref = useRef(null);
  const btnRef = useRef(null);
  const searchRef = useRef(null);
  const assignButtonRef = (node) => {
    btnRef.current = node;
    if (buttonRef) buttonRef.current = node;
  };

  // Company marks (D) replace SKU logos in the switcher.
  const activeCo = companies.find(c => c.name === activeCompany);
  const anchoredExpand = anchorIconExpandRight;
  const revealDetails = anchoredExpand ? !iconOnly : (!collapsed && !iconOnly);
  const showLabel = anchoredExpand || (!collapsed && !iconOnly);
  const showChevron = anchoredExpand || (!collapsed && !iconOnly);
  const effectiveIconOnly = iconOnly && !anchoredExpand;
  const showIconTooltip = iconOnly && !open && (!anchoredExpand || !revealDetails);

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) {
        // Also check if click is inside the fixed dropdown
        const drop = document.getElementById("company-dropdown");
        if (drop && drop.contains(e.target)) return;
        setOpen(false);
      }
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  useEffect(() => {
    if (open && searchRef.current) setTimeout(() => searchRef.current && searchRef.current.focus(), 50);
    if (!open) setSearch("");
  }, [open]);

  const computeDropPos = React.useCallback(() => {
    if (!btnRef.current) return { top: 0, left: 0 };
    const r = btnRef.current.getBoundingClientRect();
    if (iconOnlyFlyoutBelow || anchorIconExpandRight) {
      return { top: r.bottom + 4, left: r.left };
    }
    if (collapsed) {
      return { top: r.top, left: r.right + 4 };
    }
    return { top: r.bottom + 4, left: r.left };
  }, [collapsed, anchorIconExpandRight, iconOnlyFlyoutBelow]);

  const updateDropPos = React.useCallback(() => {
    setDropPos(computeDropPos());
  }, [computeDropPos]);

  useEffect(() => {
    if (!open) return;
    updateDropPos();
    window.addEventListener("resize", updateDropPos);
    window.addEventListener("scroll", updateDropPos, true);
    return () => {
      window.removeEventListener("resize", updateDropPos);
      window.removeEventListener("scroll", updateDropPos, true);
    };
  }, [open, updateDropPos]);

  useEffect(() => {
    if (typeof onOpenChange === "function") onOpenChange(open);
  }, [open, onOpenChange]);

  const filtered = companies.filter(co =>
    co.name.toLowerCase().includes(search.toLowerCase()) ||
    co.sku.toLowerCase().includes(search.toLowerCase())
  );

  const ROW_HEIGHT = 48;
  const MAX_VISIBLE = 10;
  const listMaxHeight = ROW_HEIGHT * MAX_VISIBLE;

  const ddBg = shell.isNazgul ? shell.searchBarBg : "white";
  const ddBorder = shell.isNazgul ? shell.searchBarBorder : "1px solid #BABEC5";
  const ddShadow = shell.isNazgul
    ? "0 12px 40px rgba(0,0,0,0.55), 0 1px 4px rgba(0,0,0,0.4)"
    : "0 8px 32px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08)";
  const ddHeaderBorder = shell.isNazgul ? "1px solid rgba(255,255,255,0.1)" : "1px solid #eef1f3";
  const searchInnerBg = shell.isNazgul ? "rgba(0,0,0,0.28)" : "#f5f7f8";
  const searchInnerBorder = shell.isNazgul ? "1px solid rgba(255,255,255,0.1)" : "1px solid #e4eaee";
  const searchIconStroke = shell.isNazgul ? "#9AA0A6" : "#8e9aa4";

  const switcherButton = (
    <div ref={assignButtonRef} onClick={() => { if (!open) setDropPos(computeDropPos()); setOpen(!open); }}
      onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{
        display: "flex",
        flexDirection: "row",
        alignItems: "center",
        gap: revealDetails ? 8 : 0,
        width: anchoredExpand ? "auto" : (effectiveIconOnly || compact ? "auto" : (collapsed ? "calc(100% - 8px)" : "100%")),
        maxWidth: anchoredExpand || compact ? 220 : undefined,
        marginLeft: collapsed && !anchoredExpand ? 4 : 0,
        marginRight: collapsed && !anchoredExpand ? 4 : 0,
        paddingLeft: anchoredExpand ? 0 : (collapsed || effectiveIconOnly ? 0 : (compact ? 0 : (alignLogoWithNav ? COMPANY_LOGO_NAV_ALIGN_INSET : 0))),
        paddingRight: anchoredExpand ? 4 : (collapsed || effectiveIconOnly ? 0 : 4),
        paddingTop: 4, paddingBottom: 4,
        cursor: "pointer", borderRadius: 6,
        backgroundColor: hovered ? shell.hoverBg : "transparent",
        transition: `background-color 150ms ease, gap ${TRANSITION}, padding ${TRANSITION}, width ${TRANSITION}, margin ${TRANSITION}, max-width ${TRANSITION}`,
        userSelect: "none", overflow: "hidden",
        justifyContent: anchoredExpand ? "flex-start" : (collapsed || effectiveIconOnly ? "center" : "flex-start"),
        boxSizing: "border-box",
      }}>
      <div style={{ flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <CompanyMarkIcon companyId={activeCo?.id || "acme"} size={NAV_ICON} usePrimaryStyle={true} />
      </div>
      {showLabel ? (
        <span style={{
          flex: anchoredExpand ? "0 1 auto" : (collapsed ? 0 : 1),
          minWidth: 0,
          maxWidth: anchoredExpand ? (revealDetails ? 180 : 0) : undefined,
          opacity: anchoredExpand ? (revealDetails ? 1 : 0) : 1,
          fontFamily: FONT, fontWeight: 400, fontSize: compact ? 12 : 14, lineHeight: 1.3, color: shell.textPrimary,
          overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
          transition: `max-width ${TRANSITION}, opacity ${TRANSITION}`,
        }}>
          {activeCompany}
        </span>
      ) : null}
      {showChevron ? (
        <div style={{
          flexShrink: 0,
          width: NAV_ICON,
          height: NAV_ICON,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          transition: "transform 200ms ease, opacity 150ms ease",
          transform: open ? "rotate(180deg)" : "rotate(0)",
          opacity: revealDetails && (hovered || open) ? 1 : 0,
          pointerEvents: "none",

}) {

function AnimatedNavSection({ isOpen, collapsed, measureDep, children }) {
  const contentRef = useRef(null);
  const [height, setHeight] = useState(0);
  const effectiveOpen = isOpen && !collapsed;
  useEffect(() => {
    if (contentRef.current) setHeight(effectiveOpen ? contentRef.current.scrollHeight : 0);
  }, [effectiveOpen, measureDep]);
  useEffect(() => {
    if (!effectiveOpen || !contentRef.current || typeof ResizeObserver === "undefined") return undefined;
    const node = contentRef.current;
    const observer = new ResizeObserver(() => {
      if (contentRef.current) setHeight(contentRef.current.scrollHeight);
    });
    observer.observe(node);
    return () => observer.disconnect();
  }, [effectiveOpen, measureDep]);
  useEffect(() => {
    if (!effectiveOpen) return;
    const onResize = () => {
      if (contentRef.current) setHeight(contentRef.current.scrollHeight);
    };
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [effectiveOpen]);
  return (
    <div style={{ overflow: "hidden", transition: `height 220ms cubic-bezier(0.4, 0, 0.2, 1)`, height: height + "px" }}>
      <div ref={contentRef} style={{ display: "flex", flexDirection: "column", gap: 4, paddingTop: 6 }}>
        {children}
      </div>
    </div>
  );
}

function ClickInfoTooltip({ label }) {
  const [open, setOpen] = useState(false);
  const [pos, setPos] = useState({ top: 0, left: 0 });
  const btnRef = useRef(null);
  const tipRef = useRef(null);
  const tipMaxWidth = 280;

  const computePos = React.useCallback(() => {
    if (!btnRef.current) return { top: 0, left: 0 };
    const r = btnRef.current.getBoundingClientRect();
    let left = r.left + (r.width / 2) - (tipMaxWidth / 2);
    left = Math.max(8, Math.min(left, window.innerWidth - tipMaxWidth - 8));
    return { top: r.bottom + 8, left };
  }, []);

  useLayoutEffect(() => {
    if (!open) return;
    setPos(computePos());
  }, [open, computePos]);

  useEffect(() => {
    if (!open) return;
    const onResize = () => setPos(computePos());
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [open, computePos]);

  useEffect(() => {
    if (!open) return;
    const onDocPointerDown = (event) => {
      if (btnRef.current && btnRef.current.contains(event.target)) return;
      if (tipRef.current && tipRef.current.contains(event.target)) return;
      setOpen(false);
    };
    document.addEventListener("mousedown", onDocPointerDown);
    return () => document.removeEventListener("mousedown", onDocPointerDown);
  }, [open]);

  const toggleOpen = (event) => {
    event.preventDefault();
    event.stopPropagation();
    if (open) {
      setOpen(false);
      return;
    }
    setPos(computePos());
    setOpen(true);
  };

  return (
    <>
      <button
        ref={btnRef}
        type="button"
        className="section-behavior-info-btn"
        aria-label="More information"
        aria-expanded={open}
        onClick={toggleOpen}
      >
        <IdsInfoIcon size={16} />
      </button>
      {open ? (
        <div
          ref={tipRef}
          role="tooltip"
          style={{
            position: "fixed",
            top: pos.top,
            left: pos.left,
            width: tipMaxWidth,
            backgroundColor: "#2B2D30",
            color: "white",
            fontSize: 12,
            fontFamily: "'Avenir Next forINTUIT', 'Avenir Next', sans-serif",
            fontWeight: 400,
            lineHeight: 1.45,
            padding: "8px 12px",
            borderRadius: 6,
            whiteSpace: "normal",
            pointerEvents: "auto",
            zIndex: 6000,
            boxShadow: "0 2px 8px rgba(0,0,0,0.18)",
            animation: "clickTooltipIn 150ms ease-out",
          }}
        >
          {label}
        </div>
      ) : null}
    </>
  );
}

function computeTooltipSidePos(anchorRect, label, offsetX = 4) {
  const tipW = measureTooltipLabelWidth(label);
  let left = anchorRect.right + offsetX;
  left = Math.max(TOOLTIP_VIEWPORT_MARGIN, Math.min(left, window.innerWidth - TOOLTIP_VIEWPORT_MARGIN - tipW));
  return {
    top: anchorRect.top + anchorRect.height / 2,
    left,
    transform: "translateY(-50%)",
  };
}

function Tooltip({ label, enabled, children, delayMs = 100, shrinkWrap = false, offsetX = 4 }) {
  const [show, setShow] = useState(false);
  const [pos, setPos] = useState({ top: 0, left: 0, transform: "translateY(-50%)" });
  const timerRef = useRef(null);
  const elRef = useRef(null);

  const handleEnter = () => {
    if (!enabled) return;
    timerRef.current = setTimeout(() => {
      if (elRef.current) {
        setPos(computeTooltipSidePos(elRef.current.getBoundingClientRect(), label, offsetX));
      }
      setShow(true);
    }, delayMs);
  };
  const handleLeave = () => {
    clearTimeout(timerRef.current);
    setShow(false);
  };

  useEffect(() => () => clearTimeout(timerRef.current), []);

  const tooltipNode = show && enabled ? (
    <div style={{
      position: "fixed", top: pos.top, left: pos.left,
      transform: pos.transform,
      backgroundColor: "#2B2D30", color: "white",
      fontSize: 12, fontFamily: "'Avenir Next forINTUIT', 'Avenir Next', sans-serif", fontWeight: 400,
      padding: "4px 10px", borderRadius: 5, whiteSpace: "nowrap",
      pointerEvents: "none", zIndex: 10000,
      animation: "tooltipIn 150ms ease-out",
      boxShadow: "0 2px 8px rgba(0,0,0,0.18)",
    }}>
      {label}
    </div>
  ) : null;

  return (
    <div
      ref={elRef}
      onMouseEnter={handleEnter}
      onMouseLeave={handleLeave}
      style={shrinkWrap ? { display: "inline-flex", width: "fit-content", verticalAlign: "top" } : undefined}
    >
      {children}
      {tooltipNode && typeof ReactDOM.createPortal === "function"
        ? ReactDOM.createPortal(tooltipNode, document.body)
        : tooltipNode}
    </div>
  );
}

const TOOLTIP_LABEL_FONT = "400 12px 'Avenir Next forINTUIT', 'Avenir Next', sans-serif";
const TOOLTIP_ABOVE_GAP = 6;
const TOOLTIP_VIEWPORT_MARGIN = 8;

function measureTooltipLabelWidth(label) {
  measureTooltipLabelWidth._cache = measureTooltipLabelWidth._cache || new Map();
  if (measureTooltipLabelWidth._cache.has(label)) return measureTooltipLabelWidth._cache.get(label);
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  ctx.font = TOOLTIP_LABEL_FONT;
  const width = ctx.measureText(label).width + 20;
  measureTooltipLabelWidth._cache.set(label, width);
  return width;
}

function computeTooltipAbovePos(anchorRect, label) {
  const tipW = measureTooltipLabelWidth(label);
  const halfW = tipW / 2;
  let centerX = anchorRect.left + anchorRect.width / 2;
  centerX = Math.max(TOOLTIP_VIEWPORT_MARGIN + halfW, Math.min(centerX, window.innerWidth - TOOLTIP_VIEWPORT_MARGIN - halfW));
  return {
    top: anchorRect.top,
    left: centerX,
    transform: "translate(-50%, calc(-100% - " + TOOLTIP_ABOVE_GAP + "px))",
  };
}

function TooltipAbove({ label, enabled = true, children, delayMs = 100, fillWidth = false, onWrapMouseEnter, onWrapMouseLeave }) {
  const [show, setShow] = useState(false);
  const [pos, setPos] = useState({ top: 0, left: 0, transform: "translate(-50%, calc(-100% - 6px))" });
  const timerRef = useRef(null);
  const elRef = useRef(null);

  const handleEnter = () => {
    if (typeof onWrapMouseEnter === "function") onWrapMouseEnter();
    if (!enabled) return;
    timerRef.current = setTimeout(() => {
      if (elRef.current) {
        setPos(computeTooltipAbovePos(elRef.current.getBoundingClientRect(), label));
      }
      setShow(true);
    }, delayMs);
  };
  const handleLeave = () => {
    if (typeof onWrapMouseLeave === "function") onWrapMouseLeave();
    clearTimeout(timerRef.current);
    setShow(false);
  };

  useEffect(() => () => clearTimeout(timerRef.current), []);

  const tooltipNode = show && enabled ? (
    <div style={{
      position: "fixed", top: pos.top, left: pos.left,
      transform: pos.transform,
      backgroundColor: "#2B2D30", color: "white",
      fontSize: 12, fontFamily: "'Avenir Next forINTUIT', 'Avenir Next', sans-serif", fontWeight: 400,
      padding: "4px 10px", borderRadius: 5, whiteSpace: "nowrap",
      pointerEvents: "none", zIndex: 10000,
      animation: "tooltipAboveIn 150ms ease-out",
      boxShadow: "0 2px 8px rgba(0,0,0,0.18)",
    }}>
      {label}
    </div>
  ) : null;

  return (
    <div
      ref={elRef}
      onMouseEnter={handleEnter}
      onMouseLeave={handleLeave}
      style={{
        display: "flex",
        width: fillWidth ? "100%" : "fit-content",
        minWidth: fillWidth ? 0 : undefined,
        height: fillWidth ? "100%" : undefined,
        alignSelf: fillWidth ? "stretch" : undefined,
        verticalAlign: fillWidth ? undefined : "top",
      }}
    >
      {children}
      {tooltipNode && typeof ReactDOM.createPortal === "function"
        ? ReactDOM.createPortal(tooltipNode, document.body)
        : tooltipNode}
    </div>
  );
}

const LIVE_EXPERTS_TOOLTIP = "Ask Live Expert";

function measureLiveExpertTooltipWidth() {
  if (measureLiveExpertTooltipWidth._w != null) return measureLiveExpertTooltipWidth._w;
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  ctx.font = "400 12px 'Avenir Next forINTUIT', 'Avenir Next', sans-serif";
  measureLiveExpertTooltipWidth._w = ctx.measureText(LIVE_EXPERTS_TOOLTIP).width + 20;
  return measureLiveExpertTooltipWidth._w;
}

function computeLiveExpertTooltipPos(anchor, placement) {
  const margin = 12;
  const gap = 8;
  const tipW = measureLiveExpertTooltipWidth();
  const tipH = 28;

  if (placement === "below") {
    const top = anchor.bottom + gap;
    let left = anchor.left + anchor.width / 2;
    const halfW = tipW / 2;
    left = Math.max(margin + halfW, Math.min(left, window.innerWidth - margin - halfW));
    return { top, left, transform: "translateX(-50%)" };
  }

  const left = anchor.right + gap;
  let top = anchor.top + anchor.height / 2;
  const halfH = tipH / 2;
  top = Math.max(margin + halfH, Math.min(top, window.innerHeight - margin - halfH));
  return { top, left, transform: "translateY(-50%)" };
}

function ETopNavTitleRow({ label, shell, children, pinActionsVisible = false }) {
  const [hovered, setHovered] = useState(false);
  const [focusWithin, setFocusWithin] = useState(false);
  const rowRef = useRef(null);
  const showActions = pinActionsVisible || hovered || focusWithin;

  useEffect(() => {
    if (pinActionsVisible) return;
    setFocusWithin(false);
    const active = document.activeElement;
    if (active instanceof HTMLElement && rowRef.current?.contains(active)) {
      active.blur();
    }
  }, [pinActionsVisible]);

  return (
    <div
      ref={rowRef}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      onFocusCapture={() => setFocusWithin(true)}
      onBlurCapture={(e) => {
        if (!e.currentTarget.contains(e.relatedTarget)) setFocusWithin(false);

        ...E_TOP_NAV_TITLE_ROW_STYLE,

  );

function EqualWidthIconPillTabBar({ value, onChange, shell, bookmarksAddedPulseKey = 0, titleActions = null, titleActionsPinned = false, headerBelowTitle = null, tabsDisabled = false, scrollContentInsetCompact = false, tabsRowPaddingTop = E_TOP_NAV_PILL_PADDING_TOP }) {
  const [hoveredId, setHoveredId] = useState(null);
  const prevBookmarksPulseKeyRef = useRef(bookmarksAddedPulseKey);
  const [bookmarksIconPulse, setBookmarksIconPulse] = useState(false);
  const activeTab = TABS.find((tab) => tab.id === value) || TABS[0];
  const tabsRowHeight = tabsRowPaddingTop + PILL_HEIGHT;

  useEffect(() => {
    if (tabsDisabled) setHoveredId(null);
  }, [tabsDisabled]);

  useEffect(() => {
    if (bookmarksAddedPulseKey <= prevBookmarksPulseKeyRef.current) return undefined;
    prevBookmarksPulseKeyRef.current = bookmarksAddedPulseKey;
    setBookmarksIconPulse(false);
    const frame = requestAnimationFrame(() => setBookmarksIconPulse(true));
    return () => cancelAnimationFrame(frame);
  }, [bookmarksAddedPulseKey]);

  const tablistStyle = {
    display: "flex",
    alignItems: "center",
    justifyContent: "flex-start",
    flexWrap: "nowrap",
    gap: PILL_GAP,
    marginLeft: NAV_ITEM_ROW_MARGIN,
    marginRight: NAV_ITEM_ROW_MARGIN,
    width: "calc(100% - " + (NAV_ITEM_ROW_MARGIN * 2) + "px)",
    boxSizing: "border-box",
  };

  const titleGridStyle = {
    display: "grid",
    gridTemplateColumns: "repeat(4, minmax(0, 1fr))",
    gap: PILL_GAP,
    marginLeft: NAV_ITEM_ROW_MARGIN,
    marginRight: NAV_ITEM_ROW_MARGIN,
    width: "calc(100% - " + (NAV_ITEM_ROW_MARGIN * 2) + "px)",
    boxSizing: "border-box",
  };

  return (
    <div>
      <div
        role="tablist"
        aria-label="Top navigation"
        aria-disabled={tabsDisabled}
        onMouseLeave={() => setHoveredId(null)}
        style={{
          ...tablistStyle,
          maxHeight: tabsRowHeight,
          opacity: tabsDisabled ? E_TOP_NAV_TABS_DISABLED_OPACITY : 1,
          paddingTop: tabsRowPaddingTop,
          pointerEvents: tabsDisabled ? "none" : "auto",
          transition: editTabsTransition,
        }}
      >
        {TABS.map((tab) => {
          const isActive = value === tab.id;
          const isHovered = hoveredId === tab.id;
          const isEmphasis = isActive || isHovered;
          const Icon = tab.Icon;
          const pillWidth = isActive ? PILL_ACTIVE_MIN_WIDTH : PILL_INACTIVE_WIDTH;
          const pillPadX = isActive ? PILL_ACTIVE_PAD_X : PILL_INACTIVE_PAD_X;
          let pillBg = "transparent";
          if (!tabsDisabled && isActive) pillBg = shell.activeRowBg;
          else if (!tabsDisabled && isHovered) pillBg = shell.pillHoverBg;

          return (
            <TooltipAbove
              key={tab.id}
              label={tab.label}
              enabled={!isActive && !tabsDisabled}
              fillWidth={false}
              onWrapMouseEnter={() => { if (!tabsDisabled) setHoveredId(tab.id); }}
              onWrapMouseLeave={() => setHoveredId((prev) => (prev === tab.id ? null : prev))}
            >
              <button
                type="button"
                role="tab"
                aria-selected={isActive}
                aria-disabled={tabsDisabled}
                aria-label={tab.label}
                className={"equal-pill-btn" + (isActive ? " is-active-tab" : " is-inactive-tab")}
                disabled={tabsDisabled}
                onClick={() => { if (tabsDisabled) return; onChange(tab.id); }}
                onFocus={() => { if (!tabsDisabled) setHoveredId(tab.id); }}
                onBlur={() => setHoveredId((prev) => (prev === tab.id ? null : prev))}
                style={{
                  width: pillWidth,
                  height: PILL_HEIGHT,
                  paddingLeft: pillPadX,
                  paddingRight: pillPadX,
                  borderRadius: isActive ? 9999 : PILL_INACTIVE_HOVER_RADIUS,
                  backgroundColor: pillBg,
                  cursor: tabsDisabled ? "not-allowed" : "pointer",
                  overflow: tab.id === "bookmarks" ? "visible" : undefined,
                }}
              >
                {tab.id === "bookmarks" ? (
                  <span
                    className={bookmarksIconPulse ? "d-top-nav-bookmarks-tab-icon--pulse" : undefined}
                    onAnimationEnd={(event) => { if (event.animationName === "dBookmarkIconPulse") setBookmarksIconPulse(false); }}
                    style={{ display: "inline-flex", transformOrigin: "center center" }}
                  >
                    <Icon active={isActive} emphasized={!tabsDisabled && isEmphasis} shell={shell} />
                  </span>

                  <Icon active={isActive} emphasized={!tabsDisabled && isEmphasis} shell={shell} />
                )}

            </TooltipAbove>

        })}
      </div>

      <div
        aria-live="polite"
        style={{
          ...titleGridStyle,
          paddingTop: E_TOP_NAV_HEADER_UNDER_PILLS,
          paddingBottom: scrollContentInsetCompact ? E_TOP_NAV_EDIT_HEADER_SCROLL_CLIP : E_TOP_NAV_HEADER_SCROLL_CLIP,

function DTopNavSegmentedControl({ value, onChange, shell, bookmarksAddedPulseKey = 0 }) {
  const segments = [
    { id: "home", label: "Home" },
    { id: "bookmarks", label: "Bookmarks" },
    { id: "tasks", label: "Tasks" },
  ];
  const tablistRef = useRef(null);
  const tabRefs = useRef({});
  const indicatorElRef = useRef(null);
  const indicatorMetricsRef = useRef({ left: 0, width: 0, ready: false });
  const prevValueRef = useRef(value);
  const pendingTravelToRef = useRef(null);
  const travelAnimRef = useRef(null);
  const prevBookmarksPulseKeyRef = useRef(bookmarksAddedPulseKey);
  const [indicator, setIndicator] = useState({ left: 0, width: 0, ready: false });
  const [travelAnim, setTravelAnim] = useState(null);
  const [bookmarksLabelPulse, setBookmarksLabelPulse] = useState(false);

  useEffect(() => {
    if (bookmarksAddedPulseKey <= prevBookmarksPulseKeyRef.current) return undefined;
    prevBookmarksPulseKeyRef.current = bookmarksAddedPulseKey;
    setBookmarksLabelPulse(false);
    const frame = requestAnimationFrame(() => setBookmarksLabelPulse(true));
    return () => cancelAnimationFrame(frame);
  }, [bookmarksAddedPulseKey]);

  useEffect(() => {
    travelAnimRef.current = travelAnim;
  }, [travelAnim]);

  const readTabMetrics = useCallback((segmentId) => {
    const listEl = tablistRef.current;
    const tabEl = tabRefs.current[segmentId];
    if (!listEl || !tabEl) return null;
    const listRect = listEl.getBoundingClientRect();
    const tabRect = tabEl.getBoundingClientRect();
    const overscan = D_TOP_NAV_TAB_INDICATOR_OVERSCAN[segmentId] || 0;
    const left = Math.max(0, tabRect.left - listRect.left - overscan);
    const right = Math.min(listRect.width, tabRect.right - listRect.left + overscan);
    return {
      left,
      width: Math.max(0, right - left),
    };
  }, []);

  const snapIndicator = useCallback((segmentId) => {
    const metrics = readTabMetrics(segmentId);
    if (!metrics) return;
    const next = { ...metrics, ready: true };
    indicatorMetricsRef.current = next;
    setIndicator(next);
  }, [readTabMetrics]);

  const beginTravel = useCallback((from, to) => {
    const fromRight = from.left + from.width;
    const toRight = to.left + to.width;
    const movingRight = (to.left + to.width / 2) >= (from.left + from.width / 2);
    const stretchLeft = movingRight ? from.left : to.left;
    const stretchWidth = movingRight ? (toRight - from.left) : (fromRight - to.left);
    const travelStyle = {
      "--ind-from-left": from.left + "px",
      "--ind-from-width": from.width + "px",
      "--ind-stretch-left": stretchLeft + "px",
      "--ind-stretch-width": Math.max(stretchWidth, from.width, to.width) + "px",
      "--ind-to-left": to.left + "px",
      "--ind-to-width": to.width + "px",
    };
    pendingTravelToRef.current = to;
    setTravelAnim({ key: Date.now(), style: travelStyle });
    setIndicator({ ...from, ready: true });
  }, []);

  useLayoutEffect(() => {
    if (prevValueRef.current === value) {
      if (!travelAnimRef.current) snapIndicator(value);
      return;
    }

    let from = indicatorMetricsRef.current;
    if (travelAnimRef.current && pendingTravelToRef.current) {
      from = { ...pendingTravelToRef.current, ready: true };
    }
    const to = readTabMetrics(value);
    prevValueRef.current = value;

    if (!to) return;
    if (!from.ready) {
      snapIndicator(value);
      return;
    }

    beginTravel(from, to);
  }, [value, readTabMetrics, snapIndicator, beginTravel]);

  useEffect(() => {
    indicatorMetricsRef.current = indicator;
  }, [indicator]);

  useEffect(() => {
    if (!travelAnim) return undefined;
    const el = indicatorElRef.current;
    if (!el) return undefined;

    const handleAnimationEnd = (event) => {
      if (event.target !== el || event.animationName !== "dTopNavTabIndicatorTravel") return;
      const to = pendingTravelToRef.current;
      if (to) {
        const next = { ...to, ready: true };
        indicatorMetricsRef.current = next;
        setIndicator(next);
      }
      pendingTravelToRef.current = null;
      setTravelAnim(null);
    };

    el.addEventListener("animationend", handleAnimationEnd);
    return () => el.removeEventListener("animationend", handleAnimationEnd);
  }, [travelAnim]);

  useEffect(() => {
    const listEl = tablistRef.current;
    if (!listEl || typeof ResizeObserver === "undefined") {
      const onResize = () => { if (!travelAnim) snapIndicator(value); };
      window.addEventListener("resize", onResize);
      return () => window.removeEventListener("resize", onResize);
    }
    const observer = new ResizeObserver(() => {
      if (!travelAnim) snapIndicator(value);
    });
    observer.observe(listEl);
    const onResize = () => { if (!travelAnim) snapIndicator(value); };
    window.addEventListener("resize", onResize);
    return () => {
      observer.disconnect();
      window.removeEventListener("resize", onResize);
    };
  }, [value, snapIndicator, travelAnim]);

  const indicatorColor = shell.isNazgul ? "#E8EAED" : "#16587A";
  const isTraveling = !!travelAnim;
  const [hoveredTabId, setHoveredTabId] = useState(null);

  return (
    <div
      ref={tablistRef}
      role="tablist"
      aria-label="Top navigation"
      style={{
        position: "relative",
        display: "flex",
        alignItems: "stretch",
        marginLeft: NAV_ITEM_ROW_MARGIN,
        marginRight: NAV_ITEM_ROW_MARGIN,
        boxSizing: "border-box",
        width: `calc(100% - ${NAV_ITEM_ROW_MARGIN * 2}px)`,
        minHeight: NAV_ROW_MIN_H - 4 + D_TOP_NAV_TAB_INDICATOR_HEIGHT,
        flexShrink: 0,
        borderBottom: shell.isNazgul ? "1px solid rgba(255,255,255,0.08)" : "1px solid #E9EDF0",
      }}
    >
      {segments.map((segment) => {
        const isActive = value === segment.id;
        const isHovered = hoveredTabId === segment.id;
        return (
          <button
            key={segment.id}
            ref={(el) => { tabRefs.current[segment.id] = el; }}
            type="button"
            role="tab"
            aria-selected={isActive}
            onClick={() => onChange(segment.id)}
            onMouseEnter={() => setHoveredTabId(segment.id)}
            onMouseLeave={() => setHoveredTabId((prev) => (prev === segment.id ? null : prev))}
            style={{
              flex: "1 1 0",
              minWidth: 0,
              margin: 0,
              padding: "0 4px",
              paddingBottom: D_TOP_NAV_TAB_BUTTON_PB,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              border: "none",
              borderRadius: 0,
              backgroundColor: "transparent",
              cursor: "pointer",
            }}
          >
            <span
              className={segment.id === "bookmarks" && bookmarksLabelPulse ? "d-top-nav-bookmarks-tab-label--pulse" : undefined}
              onAnimationEnd={segment.id === "bookmarks" ? (event) => {
                if (event.animationName === "dBookmarksTabPulse") setBookmarksLabelPulse(false);
              } : undefined}
              style={{
              display: "inline-flex",
              alignItems: "center",
              justifyContent: "center",
              padding: D_SEG_INNER_BUTTON_PY + "px " + D_SEG_INNER_BUTTON_PX + "px",
              borderRadius: 6,
              backgroundColor: !isActive && isHovered ? shell.hoverBg : "transparent",
              color: isActive || isHovered ? shell.navTextActive : shell.navTextInactive,
              fontFamily: FONT,
              fontSize: NAV_L0_FONT_SIZE,
              fontWeight: isActive ? NAV_L0_FONT_WEIGHT : NAV_L1_FONT_WEIGHT,
              lineHeight: "20px",
              whiteSpace: "nowrap",
              transition: "color 150ms ease, background-color 150ms ease, font-weight 180ms ease",
            }}>
              {segment.label}
            </span>
          </button>
        );
      })}
      <div
        key={travelAnim ? travelAnim.key : "idle"}
        ref={indicatorElRef}
        aria-hidden="true"
        className={"d-top-nav-tab-indicator" + (isTraveling ? " is-traveling" : "")}
        style={{
          ...(isTraveling ? travelAnim.style : { left: indicator.left, width: indicator.width }),
          opacity: indicator.ready ? 1 : 0,
          backgroundColor: indicatorColor,
        }}
      />
    </div>
  );
}

function PanelResizeHandleHint({ enabled = true, isResizing = false, onMouseEnter, onMouseLeave, onMouseDown, style, children }) {
  const [hintVisible, setHintVisible] = useState(false);
  const [cursorPos, setCursorPos] = useState({ x: 0, y: 0 });
  const hintTimerRef = useRef(null);

  const clearHintTimer = () => {
    if (hintTimerRef.current) {
      clearTimeout(hintTimerRef.current);
      hintTimerRef.current = null;
    }
  };

  const hideHint = () => {
    clearHintTimer();
    setHintVisible(false);
  };

  useEffect(() => {
    if (isResizing) hideHint();
  }, [isResizing]);

  useEffect(() => () => clearHintTimer(), []);

  const handleEnter = (event) => {
    if (typeof onMouseEnter === "function") onMouseEnter(event);
    if (!enabled || isResizing) return;
    clearHintTimer();
    setCursorPos({ x: event.clientX, y: event.clientY });
    hintTimerRef.current = setTimeout(() => setHintVisible(true), 600);
  };

  const handleMove = (event) => {
    setCursorPos({ x: event.clientX, y: event.clientY });
  };

  const handleLeave = (event) => {
    hideHint();
    if (typeof onMouseLeave === "function") onMouseLeave(event);
  };

  const handleDown = (event) => {
    hideHint();
    if (typeof onMouseDown === "function") onMouseDown(event);
  };

  const hintNode = hintVisible && enabled && !isResizing ? (
    <div
      role="tooltip"
      style={{
        position: "fixed",
        top: cursorPos.y,
        left: cursorPos.x + 12,
        transform: "translateY(-50%)",
        backgroundColor: "#2B2D30",
        color: "#FFFFFF",
        fontSize: 12,
        fontFamily: FONT,
        fontWeight: 400,
        lineHeight: 1.35,
        padding: "6px 10px",
        borderRadius: 5,
        pointerEvents: "none",
        zIndex: 10000,
        boxShadow: "0 2px 8px rgba(0,0,0,0.18)",
        animation: "tooltipIn 150ms ease-out",
      }}
    >
      <div style={{ whiteSpace: "nowrap" }}>⌘ + \ to expand or collapse.</div>
      <div>Drag to resize.</div>
    </div>
  ) : null;

  return (
    <React.Fragment>
      <div
        onMouseEnter={handleEnter}
        onMouseMove={handleMove}
        onMouseLeave={handleLeave}
        onMouseDown={handleDown}
        style={style}
      >
        {children}
      </div>
      {hintNode && typeof ReactDOM.createPortal === "function" ? ReactDOM.createPortal(hintNode, document.body) : hintNode}
    </React.Fragment>
  );
}

function ConnectorPolicyGlyph({ symbol, active, size = 13, color }) {
  const glyphProps = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", xmlns: "http://www.w3.org/2000/svg", "aria-hidden": true, style: { display: "block", color } };
  if (symbol === "checkmark.circle") {
    return (
      <svg {...glyphProps}>
        <path transform={SF_CHECKMARK_CIRCLE_TRANSFORM} d={active ? SF_CHECKMARK_CIRCLE_FILL_PATH : SF_CHECKMARK_CIRCLE_PATH} fill="currentColor" />
      </svg>
    );
  }
  if (symbol === "hand.raised") {
    return (
      <svg {...glyphProps}>
        <path transform={active ? SF_HAND_RAISED_FILL_TRANSFORM : SF_HAND_RAISED_TRANSFORM} d={active ? SF_HAND_RAISED_FILL_PATH : SF_HAND_RAISED_PATH} fill="currentColor" />
      </svg>
    );
  }
  return (
    <svg {...glyphProps}>
      <path transform={SF_CHECKMARK_CIRCLE_TRANSFORM} d={SF_NOSIGN_PATH} fill="currentColor" />
    </svg>
  );
}

function ConnectorPolicySegment({ value, onChange }) {
  const shell = useShell();
  const trackBg = shell.isNazgul ? "rgba(255,255,255,0.08)" : "rgba(57,58,61,0.06)";
  const activeBg = shell.isNazgul ? "rgba(255,255,255,0.18)" : "rgba(57,58,61,0.12)";
  const iconActive = shell.isNazgul ? "#FFFFFF" : TEXT_PRIMARY;
  const iconInactive = shell.isNazgul ? "rgba(255,255,255,0.55)" : TEXT_SECONDARY;
  return (
    <div
      role="group"
      aria-label="Permission policy"
      style={{ display: "inline-flex", alignItems: "center", padding: 2, gap: 1, borderRadius: 8, backgroundColor: trackBg, flexShrink: 0 }}
      onClick={(event) => event.stopPropagation()}
    >
      {CONNECTOR_POLICY_OPTIONS.map((option) => {
        const isActive = value === option.id;
        return (
          <TooltipAbove key={option.id} label={option.label}>
            <button
              type="button"
              aria-label={option.label}
              aria-pressed={isActive}
              onClick={(event) => { event.stopPropagation(); onChange(option.id); }}
              style={{
                width: 28,
                height: 24,
                border: "none",
                borderRadius: 6,
                padding: 0,
                display: "inline-flex",
                alignItems: "center",
                justifyContent: "center",
                cursor: "pointer",
                backgroundColor: isActive ? activeBg : "transparent",
                transition: "background-color 150ms ease",
              }}
            >
              <ConnectorPolicyGlyph symbol={option.symbol} active={isActive} color={isActive ? iconActive : iconInactive} />
            </button>
          </TooltipAbove>
        );
      })}
    </div>
  );
}

function DTasksNavPanel() {
  const shell = useShell();
  const [checkedTaskIds, setCheckedTaskIds] = useState(() => new Set());
  const [exitingTaskPhases, setExitingTaskPhases] = useState({});
  const exitTimerRef = useRef({});
  const exitHandledRef = useRef(new Set());
  const [expandedSectionIds, setExpandedSectionIds] = useState(() => new Set(D_TASK_NAV_SECTIONS.map((section) => section.id)));
  const [hoveredSectionId, setHoveredSectionId] = useState(null);

  useEffect(() => () => {
    Object.values(exitTimerRef.current).forEach((timerId) => window.clearTimeout(timerId));
  }, []);

  const taskMatchesTab = (taskId) => {
    const isCompleted = checkedTaskIds.has(taskId);
    const isExiting = !!exitingTaskPhases[taskId];
    return !isCompleted || isExiting;
  };

  const visibleSections = D_TASK_NAV_SECTIONS
    .map((section) => ({
      ...section,
      tasks: section.tasks.filter((task) => taskMatchesTab(task.id)),
    }))
    .filter((section) => section.tasks.length > 0);

  const sectionHeaderStyle = {
    display: "flex",
    alignItems: "center",
    justifyContent: "space-between",
    paddingLeft: NAV_ITEM_ICON_INSET,
    paddingRight: 4,
    paddingTop: 4,
    paddingBottom: 4,
    marginLeft: NAV_ITEM_ROW_MARGIN,
    marginRight: NAV_ITEM_ROW_MARGIN,
    boxSizing: "border-box",
    width: `calc(100% - ${NAV_ITEM_ROW_MARGIN * 2}px)`,
    minHeight: NAV_ROW_MIN_H,
    flexShrink: 0,
    userSelect: "none",
    cursor: "pointer",
    borderRadius: 6,
    border: "none",
    background: "transparent",
    textAlign: "left",
  };

  const toggleSection = (sectionId) => {
    setExpandedSectionIds((prev) => {
      const next = new Set(prev);
      if (next.has(sectionId)) next.delete(sectionId);
      else next.add(sectionId);
      return next;
    });
  };

  const finishTaskExit = (taskId) => {
    if (exitHandledRef.current.has(taskId)) return;
    exitHandledRef.current.add(taskId);
    setCheckedTaskIds((prev) => {
      const next = new Set(prev);
      next.add(taskId);
      return next;
    });
    setExitingTaskPhases((prev) => {
      const next = { ...prev };
      delete next[taskId];
      return next;
    });
    window.setTimeout(() => {
      exitHandledRef.current.delete(taskId);
    }, 0);
  };

  const handleTaskToggle = (taskId) => {
    if (exitingTaskPhases[taskId]) return;
    setExitingTaskPhases((prev) => ({ ...prev, [taskId]: "striking" }));
    if (exitTimerRef.current[taskId]) window.clearTimeout(exitTimerRef.current[taskId]);
    exitTimerRef.current[taskId] = window.setTimeout(() => {
      delete exitTimerRef.current[taskId];
      setExitingTaskPhases((prev) => ({ ...prev, [taskId]: "collapsing" }));
    }, D_TASK_COMPLETE_STRIKE_MS);
  };

  const exitingTaskCount = Object.keys(exitingTaskPhases).length;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8, flexShrink: 0 }}>
      {visibleSections.length === 0 ? (
        <div style={{
          marginLeft: NAV_ITEM_ROW_MARGIN,
          marginRight: NAV_ITEM_ROW_MARGIN,
          padding: "12px 4px",
          fontFamily: FONT,
          fontSize: NAV_L1_FONT_SIZE,
          lineHeight: NAV_LABEL_LINE_HEIGHT,
          color: shell.navTextInactive,
        }}>
          You're all caught up
        </div>
      ) : null}
      {visibleSections.map((section) => {
        const sectionOpen = expandedSectionIds.has(section.id);
        return (
          <div key={section.id} style={{ display: "flex", flexDirection: "column", gap: 4, flexShrink: 0 }}>
            <button
              type="button"
              aria-expanded={sectionOpen}
              onClick={() => toggleSection(section.id)}
              onMouseEnter={() => setHoveredSectionId(section.id)}
              onMouseLeave={() => setHoveredSectionId((prev) => (prev === section.id ? null : prev))}
              style={{
                ...sectionHeaderStyle,
                backgroundColor: hoveredSectionId === section.id ? shell.hoverBg : "transparent",
                transition: "background-color 150ms ease",
              }}
            >
              <span style={{
                fontFamily: FONT,
                fontSize: NAV_L0_FONT_SIZE,
                fontWeight: NAV_L0_FONT_WEIGHT,
                lineHeight: NAV_LABEL_LINE_HEIGHT,
                color: shell.navTextInactive,
                whiteSpace: "nowrap",
                overflow: "hidden",
                textOverflow: "ellipsis",
              }}>
                {section.label}
              </span>
              <div style={{ width: NAV_ICON, height: NAV_ICON, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <ChevronDownIcon expanded={sectionOpen} mode="up-down" />
              </div>
            </button>
            <AnimatedNavSection isOpen={sectionOpen} collapsed={false} measureDep={section.tasks.length + checkedTaskIds.size + exitingTaskCount}>
              {section.tasks.map((task) => (
                <DTaskNavRow
                  key={task.id}
                  task={task}
                  shell={shell}
                  exitPhase={exitingTaskPhases[task.id] || null}
                  onToggle={() => handleTaskToggle(task.id)}
                  onExitTransitionEnd={finishTaskExit}
                />
              ))}
            </AnimatedNavSection>
          </div>
        );
      })}
    </div>
  );
}
