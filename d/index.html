// ─── Keyboard shortcuts (customize modal) ───
// Adapted from jmehlhoff/accountant-nav-testing — record a custom key combo per
// nav destination. Combos are { meta, ctrl, alt, shift, key }.
const KB_IS_MAC =
  typeof navigator !== "undefined" && /Mac|iP(hone|ad|od)/.test(navigator.platform || "");
const KB_MODIFIER_KEYS = new Set(["Meta", "Control", "Alt", "Shift"]);
const KB_RESERVED_PRIMARY = new Set(["c", "v", "x", "a", "z", "q", "w", "t", "n", "r", "l", "f", "p", "s"]);
const DEFAULT_KB_SHORTCUTS = {
  "action:nav-search": { meta: true, ctrl: false, alt: false, shift: false, key: "k" },
  "action:nav-toggle": { meta: true, ctrl: false, alt: false, shift: false, key: "\\" },
};

function kbComboFromEvent(e) {
  if (KB_MODIFIER_KEYS.has(e.key)) return null;
  let key;
  const code = e.code || "";
  const letter = /^Key([A-Z])$/.exec(code);
  const digit = /^Digit([0-9])$/.exec(code);
  if (letter) key = letter[1].toLowerCase();
  else if (digit) key = digit[1];
  else key = (e.key || "").toLowerCase();
  return { meta: e.metaKey, ctrl: e.ctrlKey, alt: e.altKey, shift: e.shiftKey, key };
}
function kbIsValidCombo(c) {
  return Boolean(c.key) && (c.meta || c.ctrl || c.alt);
}
function kbIsReservedCombo(c) {
  const primary = KB_IS_MAC ? c.meta : c.ctrl;
  if (!primary || c.shift || c.alt) return false;
  return KB_RESERVED_PRIMARY.has(c.key);
}
function kbCombosEqual(a, b) {
  return a && b && a.meta === b.meta && a.ctrl === b.ctrl && a.alt === b.alt && a.shift === b.shift && a.key === b.key;
}
function kbDisplayKey(key) {
  switch (key) {
    case "arrowup": return "↑";
    case "arrowdown": return "↓";
    case "arrowleft": return "←";
    case "arrowright": return "→";
    case "escape": return "Esc";
    case " ": return "Space";
    default: return key.length === 1 ? key.toUpperCase() : key[0].toUpperCase() + key.slice(1);
  }
}
function kbFormatCombo(c) {
  if (KB_IS_MAC) {
    return [c.ctrl ? "⌃" : "", c.alt ? "⌥" : "", c.shift ? "⇧" : "", c.meta ? "⌘" : "", kbDisplayKey(c.key)].join("");
  }
  return [c.ctrl ? "Ctrl" : "", c.alt ? "Alt" : "", c.shift ? "Shift" : "", c.meta ? "Win" : "", kbDisplayKey(c.key)].filter(Boolean).join("+");
}
// Grouped destinations a shortcut can be recorded for, built from prototype nav data.
function buildShortcutDestinationGroups() {
  const groups = [
    { group: "General", items: [
      { label: "Home", path: "/home" },
      { label: "Find apps", path: "/apps" },
      { label: "Search navigation", path: "action:nav-search" },
      { label: "Expand/collapse navigation", path: "action:nav-toggle" },
    ] },
    { group: "Reports", items: reportsNavConfig.filter((r) => !r.children).map((r) => ({ label: r.name, path: "report:" + r.name })) },
  ];
  const fp = reportsNavConfig.find((r) => r.name === "Financial planning");
  if (fp && fp.children) {
    groups.push({ group: "Financial planning", items: fp.children.map((c) => ({ label: c, path: "report:Financial planning/" + c })) });
  }
  for (const appName of APP_L0_NAMES) {
    const subs = appSubItemsWithDefault(appName);
    if (subs.length) {
      groups.push({ group: appName, items: subs.map((s) => ({ label: s, path: appName + "/" + s })) });
    }
  }
  return groups;
}
function buildShortcutLabelMap() {
  const map = new Map();
  for (const g of buildShortcutDestinationGroups()) {
    for (const item of g.items) if (!map.has(item.path)) map.set(item.path, item.label);
  }
  return map;
}
// All bookmarkable pages grouped by their L0 nav section. Each page is keyed by
// { sectionLabel, page } to match the bookmarkItems shape used by the flyout.
function buildBookmarkablePageGroups() {
  const groups = [];
  const reportPages = reportsNavConfig.filter((r) => !r.children).map((r) => r.name);
  const fp = reportsNavConfig.find((r) => r.name === "Financial planning");
  const fpPages = fp && fp.children ? fp.children : [];
  if (reportPages.length || fpPages.length) {
    groups.push({ section: "Reports", pages: [...reportPages, ...fpPages] });
  }
  if (inboxNavItems.length) {
    groups.push({ section: "Inbox", pages: [...inboxNavItems] });
  }
  for (const appName of APP_L0_NAMES) {
    const subs = appSubItemsWithDefault(appName);
    if (subs.length) groups.push({ section: appName, pages: subs });
  }
  return groups;
}
function kbMatchesQuery(label, query) {
  const q = query.trim().toLowerCase();
  if (!q) return true;
  return label.toLowerCase().includes(q);
}

function ShortcutRecorder({ path, label, shortcuts, onChange }) {
  const [recording, setRecording] = useState(false);
  const [error, setError] = useState(null);
  const btnRef = useRef(null);
  const labelMap = React.useMemo(buildShortcutLabelMap, []);
  const combo = shortcuts[path];

  const stop = () => { setRecording(false); if (btnRef.current) btnRef.current.blur(); };

  const handleKeyDown = (e) => {
    if (!recording) return;
    e.preventDefault();
    e.stopPropagation();
    if (e.key === "Escape") { setError(null); stop(); return; }
    if (e.key === "Backspace" || e.key === "Delete") { onChange(path, null); setError(null); stop(); return; }
    const next = kbComboFromEvent(e);
    if (!next) return;
    if (!kbIsValidCombo(next)) { setError(KB_IS_MAC ? "Include ⌘, ⌃ or ⌥" : "Include Ctrl or Alt"); return; }
    if (kbIsReservedCombo(next)) { setError("Reserved by the browser"); return; }
    const conflictPath = Object.keys(shortcuts).find((p) => p !== path && kbCombosEqual(shortcuts[p], next));
    if (conflictPath) { setError("Already used by " + (labelMap.get(conflictPath) || conflictPath)); return; }
    onChange(path, next);
    setError(null);
    stop();
  };

  return (
    <span className="kb-recorder-controls">
      {error && recording ? <span className="kb-recorder-error">{error}</span> : null}
      <button
        ref={btnRef}
        type="button"
        className={recording ? "kb-recorder-btn kb-recorder-btn-recording" : (combo ? "kb-kbd" : "kb-recorder-btn")}
        aria-label={combo ? `Shortcut for ${label}: ${kbFormatCombo(combo)}. Press to re-record.` : `Record shortcut for ${label}`}
        onClick={() => { setError(null); setRecording(true); }}
        onKeyDown={handleKeyDown}
        onBlur={() => { setRecording(false); setError(null); }}
      >
        {recording ? "Press keys…" : (combo ? kbFormatCombo(combo) : "Record")}
      </button>
      {combo && !recording ? (
        <button type="button" className="kb-clear-btn" aria-label={`Clear shortcut for ${label}`} onClick={() => onChange(path, null)}>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><line x1="3" y1="3" x2="13" y2="13" /><line x1="13" y1="3" x2="3" y2="13" /></svg>
        </button>
      ) : null}
    </span>
  );
}

function KeyboardShortcutsSection({ shortcuts, onChange }) {
  const groups = React.useMemo(buildShortcutDestinationGroups, []);
  const [query, setQuery] = useState("");
  const [collapsed, setCollapsed] = useState(() => new Set());
  const filtering = query.trim() !== "";

  const toggleGroup = (name) => {
    setCollapsed((prev) => {
      const next = new Set(prev);
      if (next.has(name)) next.delete(name); else next.add(name);
      return next;
    });
  };

  const visibleGroups = groups
    .map((g) => ({ ...g, items: g.items.filter((it) => kbMatchesQuery(it.label, query)) }))
    .filter((g) => g.items.length > 0);

  const allKbKeys = groups.map((g) => g.group);
  const allKbCollapsed = allKbKeys.length > 0 && allKbKeys.every((k) => collapsed.has(k));
  const toggleAllKb = () => {
    setCollapsed((prev) => {
      const next = new Set(prev);
      if (allKbCollapsed) {
        allKbKeys.forEach((k) => next.delete(k));
      } else {
        allKbKeys.forEach((k) => next.add(k));
      }
      return next;
    });
  };

  const chevron = (
    <svg className="kb-group-chevron-svg" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 4 10 8 6 12" /></svg>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12, flex: 1, minHeight: 0, width: "100%", overflow: "hidden" }}>
      <div className="section-title" style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span>Keyboard shortcuts</span>
        {!filtering && visibleGroups.length > 0 && (
          <button
            type="button"
            onClick={toggleAllKb}
            style={{ fontFamily: FONT, fontSize: 12, fontWeight: 500, color: "#16587A", background: "none", border: "none", cursor: "pointer", padding: "0 2px", lineHeight: 1 }}
          >
            {allKbCollapsed ? "Expand all" : "Collapse all"}
          </button>
        )}
      </div>
      <div className="kb-search">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="7" cy="7" r="4.5" /><line x1="10.5" y1="10.5" x2="14" y2="14" strokeLinecap="round" /></svg>
        <input type="text" placeholder="Search pages" value={query} onChange={(e) => setQuery(e.target.value)} aria-label="Search pages" />
      </div>
      <div className="kb-scroll">
        {visibleGroups.length === 0 ? (
          <div className="kb-empty">No pages match “{query.trim()}”.</div>
        ) : (
          visibleGroups.map((group) => {
            const open = filtering || !collapsed.has(group.group);
            return (
              <div className="kb-group" key={group.group}>
                <button type="button" className="kb-group-header" onClick={() => toggleGroup(group.group)} aria-expanded={open}>
                  <span className={"kb-group-chevron" + (open ? " open" : "")} style={{ display: "inline-flex" }}>{chevron}</span>
                  <span className="kb-group-title">{group.group}</span>
                </button>
                {open ? (
                  <div>
                    {group.items.map((item) => (
                      <div className="kb-row" key={item.path}>
                        <span className="kb-row-label">{renderHighlightedText(item.label, query, { bold: true })}</span>
                        <ShortcutRecorder path={item.path} label={item.label} shortcuts={shortcuts} onChange={onChange} />
                      </div>
                    ))}
                  </div>
                ) : null}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

function BookmarksEditorSection({ bookmarkItems, onToggleBookmark }) {
  const [query, setQuery] = useState("");
  const q = query.trim().toLowerCase();
  const filtering = q !== "";
  const isBookmarked = (section, page) => bookmarkItems.some((b) => b.sectionLabel === section && b.targetPage === page);
  const matches = (label) => !q || label.toLowerCase().includes(q);

  const pageGroups = React.useMemo(buildBookmarkablePageGroups, []);

  // collapsed state: Set of "parentKey::section" strings
  const [collapsedGroups, setCollapsedGroups] = useState(() => new Set());
  const toggleGroup = (parentKey, section) => {
    const key = parentKey + "::" + section;
    setCollapsedGroups((prev) => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key); else next.add(key);
      return next;
    });
  };
  const isOpen = (parentKey, section) => filtering || !collapsedGroups.has(parentKey + "::" + section);

  // Collapse/expand all for the Pages section
  const allPageKeys = pageGroups.map((g) => "pg::" + g.section);
  const allPagesCollapsed = allPageKeys.length > 0 && allPageKeys.every((k) => collapsedGroups.has(k));
  const toggleAllPages = () => {
    setCollapsedGroups((prev) => {
      const next = new Set(prev);
      if (allPagesCollapsed) {
        allPageKeys.forEach((k) => next.delete(k));
      } else {
        allPageKeys.forEach((k) => next.add(k));
      }
      return next;
    });
  };

  // "Bookmarks" section: currently-bookmarked items as a flat list (no L0 titles).
  const bookmarkedRows = pageGroups
    .flatMap((g) => g.pages
      .filter((p) => isBookmarked(g.section, p) && matches(p))
      .map((p) => ({ section: g.section, page: p })));

  // "Pages" section: all bookmarkable pages grouped by L0.
  const visiblePageGroups = pageGroups
    .map((g) => ({ section: g.section, pages: g.pages.filter((p) => matches(p)) }))
    .filter((g) => g.pages.length > 0);

  const bkChevron = (
    <svg className="kb-group-chevron-svg" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 4 10 8 6 12" /></svg>
  );

  const renderRow = (section, page) => {
    const bookmarked = isBookmarked(section, page);
    return (
      <button
        key={section + "::" + page}
        type="button"
        className="app-list-item"
        onClick={() => onToggleBookmark(section, page)}
        aria-pressed={bookmarked}
        aria-label={(bookmarked ? "Remove bookmark " : "Bookmark ") + page}
        style={{ border: "none", width: "100%", textAlign: "left", cursor: "pointer", font: "inherit" }}
      >
        <span className="app-list-grip" aria-hidden="true">
          <svg viewBox="0 0 16 16" fill="#8a9499"><circle cx="5.5" cy="3" r="1.3"/><circle cx="10.5" cy="3" r="1.3"/><circle cx="5.5" cy="8" r="1.3"/><circle cx="10.5" cy="8" r="1.3"/><circle cx="5.5" cy="13" r="1.3"/><circle cx="10.5" cy="13" r="1.3"/></svg>
        </span>
        <span className="app-list-name" style={{ fontSize: 14 }}>{renderHighlightedText(page, query)}</span>
        <span aria-hidden="true" style={{ marginLeft: "auto", flexShrink: 0, width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center", color: bookmarked ? "#16587A" : "#8A9499" }}>
          <BookmarkToggleIcon filled={bookmarked} />
        </span>
      </button>
    );
  };

  const renderGroups = (groups, parentKey, emptyText) => (
    groups.length === 0 ? (
      <div style={{ fontFamily: FONT, fontSize: 13, fontWeight: 400, color: "#6b7280", padding: "8px 10px" }}>{emptyText}</div>
    ) : (
      groups.map((g) => {
        const open = isOpen(parentKey, g.section);
        return (
          <div className="kb-group" key={g.section}>
            <button type="button" className="kb-group-header" onClick={() => toggleGroup(parentKey, g.section)} aria-expanded={open}>
              <span className={"kb-group-chevron" + (open ? " open" : "")} style={{ display: "inline-flex" }}>{bkChevron}</span>
              <span className="kb-group-title">{g.section}</span>
            </button>
            {open ? (
              <div className="app-list app-list--single-app-icon" style={{ marginTop: 0 }}>
                {g.pages.map((p) => renderRow(g.section, p))}
              </div>
            ) : null}
          </div>
        );
      })
    )
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12, flex: 1, minHeight: 0, width: "100%", overflow: "hidden" }}>
      <div className="section-title">Bookmarks</div>
      <div className="kb-scroll">
        {bookmarkedRows.length === 0 ? (
          <div style={{ fontFamily: FONT, fontSize: 13, fontWeight: 400, color: "#6b7280", padding: "8px 10px" }}>
            {q ? "No bookmarked pages match your search." : "No bookmarks yet. Add pages below."}
          </div>
        ) : (
          <div className="app-list app-list--single-app-icon" style={{ marginTop: 0 }}>
            {bookmarkedRows.map((row) => renderRow(row.section, row.page))}
          </div>
        )}
        <div className="section-title section-title--sticky" style={{ marginTop: 12, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span>Pages</span>
          {!filtering && visiblePageGroups.length > 0 && (
            <button
              type="button"
              onClick={toggleAllPages}
              style={{ fontFamily: FONT, fontSize: 12, fontWeight: 500, color: "#16587A", background: "none", border: "none", cursor: "pointer", padding: "0 2px", lineHeight: 1 }}
            >
              {allPagesCollapsed ? "Expand all" : "Collapse all"}
            </button>
          )}
        </div>
        <div className="kb-search" style={{ flexShrink: 0, margin: "6px 0 4px" }}>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="7" cy="7" r="4.5" /><line x1="10.5" y1="10.5" x2="14" y2="14" strokeLinecap="round" /></svg>
          <input type="text" placeholder="Search pages" value={query} onChange={(e) => setQuery(e.target.value)} aria-label="Search pages" />
        </div>
        {renderGroups(visiblePageGroups, "pg", "No pages match your search.")}
      </div>
    </div>
  );
}

// Grouped, type-ahead combobox for picking a page (e.g. Default landing page).
// Shows a persistent down-chevron; clicking opens a grouped list; typing filters it.
function LandingPageCombobox({ groups, value, onChange }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const [activeIdx, setActiveIdx] = useState(-1);
  const wrapRef = useRef(null);
  const inputRef = useRef(null);
  const q = query.trim().toLowerCase();

  // Filtered groups (and a flat list of selectable pages for keyboard nav).
  const filteredGroups = React.useMemo(() => {
    if (!q) return groups;
    return groups
      .map((g) => ({ section: g.section, pages: g.pages.filter((p) => p.toLowerCase().includes(q)) }))
      .filter((g) => g.pages.length > 0);
  }, [groups, q]);
  const flatPages = React.useMemo(() => filteredGroups.flatMap((g) => g.pages), [filteredGroups]);

  React.useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) {
        setOpen(false);
        setQuery("");
      }
    };
    document.addEventListener("mousedown", onDocClick);
    return () => document.removeEventListener("mousedown", onDocClick);
  }, [open]);

  const commit = (page) => {
    onChange(page);
    setOpen(false);
    setQuery("");
    setActiveIdx(-1);
  };

  const openMenu = () => {
    setOpen(true);
    setActiveIdx(-1);
  };

  const onKeyDown = (e) => {
    if (e.key === "ArrowDown") {
      e.preventDefault();
      if (!open) { openMenu(); return; }
      setActiveIdx((i) => Math.min(i + 1, flatPages.length - 1));
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      setActiveIdx((i) => Math.max(i - 1, 0));
    } else if (e.key === "Enter") {
      if (open && activeIdx >= 0 && flatPages[activeIdx]) {
        e.preventDefault();
        commit(flatPages[activeIdx]);
      }
    } else if (e.key === "Escape") {
      setOpen(false);
      setQuery("");
    }
  };

  const chevron = (
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#5a6b76" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{ transition: "transform .15s ease", transform: open ? "rotate(180deg)" : "none" }}>
      <polyline points="4 6 8 10 12 6" />
    </svg>
  );

  return (
    <div ref={wrapRef} style={{ position: "relative", flex: 1 }}>
      <div
        style={{
          display: "flex", alignItems: "center", gap: 6, boxSizing: "border-box",
          border: "1px solid " + (open ? "#16587A" : "#c3ced5"), borderRadius: 6,
          padding: "0 8px 0 10px", background: "#fff", cursor: "text",
          boxShadow: open ? "0 0 0 1px #16587A" : "none",
        }}
        onClick={() => { if (!open) openMenu(); inputRef.current && inputRef.current.focus(); }}
      >
        <input
          ref={inputRef}
          type="text"
          value={open ? query : value}
          placeholder={open ? value : ""}
          onChange={(e) => { setQuery(e.target.value); if (!open) setOpen(true); setActiveIdx(-1); }}
          onFocus={openMenu}
          onKeyDown={onKeyDown}
          style={{ flex: 1, minWidth: 0, fontFamily: FONT, fontSize: 14, color: "#2B3135", border: "none", outline: "none", background: "transparent", padding: "7px 0" }}
          aria-label="Default landing page"
          aria-expanded={open}
          role="combobox"
          aria-controls="landing-combobox-list"
        />
        <span
          aria-hidden="true"
          onClick={(e) => { e.stopPropagation(); if (open) { setOpen(false); setQuery(""); } else { openMenu(); inputRef.current && inputRef.current.focus(); } }}
          style={{ flexShrink: 0, width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}
        >
          {chevron}
        </span>
      </div>
      {open && (
        <div
          id="landing-combobox-list"
          role="listbox"
          style={{
            position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, zIndex: 30,
            maxHeight: 280, overflowY: "auto", background: "#fff",
            border: "1px solid #c3ced5", borderRadius: 8,
            boxShadow: "0 8px 24px rgba(0,0,0,.14)", padding: "4px 0",
          }}
        >
          {flatPages.length === 0 ? (
            <div style={{ fontFamily: FONT, fontSize: 13, color: "#6b7280", padding: "8px 12px" }}>No pages match “{query.trim()}”.</div>
          ) : (
            filteredGroups.map((g) => (
              <div key={g.section}>
                <div style={{ fontFamily: FONT_DEMI, fontSize: 11, fontWeight: 600, letterSpacing: ".02em", textTransform: "uppercase", color: "#8A9499", padding: "8px 12px 4px" }}>{g.section}</div>
                {g.pages.map((p) => {
                  const idx = flatPages.indexOf(p);
                  const isActive = idx === activeIdx;
                  const isSelected = p === value;
                  return (
                    <div
                      key={g.section + "::" + p}
                      role="option"
                      aria-selected={isSelected}
                      onMouseEnter={() => setActiveIdx(idx)}
                      onMouseDown={(e) => { e.preventDefault(); commit(p); }}
                      style={{
                        display: "flex", alignItems: "center", gap: 8,
                        fontFamily: FONT, fontSize: 14, color: "#2B3135",
                        padding: "7px 12px", cursor: "pointer",
                        background: isActive ? "rgba(133,146,153,.16)" : "transparent",
                        fontWeight: isSelected ? 600 : 400,
                      }}
                    >
                      <span style={{ flex: 1 }}>{p}</span>
                      {isSelected && (
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#16587A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 8.5 6.5 12 13 4.5" /></svg>
                      )}
                    </div>
                  );
                })}
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
}

// Pinned-apps editor (Customize modal): drag to reorder within and between pinned
// and More apps. Dropping into pinned pins the app; dropping into More apps unpins it.
function PinnedAppsEditor({
  apps,
  pinnedNames,
  onToggle,
  onReorder,
  getL1PagesForL0 = null,
  getDefaultL1PagesForL0 = null,
  onSaveL1Order = null,
  onRestoreL1OrderForL0 = null,
  showPinButton = true,
}) {
  const shell = useShell();
  const byName = React.useMemo(() => Object.fromEntries(apps.map((a) => [a.name, a])), [apps]);
  const pinnedSet = React.useMemo(() => new Set(pinnedNames), [pinnedNames]);
  const pinned = pinnedNames.map((n) => byName[n]).filter(Boolean);
  const unpinned = apps.filter((a) => !pinnedSet.has(a.name));
  const [dragName, setDragName] = useState(null);
  const [dropTarget, setDropTarget] = useState(null);
  const [editingL0, setEditingL0] = useState(null);
  const [draftL1Order, setDraftL1Order] = useState([]);
  const [l1DragPage, setL1DragPage] = useState(null);
  const [l1DropIndex, setL1DropIndex] = useState(null);
  const rowsRef = React.useRef(new Map());
  const l1RowsRef = React.useRef(new Map());
  const l0SectionRef = React.useRef(new Map());
  const canReorder = typeof onReorder === "function";
  const canEditL1 = typeof getL1PagesForL0 === "function" && typeof onSaveL1Order === "function";

  const pinIcon = (isPinned) => <PinToggleIcon filled={isPinned} />;
  const gripIcon = (
    <svg viewBox="0 0 16 16" fill="#8a9499"><circle cx="5.5" cy="3" r="1.3"/><circle cx="10.5" cy="3" r="1.3"/><circle cx="5.5" cy="8" r="1.3"/><circle cx="10.5" cy="8" r="1.3"/><circle cx="5.5" cy="13" r="1.3"/><circle cx="10.5" cy="13" r="1.3"/></svg>
  );
  const DropLine = () => (
    <div aria-hidden="true" style={{ height: 0, position: "relative" }}>
      <div style={{ position: "absolute", left: 10, right: 10, top: -1, borderTop: "2px solid #16587A" }} />
    </div>
  );

  const cancelL1Edit = React.useCallback(() => {
    setEditingL0(null);
    setDraftL1Order([]);
    setL1DragPage(null);
    setL1DropIndex(null);
  }, []);

  const l1OrderMatchesDefault = React.useCallback((l0Name, order) => {
    if (typeof getDefaultL1PagesForL0 !== "function") return true;
    const defaults = getDefaultL1PagesForL0(l0Name);
    if (!Array.isArray(order) || order.length !== defaults.length) return false;
    return order.every((page, i) => page === defaults[i]);
  }, [getDefaultL1PagesForL0]);

  const startL1Edit = (appName) => {
    if (!canEditL1) return;
    const pages = getL1PagesForL0(appName);
    if (!pages || pages.length === 0) return;
    setEditingL0(appName);
    setDraftL1Order(pages.slice());
    setL1DragPage(null);
    setL1DropIndex(null);
  };

  const closeL1Edit = () => {
    cancelL1Edit();
  };

  const restoreL1Edit = () => {
    if (!editingL0 || typeof getDefaultL1PagesForL0 !== "function") return;
    const defaults = getDefaultL1PagesForL0(editingL0);
    setDraftL1Order(defaults.slice());
    if (typeof onRestoreL1OrderForL0 === "function") onRestoreL1OrderForL0(editingL0);
  };

  useEffect(() => {
    if (!editingL0) return;
    const onKeyDown = (event) => {
      if (event.key === "Escape") {
        event.preventDefault();
        event.stopPropagation();
        cancelL1Edit();
      }
    };
    window.addEventListener("keydown", onKeyDown, true);
    return () => window.removeEventListener("keydown", onKeyDown, true);
  }, [editingL0, cancelL1Edit]);

  const computeDropTarget = (clientY) => {
    for (let i = 0; i < pinned.length; i++) {
      const el = rowsRef.current.get(pinned[i].name);
      if (!el) continue;
      const r = el.getBoundingClientRect();
      if (clientY < r.top + r.height / 2) return { section: "pinned", index: i };
    }
    for (let i = 0; i < unpinned.length; i++) {
      const el = rowsRef.current.get(unpinned[i].name);
      if (!el) continue;
      const r = el.getBoundingClientRect();
      if (clientY < r.top + r.height / 2) return { section: "unpinned", index: i };
    }
    if (unpinned.length > 0) return { section: "unpinned", index: unpinned.length };
    return { section: "pinned", index: pinned.length };
  };

  const applyDrop = (name, target) => {
    if (!target) return;
    let pinnedOrder = pinned.map((p) => p.name);
    let unpinnedOrder = unpinned.map((p) => p.name);
    const fromPinned = pinnedOrder.includes(name);
    const fromUnpinned = unpinnedOrder.includes(name);
    if (fromPinned) pinnedOrder = pinnedOrder.filter((n) => n !== name);
    else if (fromUnpinned) unpinnedOrder = unpinnedOrder.filter((n) => n !== name);
    else return;

    if (target.section === "pinned") {
      let idx = target.index;
      if (fromPinned) {
        const oldIdx = pinned.findIndex((p) => p.name === name);
        if (oldIdx !== -1 && oldIdx < idx) idx -= 1;
      }
      pinnedOrder.splice(Math.max(0, Math.min(idx, pinnedOrder.length)), 0, name);
    } else {
      let idx = target.index;
      if (fromUnpinned) {
        const oldIdx = unpinned.findIndex((p) => p.name === name);
        if (oldIdx !== -1 && oldIdx < idx) idx -= 1;
      }
      unpinnedOrder.splice(Math.max(0, Math.min(idx, unpinnedOrder.length)), 0, name);
    }
    onReorder(pinnedOrder, unpinnedOrder);
  };

  const onPointerDownGrip = (e, name) => {
    if (!canReorder || editingL0) return;
    e.preventDefault();
    e.stopPropagation();
    const fromPinned = pinnedSet.has(name);
    setDragName(name);
    setDropTarget({
      section: fromPinned ? "pinned" : "unpinned",
      index: fromPinned ? pinned.findIndex((p) => p.name === name) : unpinned.findIndex((p) => p.name === name),
    });
    const prevCursor = document.body.style.cursor;
    const prevUserSelect = document.body.style.userSelect;
    document.body.style.cursor = "grabbing";
    document.body.style.userSelect = "none";
    const move = (ev) => setDropTarget(computeDropTarget(ev.clientY));
    const up = () => {
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
      document.body.style.cursor = prevCursor;
      document.body.style.userSelect = prevUserSelect;
      setDropTarget((target) => {
        applyDrop(name, target);
        return null;
      });
      setDragName(null);
    };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
  };

  const computeL1DropIndex = (clientY) => {
    for (let i = 0; i < draftL1Order.length; i++) {
      const page = draftL1Order[i];
      const el = l1RowsRef.current.get(page);
      if (!el) continue;
      const r = el.getBoundingClientRect();
      if (clientY < r.top + r.height / 2) return i;
    }
    return draftL1Order.length;
  };

  const onPointerDownL1Grip = (e, page) => {
    if (!editingL0) return;
    const editingApp = editingL0;
    e.preventDefault();
    e.stopPropagation();
    setL1DragPage(page);
    setL1DropIndex(draftL1Order.indexOf(page));
    const prevCursor = document.body.style.cursor;
    const prevUserSelect = document.body.style.userSelect;
    document.body.style.cursor = "grabbing";
    document.body.style.userSelect = "none";
    const move = (ev) => setL1DropIndex(computeL1DropIndex(ev.clientY));
    const up = () => {
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
      document.body.style.cursor = prevCursor;
      document.body.style.userSelect = prevUserSelect;
      setL1DropIndex((targetIndex) => {
        setDraftL1Order((prev) => {
          const from = prev.indexOf(page);
          if (from === -1 || targetIndex == null) return prev;
          let idx = targetIndex;
          const next = prev.slice();
          next.splice(from, 1);
          if (from < idx) idx -= 1;
          next.splice(Math.max(0, Math.min(idx, next.length)), 0, page);
          if (canEditL1) onSaveL1Order(editingApp, next);
          return next;
        });
        return null;
      });
      setL1DragPage(null);
    };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
  };

  const renderL1Editor = (appName) => {
    if (editingL0 !== appName) return null;
    return (
      <div className="app-list-l1-group">
        {draftL1Order.map((page, i) => (
          <React.Fragment key={appName + ":l1:" + page}>
            {l1DragPage && l1DropIndex === i ? <DropLine /> : null}
            <div
              ref={(el) => { if (el) l1RowsRef.current.set(page, el); else l1RowsRef.current.delete(page); }}
              className="app-list-item app-list-item--l1"
              style={{ opacity: l1DragPage === page ? 0.4 : 1 }}
            >
              <span
                className="app-list-grip"
                aria-hidden="true"
                onPointerDown={(e) => onPointerDownL1Grip(e, page)}
                style={{ cursor: l1DragPage ? "grabbing" : "grab", touchAction: "none" }}
              >
                {gripIcon}
              </span>
              <span className="app-list-name" style={{ flex: 1, minWidth: 0 }}>{page}</span>
              {i === 0 ? <span className="app-list-l1-default-label">Default page</span> : null}
            </div>
          </React.Fragment>
        ))}
        {l1DragPage && l1DropIndex === draftL1Order.length ? <DropLine /> : null}
      </div>
    );
  };

  const renderRow = (app, opts) => {
    const isPinned = !!opts.pinned;
    const isDragging = dragName === app.name;
    const isEditing = editingL0 === app.name;
    const canShowEdit = canEditL1 && (!editingL0 || isEditing) && getL1PagesForL0(app.name).length > 0;
    const hasRowActions = canShowEdit || (showPinButton && typeof onToggle === "function");
    return (
      <div
        key={app.name}
        ref={(el) => { if (el) l0SectionRef.current.set(app.name, el); else l0SectionRef.current.delete(app.name); }}
      >
        <div
          ref={(el) => { if (el) rowsRef.current.set(app.name, el); else rowsRef.current.delete(app.name); }}
          className={"app-list-item app-list-item--pinned-l0" + (isEditing ? " is-editing-l1" : "") + (hasRowActions ? " has-row-actions" : "")}
          style={{ width: "100%", opacity: isDragging ? 0.4 : 1 }}
        >
          <span
            className="app-list-grip"
            aria-hidden="true"
            onPointerDown={canReorder && !editingL0 ? (e) => onPointerDownGrip(e, app.name) : undefined}
            style={{ cursor: (canReorder && !editingL0) ? (dragName ? "grabbing" : "grab") : "default", touchAction: "none", opacity: (canReorder && !editingL0) ? 1 : 0.35, pointerEvents: isEditing ? "none" : "auto" }}
          >
            {gripIcon}
          </span>
          <span className="app-list-icon">{app.iconNode}</span>
          <span className="app-list-name" style={{ flex: 1, minWidth: 0 }}>{app.name}</span>
          {hasRowActions ? (
            <div className="app-list-row-actions">
              {isEditing ? (
                <React.Fragment>
                  <button
                    type="button"
                    className="btn-tertiary"
                    disabled={l1OrderMatchesDefault(app.name, draftL1Order)}
                    onClick={(e) => { e.stopPropagation(); restoreL1Edit(); }}
                    style={{
                      flexShrink: 0,
                      whiteSpace: "nowrap",
                      opacity: l1OrderMatchesDefault(app.name, draftL1Order) ? 0.45 : 1,
                      cursor: l1OrderMatchesDefault(app.name, draftL1Order) ? "default" : "pointer",
                    }}
                  >
                    Restore
                  </button>
                  <button type="button" className="btn-modal-secondary-sm" onClick={(e) => { e.stopPropagation(); closeL1Edit(); }}>
                    Done
                  </button>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  {canShowEdit ? (
                    <button
                      type="button"
                      className="app-list-edit-btn"
                      aria-label={"Edit pages in " + app.name}
                      onClick={(e) => { e.stopPropagation(); startL1Edit(app.name); }}
                      style={{
                        flexShrink: 0,
                        border: "none",
                        background: "transparent",
                        color: shell.isNazgul ? "#7cbcff" : "#16587A",
                        fontFamily: FONT,
                        fontSize: 12,
                        fontWeight: 400,
                        lineHeight: 1.3,
                        cursor: "pointer",
                        padding: 0,
                      }}
                    >
                      Edit
                    </button>
                  ) : null}
                  {showPinButton && typeof onToggle === "function" ? (
                    <button
                      type="button"
                      className="app-list-icon-btn"
                      onClick={(e) => { e.stopPropagation(); onToggle(app.name); }}
                      aria-pressed={isPinned}
                      aria-label={(isPinned ? "Unpin " : "Pin ") + app.name}
                      style={{ color: isPinned ? "#16587A" : undefined }}
                    >
                      {pinIcon(isPinned)}
                    </button>
                  ) : null}
                </React.Fragment>
              )}
            </div>
          ) : null}
        </div>
        {renderL1Editor(app.name)}
      </div>
    );
  };

  return (
    <div className="app-list app-list--single-app-icon" style={{ marginTop: 0 }}>
      {pinned.map((app, i) => (
        <React.Fragment key={"pin-frag:" + app.name}>
          {dragName && dropTarget && dropTarget.section === "pinned" && dropTarget.index === i ? <DropLine /> : null}
          {renderRow(app, { pinned: true })}
        </React.Fragment>
      ))}
      {dragName && dropTarget && dropTarget.section === "pinned" && dropTarget.index === pinned.length ? <DropLine /> : null}
      {unpinned.length > 0 && showPinButton ? (
        <div className="section-title" style={{ padding: "12px 10px 4px" }}>More apps</div>
      ) : null}
      {unpinned.map((app, i) => (
        <React.Fragment key={"more-frag:" + app.name}>
          {dragName && dropTarget && dropTarget.section === "unpinned" && dropTarget.index === i ? <DropLine /> : null}
          {renderRow(app, { pinned: false })}
        </React.Fragment>
      ))}
      {dragName && dropTarget && dropTarget.section === "unpinned" && dropTarget.index === unpinned.length ? <DropLine /> : null}
    </div>
  );
}

const ACCOUNT_SETTINGS_SEARCH_SOURCE = [
  ["Company", ["Company name", "Legal name", "Company type", "Employer ID (EIN)", "Industry", "Address", "Customer-facing email", "Company phone", "Website"]],
  ["Usage", ["Users", "Classes", "Locations", "Billing & Subscription", "Plan", "Payment method"]],
  ["Payments", ["Credit card processing", "Bank transfer (ACH)", "Deposit account", "QuickBooks Payments"]],
  ["QuickBooks Checking", ["QuickBooks Checking", "Debit card"]],
  ["Accounting", ["Accounting method", "First month of fiscal year", "First month of income tax year", "Close the books"]],
  ["Sales", ["Preferred invoice terms", "Default delivery method", "Shipping", "Custom fields", "Custom transaction numbers", "Service date", "Discount", "Deposit", "Tips (Gratuity)", "Tags", "Sales form content"]],
  ["Expenses", ["Bills and expenses", "Show items table on expense forms", "Track expenses and items by customer", "Make expenses and items billable", "Default bill payment terms", "Purchase orders"]],
  ["Time", ["Time tracking", "First day of work week", "Payroll settings"]],
  ["Advanced", ["Tax form", "Chart of accounts", "Categories", "Automation", "Projects", "Currency", "Other preferences", "Customer label", "Business Network"]],
];
const ACCOUNT_SETTINGS_FLYOUT_PAGES = [
  { title: "Account and settings", spoke: "Company", terms: "settings preferences gear company" },
  { title: "Manage users", spoke: null, terms: "users permissions roles access" },
  { title: "Subscriptions & billing", spoke: "Usage", terms: "subscription billing plan payment" },
  { title: "Payroll settings", spoke: "Time", terms: "payroll wages employees" },
  { title: "Workflow automations", spoke: "Advanced", terms: "workflow automation rules" },
  { title: "Integrations", spoke: null, terms: "apps connect integration" },
  { title: "Custom form styles", spoke: "Sales", terms: "invoice template form style" },
  { title: "Default report settings", spoke: "Advanced", terms: "reports defaults" },
  { title: "Workers' comp", spoke: null, terms: "workers compensation insurance" },
];
function slugAccountSettingsKey(value) {
  return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
}
function buildAccountSettingsSearchPages() {
  const pages = [];
  ACCOUNT_SETTINGS_SEARCH_SOURCE.forEach(([spoke, titles]) => {
    pages.push({ key: "settings:spoke:" + slugAccountSettingsKey(spoke), title: spoke, spoke, searchTerms: spoke + " account settings" });
    titles.forEach((title) => {
      pages.push({
        key: "settings:" + slugAccountSettingsKey(spoke) + ":" + slugAccountSettingsKey(title),
        title,
        spoke,
        searchTerms: title + " " + spoke + " account settings",
      });
    });
  });
  ACCOUNT_SETTINGS_FLYOUT_PAGES.forEach(({ title, spoke, terms }) => {
    pages.push({
      key: "settings:flyout:" + slugAccountSettingsKey(title),
      title,
      spoke,
      searchTerms: title + " " + (terms || "") + " account settings",
    });
  });
  return pages;
}
const ACCOUNT_SETTINGS_SEARCH_PAGES = buildAccountSettingsSearchPages();
function normalizeAccountSettingsSearchText(value) {
  return (value || "")
    .toLowerCase()
    .replace(/&/g, " and ")
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}
function filterAccountSettingsSearchEntries(queryNorm) {
  if (!queryNorm) return [];
  return ACCOUNT_SETTINGS_SEARCH_PAGES
    .filter((entry) => {
      const haystack = normalizeAccountSettingsSearchText([
        entry.title,
        entry.spoke,
        entry.searchTerms,
        "account and settings",
      ].filter(Boolean).join(" "));
      return haystack.includes(queryNorm);
    })
    .map((entry) => ({
      key: entry.key,
      type: "settings",
      title: entry.title,
      spoke: entry.spoke,
    }));
}

      tabIndex={-1}
      data-global-search-result-key={GLOBAL_SEARCH_ASK_AI_PROMPT_KEY}
      className={"profile-flyout-row-btn global-nav-search-result" + (isFocused ? " global-nav-search-result--focused" : "")}
      onMouseDown={(event) => event.preventDefault()}
      onMouseEnter={onMouseEnter}
      onClick={() => { if (typeof onActivate === "function") onActivate(trimmed); }}
      style={{
        width: "calc(100% - 8px)",
        margin: "2px 4px",
        display: "flex",
        alignItems: "center",
        gap: 12,
        boxSizing: "border-box",
      }}
    >
      <span style={{ flex: 1, minWidth: 0, fontFamily: FONT, fontSize: 13, fontWeight: 400, lineHeight: 1.3, color: shell.textPrimary, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
        Ask about {trimmed}...
      </span>
      <span className="btn-modal-secondary-sm" aria-hidden="true" style={{ pointerEvents: "none" }}>
        Start chat
      </span>

  );
}

function GlobalNavSearchModal({
  open,
  onClose,
  anchorRef,
  fallbackAnchorRef,
  shell,
  query,
  onQueryChange,
  inputRef,
  resultEntries,
  focusedIndex,
  onFocusResultIndex,
  onSelectResult,
  getEntryDisplay,
  onInputKeyDown,
  onStartChat,
  placeholder = "Search or ask a question",
}) {
  const MODAL_BAR_INSET_X = 40;
  const MODAL_BAR_INSET_TOP = 8;
  const [anchorRect, setAnchorRect] = React.useState(null);
  const resultsViewportRef = React.useRef(null);

  const updateAnchorRect = React.useCallback(() => {
    const searchEl = anchorRef && anchorRef.current;
    const el = searchEl || (fallbackAnchorRef && fallbackAnchorRef.current);
    if (!el) {
      const barWidth = 420;
      setAnchorRect({
        barTop: 56,
        barLeft: Math.max(16, (window.innerWidth - barWidth) / 2),
        barWidth,
      });
      return;
    }
    const rect = el.getBoundingClientRect();
    if (searchEl) {
      setAnchorRect({ barTop: rect.top, barLeft: rect.left, barWidth: rect.width });
      return;
    }
    const barWidth = Math.min(420, Math.max(280, rect.width - 32));
    setAnchorRect({
      barTop: rect.top + Math.max(0, (rect.height - 32) / 2),
      barLeft: rect.left + (rect.width - barWidth) / 2,
      barWidth,
    });
  }, [anchorRef, fallbackAnchorRef]);

  React.useLayoutEffect(() => {
    if (!open) {
      setAnchorRect(null);
      return;
    }
    updateAnchorRect();
    window.addEventListener("resize", updateAnchorRect);
    window.addEventListener("scroll", updateAnchorRect, true);
    return () => {
      window.removeEventListener("resize", updateAnchorRect);
      window.removeEventListener("scroll", updateAnchorRect, true);
    };
  }, [open, updateAnchorRect]);

  React.useEffect(() => {
    if (!open) return;
    requestAnimationFrame(() => {
      if (inputRef && inputRef.current) inputRef.current.focus();
    });
  }, [open, inputRef]);

  React.useLayoutEffect(() => {
    if (!open || focusedIndex < 0) return;
    const trimmed = (query || "").trim();
    const navigableEntries = getGlobalSearchNavigableEntries(trimmed, resultEntries);
    if (!navigableEntries.length) return;
    const entry = navigableEntries[focusedIndex];
    if (!entry) return;
    const viewport = resultsViewportRef.current;
    if (!viewport) return;
    const isAiFooterFocus = isGlobalSearchChatEntry(entry) && (entry.key === GLOBAL_SEARCH_ASK_AI_PROMPT_KEY || focusedIndex >= GLOBAL_SEARCH_ZERO_STATE_AI_START);
    if (isAiFooterFocus) {
      viewport.scrollTop = viewport.scrollHeight;
      return;
    }
    const focusedNode = viewport.querySelector('[data-global-search-result-key="' + entry.key + '"]');
    if (!focusedNode) return;
    const nodeTop = focusedNode.offsetTop;
    const nodeBottom = nodeTop + focusedNode.offsetHeight;
    const visibleTop = viewport.scrollTop;
    const visibleBottom = visibleTop + viewport.clientHeight;
    if (nodeBottom > visibleBottom) {
      viewport.scrollTop += nodeBottom - visibleBottom;
    } else if (nodeTop < visibleTop) {
      viewport.scrollTop -= visibleTop - nodeTop;
    }
  }, [open, focusedIndex, resultEntries, query]);

  if (!open) return null;

  const barTop = anchorRect ? anchorRect.barTop : 56;
  const barLeft = anchorRect ? anchorRect.barLeft : 16;
  const barWidth = anchorRect ? anchorRect.barWidth : 420;
  const panelTop = barTop - MODAL_BAR_INSET_TOP;
  const panelLeft = barLeft - MODAL_BAR_INSET_X;
  const panelWidth = barWidth + (MODAL_BAR_INSET_X * 2);
  const maxPanelHeight = Math.min(480, window.innerHeight - panelTop - 24);
  const trimmedQuery = (query || "").trim();
  const panelBg = shell.isNazgul ? "#1A1D21" : "#FFFFFF";
  const panelBorder = shell.borderPrimaryStroke || (shell.isNazgul ? "rgba(255,255,255,0.18)" : "#21262A");
  const dividerColor = shell.isNazgul ? "rgba(255,255,255,0.08)" : "#EEF2F4";

  const modal = (
    <div
      style={{ position: "fixed", inset: 0, zIndex: 6000 }}
      role="presentation"
      onClick={onClose}
    >
      <div aria-hidden="true" style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.35)", backdropFilter: "blur(4px)", WebkitBackdropFilter: "blur(4px)" }} />
      <div
        role="dialog"
        aria-modal="true"
        aria-label="Search navigation"
        style={{
          position: "absolute",
          top: panelTop,
          left: panelLeft,
          width: panelWidth,
          maxHeight: maxPanelHeight,
          backgroundColor: panelBg,
          border: "1px solid " + panelBorder,
          borderRadius: 12,
          boxShadow: shell.isNazgul ? "0 12px 40px rgba(0,0,0,0.45)" : "0 12px 40px rgba(15,23,42,0.14)",
          overflow: "hidden",
          display: "flex",
          flexDirection: "column",
          ["--global-search-placeholder"]: shell.searchPlaceholder,
          ["--global-search-focus-bg"]: shell.hoverBg,
        }}
        onClick={(event) => event.stopPropagation()}
        onKeyDown={(event) => {
          if (event.key === "ArrowDown" || event.key === "ArrowUp" || event.key === "Enter" || event.key === "Escape") {
            if (typeof onInputKeyDown === "function") onInputKeyDown(event);
          }
        }}
      >
        <div
          role="search"
          style={{
            flexShrink: 0,
            marginTop: MODAL_BAR_INSET_TOP,
            marginLeft: MODAL_BAR_INSET_X,
            marginRight: MODAL_BAR_INSET_X,
            width: barWidth,
            height: 32,
            boxSizing: "border-box",
            display: "flex",
            alignItems: "center",
            gap: 8,
            paddingLeft: 8,
            paddingRight: 8,
            backgroundColor: shell.navBg,
            borderRadius: 12,
            border: shell.searchBarBorder,
          }}
        >
          <div style={{ position: "relative", flexShrink: 0, width: NAV_ICON, height: NAV_ICON, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <GlobalSearchMagnifierIcon shell={shell} size={12} />
          </div>
          <input
            ref={inputRef}
            type="text"
            className="global-nav-search-input"
            value={query}
            onChange={(event) => onQueryChange(event.target.value)}
            onKeyDown={onInputKeyDown}
            placeholder={placeholder}
            aria-label={placeholder}
            style={{
              flex: 1,
              minWidth: 0,
              border: "none",
              outline: "none",
              background: "transparent",
              fontFamily: FONT,
              fontSize: 12,
              fontWeight: 400,
              lineHeight: 1.3,
              color: shell.textPrimary,
            }}
          />
          {query ? (
            <button
              type="button"
              aria-label="Clear search"
              onClick={(event) => {
                event.stopPropagation();
                onQueryChange("");
                if (inputRef && inputRef.current) inputRef.current.focus();
              }}
              style={{
                width: 16,
                height: 16,
                border: "none",
                borderRadius: "50%",
                background: shell.isNazgul ? "rgba(255,255,255,0.22)" : "rgba(96,114,128,0.24)",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                padding: 0,
                margin: 0,
                cursor: "pointer",
                color: shell.isNazgul ? "#E8EAED" : "#2B3135",
                flexShrink: 0,
              }}
            >
              <svg width="10" height="10" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M3 3L9 9M9 3L3 9" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" /></svg>
            </button>
          ) : null}
        </div>
        <div ref={resultsViewportRef} style={{ flex: 1, minHeight: 0, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: "4px 12px 12px", borderTop: trimmedQuery ? ("1px solid " + dividerColor) : "none", marginTop: trimmedQuery ? 4 : 0 }}>
          {!trimmedQuery ? (
            <>
              <GlobalSearchDefaultSection title="Pages" sectionIcon={<GlobalSearchPagesSectionIcon shell={shell} />} items={GLOBAL_SEARCH_DEFAULT_PAGES} shell={shell} focusedIndex={focusedIndex} startIndex={0} onFocusResultIndex={onFocusResultIndex} />
              <GlobalSearchDefaultSection title="Actions" sectionIcon={<CreateNavMarkIcon />} items={GLOBAL_SEARCH_DEFAULT_ACTIONS} shell={shell} focusedIndex={focusedIndex} startIndex={GLOBAL_SEARCH_DEFAULT_PAGES.length} onFocusResultIndex={onFocusResultIndex} />
            </>
          ) : resultEntries.length === 0 ? (
            <div style={{ padding: "14px 12px", fontFamily: FONT, fontSize: 12, lineHeight: 1.4, color: shell.textSecondary }}>
              No results found
            </div>
          ) : (
            resultEntries.map((entry, index) => {
              const display = getEntryDisplay(entry);
              const highlightQuery = trimmedQuery ? query : "";
              const isFocused = index === focusedIndex;
              return (
                <div
                  key={entry.key}
                  role="button"
                  tabIndex={-1}
                  data-global-search-result-key={entry.key}
                  className={"profile-flyout-row-btn global-nav-search-result" + (isFocused ? " global-nav-search-result--focused" : "")}
                  onMouseDown={(event) => event.preventDefault()}
                  onMouseEnter={() => { if (typeof onFocusResultIndex === "function") onFocusResultIndex(index); }}
                  onClick={() => onSelectResult(entry)}
                  style={{
                    width: "calc(100% - 8px)",
                    margin: "2px 4px",
                    textAlign: "left",
                  }}
                >
                  <span style={{ display: "flex", flexDirection: "column", gap: 2, minWidth: 0 }}>
                    <span style={{ fontFamily: FONT, fontSize: 13, fontWeight: 400, lineHeight: 1.3, color: shell.textPrimary, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {highlightQuery ? renderHighlightedText(display.title, highlightQuery, { bold: true }) : display.title}
                    </span>
                    {display.subtitle ? (
                      <span style={{ fontFamily: FONT, fontSize: 11, lineHeight: 1.3, color: shell.textSecondary, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {highlightQuery ? renderHighlightedText(display.subtitle, highlightQuery, { bold: true }) : display.subtitle}
                      </span>
                    ) : null}
                  </span>
                </div>
              );
            })
          )}
        </div>
        <div style={{ flexShrink: 0, borderTop: "1px solid " + dividerColor, padding: "8px 12px 12px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "2px 4px 8px" }}>
            <div style={{ flexShrink: 0, width: NAV_ICON, height: NAV_ICON, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <IntuitAiOmniIcon size={NAV_ICON} />
            </div>
            <span style={{ fontFamily: FONT, fontSize: 12, fontWeight: 600, lineHeight: 1.3, color: shell.textPrimary }}>
              Ask Intuit AI
            </span>
          </div>
          <div style={{ paddingLeft: GLOBAL_SEARCH_SECTION_ROW_INDENT }}>
            {trimmedQuery ? (
              <GlobalSearchAskAiPromptRow
                query={query}
                shell={shell}
                isFocused={focusedIndex === resultEntries.length}
                onMouseEnter={() => { if (typeof onFocusResultIndex === "function") onFocusResultIndex(resultEntries.length); }}
                onActivate={onStartChat}
              />
            ) : GLOBAL_SEARCH_DEFAULT_AI_CONVERSATIONS.map((item, index) => (
              <GlobalSearchDefaultRow
                key={item.key}
                item={item}
                shell={shell}
                isFocused={focusedIndex === GLOBAL_SEARCH_ZERO_STATE_AI_START + index}
                onMouseEnter={() => { if (typeof onFocusResultIndex === "function") onFocusResultIndex(GLOBAL_SEARCH_ZERO_STATE_AI_START + index); }}
                onActivate={onStartChat}
              />
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  return ReactDOM.createPortal(modal, document.body);
}

function CustomizeModal({
  open,
  onCloseDiscard,
  onSaveClose,
  navRevealMode,
  onNavRevealModeChange,
  navigationCanvasBehavior,
  onNavigationCanvasBehaviorChange,
  shellThemeId,
  onShellPreviewChange,
  bookmarkItems = [],
  onToggleBookmark,
  initialTab = "navigation",
  pinnableApps = null,
  pinnedApps = null,
  onTogglePinnedApp = null,
  onReorderPinned = null,
  keyboardShortcuts = null,
  onKeyboardShortcutsChange = null,
  sectionBehavior = "multiple",

  showSectionBehavior = true,
  rowBehavior = "openOnly",
  onRowBehaviorChange = null,
  showRowBehavior = true,
  showPinnedApps = true,
  lockModalHeight = false,
  getL1PagesForL0 = null,

  onRestoreL1OrderForL0 = null,
  navPageEditorApps = null,

  defaultLandingPage = DEFAULT_LANDING_PAGE,
  onDefaultLandingPageChange = null,
}) {
  const [modalTab, setModalTab] = useState("navigation");

  React.useEffect(() => {
    if (open) setModalTab(initialTab || "navigation");

  const landingPage = defaultLandingPage;
  const setLandingPage = (next) => {

function formatRealmIdGrouped(id) {
  const d = String(id || "").replace(/\D/g, "").slice(0, 16);
  const padded = d.length >= 16 ? d : d.padEnd(16, "0");
  return padded.match(/.{1,4}/g).join(" ");
}

function ProfileSettingsNavBlock({ collapsed, navRailRef, userDisplayName, activeCompany, companyRealmId, flyoutOpen, setFlyoutOpen, closeOtherFlyouts }) {
  const anchorRef = useRef(null);
  const shell = useShell();
  const [hovered, setHovered] = useState(false);
  const [menuPos, setMenuPos] = useState({ left: 0, bottom: 16 });

  const commitMenuPosition = React.useCallback(() => {
    const anchor = anchorRef.current;
    if (!anchor) return;
    const rail = navRailRef && navRailRef.current;
    const ar = anchor.getBoundingClientRect();
    const railRect = rail ? rail.getBoundingClientRect() : null;
    const left = railRect ? Math.round(railRect.right) : Math.round(ar.right);
    const bottom = railRect ? Math.max(0, Math.round(window.innerHeight - railRect.bottom)) : 16;
    setMenuPos({ left, bottom });
  }, [navRailRef]);

  useLayoutEffect(() => {
    if (!flyoutOpen) return;
    commitMenuPosition();
    let rafInner = null;
    const rafOuter = requestAnimationFrame(() => {
      rafInner = requestAnimationFrame(() => commitMenuPosition());
    });
    const onWin = () => commitMenuPosition();
    window.addEventListener("resize", onWin);
    let roA;
    let roR;
    if (typeof ResizeObserver !== "undefined") {
      if (anchorRef.current) {
        roA = new ResizeObserver(() => commitMenuPosition());
        roA.observe(anchorRef.current);
      }
      if (navRailRef && navRailRef.current) {
        roR = new ResizeObserver(() => commitMenuPosition());
        roR.observe(navRailRef.current);
      }
    }
    return () => {
      cancelAnimationFrame(rafOuter);
      if (rafInner != null) cancelAnimationFrame(rafInner);
      window.removeEventListener("resize", onWin);
      if (roA) roA.disconnect();
      if (roR) roR.disconnect();
    };
  }, [flyoutOpen, collapsed, commitMenuPosition, navRailRef]);

  const handleRowClick = () => {
    if (flyoutOpen) {
      setFlyoutOpen(false);
      return;
    }
    if (typeof ReactDOM.flushSync === "function") {
      ReactDOM.flushSync(() => {
        commitMenuPosition();
        setFlyoutOpen(true);
      });
    } else {
      commitMenuPosition();
      setFlyoutOpen(true);
    }
  };

  return (
    <div>
      <Tooltip label="Profile and account" enabled={!flyoutOpen}>
        <button
          ref={anchorRef}
          type="button"
          onClick={handleRowClick}
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          style={{
            width: NAV_ICON + 8,
            height: NAV_ICON + 8,
            margin: 0,
            padding: 4,
            border: "none",
            borderRadius: 6,
            backgroundColor: (hovered || flyoutOpen) ? shell.hoverBg : "transparent",
            cursor: "pointer",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            transition: "background-color 150ms ease",
          }}
        >
          <ProfileSettingsNavIcon active={flyoutOpen} />
        </button>
      </Tooltip>
      <ProfileSettingsFlyoutMenu
        isOpen={flyoutOpen}
        fixedPos={menuPos}
        onClose={() => setFlyoutOpen(false)}
        anchorRef={anchorRef}
        userDisplayName={userDisplayName}
        activeCompany={activeCompany}
        companyRealmId={companyRealmId}
      />
    </div>
  );
}

function BookmarkCurrentPageFooterItem({ collapsed, onClick, alreadyBookmarked = false }) {
  const [forcedTip, setForcedTip] = useState(false);
  const [tipPos, setTipPos] = useState({ top: 0, left: 0 });
  const [pulse, setPulse] = useState(false);
  const prevBookmarkedRef = useRef(alreadyBookmarked);
  const tipTimerRef = useRef(null);
  const rowRef = useRef(null);
  const alreadyLabel = "Current page already bookmarked";

  useEffect(() => () => {
    if (tipTimerRef.current) clearTimeout(tipTimerRef.current);
  }, []);

  // Pulse the icon when the current page transitions into a bookmarked state.
  useEffect(() => {
    let frame = null;
    if (alreadyBookmarked && !prevBookmarkedRef.current) {
      setPulse(false);
      frame = requestAnimationFrame(() => setPulse(true));
    }
    prevBookmarkedRef.current = alreadyBookmarked;
    return () => { if (frame) cancelAnimationFrame(frame); };
  }, [alreadyBookmarked]);

  const showAlreadyBookmarkedTip = () => {
    if (!rowRef.current) return;
    const r = rowRef.current.getBoundingClientRect();
    setTipPos({ top: r.top + r.height / 2, left: r.right + 4 });
    setForcedTip(true);
    if (tipTimerRef.current) clearTimeout(tipTimerRef.current);
    tipTimerRef.current = setTimeout(() => setForcedTip(false), 2000);
  };

  const handleClick = () => {
    if (alreadyBookmarked) {
      showAlreadyBookmarkedTip();
      return;
    }
    if (onClick) onClick();
  };

  return (
    <div ref={rowRef} style={{ width: "100%" }}>
      <Tooltip label={alreadyLabel} enabled={alreadyBookmarked && !forcedTip}>
        <NavItem
          icon={
            <span
              className={pulse ? "d-bookmark-current-page-icon--pulse" : undefined}
              onAnimationEnd={(event) => { if (event.animationName === "dBookmarkIconPulse") setPulse(false); }}
              style={{ display: "inline-flex", transformOrigin: "center center" }}
            >
              <BookPagesBookmarkIcon filled={alreadyBookmarked} useInactiveColor />
            </span>
          }
          iconOverflowVisible
          label="Bookmark current page"
          isActive={false}
          onClick={handleClick}
          collapsed={collapsed}
        />
      </Tooltip>
      {forcedTip ? (
        <div style={{
          position: "fixed", top: tipPos.top, left: tipPos.left,
          transform: "translateY(-50%)",
          backgroundColor: "#2B2D30", color: "white",
          fontSize: 12, fontFamily: "'Avenir Next forINTUIT', 'Avenir Next', sans-serif", fontWeight: 400,
          padding: "4px 10px", borderRadius: 5, whiteSpace: "nowrap",
          pointerEvents: "none", zIndex: 9999,
          animation: "tooltipIn 150ms ease-out",
          boxShadow: "0 2px 8px rgba(0,0,0,0.18)",
        }}>
          {alreadyLabel}
        </div>
      ) : null}
    </div>
  );
}

function ReportsFlyoutMenu({ isOpen, onClose, onPick, reportsSelection, anchorRef, onMenuPointerEnter, onMenuPointerLeave }) {
  const [pos, setPos] = useState({ top: 0, left: 0 });
  const menuRef = useRef(null);

  useEffect(() => {
    if (isOpen && anchorRef.current) {
      const r = anchorRef.current.getBoundingClientRect();
      setPos({ top: r.top, left: r.right + 4 });
    }
  }, [isOpen]);

  useEffect(() => {
    if (!isOpen) return;
    const handler = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target) && anchorRef.current && !anchorRef.current.contains(e.target)) {
        onClose();
      }
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [isOpen, onClose]);

  if (!isOpen) return null;

  return (
    <div ref={menuRef} onPointerEnter={onMenuPointerEnter} onPointerLeave={onMenuPointerLeave} onClick={(e) => e.stopPropagation()} style={{
      position: "fixed", top: pos.top, left: pos.left,
      backgroundColor: "white",
      borderRadius: "6px",
      border: "1px solid #BABEC5",
      boxShadow: "0 8px 32px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08)",
      zIndex: 1000, animation: "dropIn 150ms ease",
      overflow: "hidden", minWidth: 200,
    }}>
      <div style={{
        padding: "8px 12px", borderBottom: "1px solid #eef1f3",
        fontFamily: FONT_DEMI, fontWeight: 600, fontSize: 13, color: TEXT_PRIMARY,
      }}>Reports</div>
      <div style={{ padding: "4px 0", maxHeight: "min(70vh, 480px)", overflowY: "auto" }}>
        {reportsNavConfig.flatMap((entry) =>
          entry.children
            ? entry.children.map((c) => (
                <FlyoutItem key={entry.name + ":" + c} label={c} paddingLeft={12} isActive={reportsSelection?.l1 === entry.name && reportsSelection?.l2 === c} onClick={() => onPick(entry.name, c)} />
              ))
            : [<FlyoutItem key={entry.name} label={entry.name} isActive={reportsSelection?.l1 === entry.name && !reportsSelection?.l2} onClick={() => onPick(entry.name)} />]
        )}
      </div>
    </div>
  );
}

function flattenCreateMenuActions(actions) {
  return actions.flatMap((action) => {

}

  "print check": "Print checks",
  "bank transaction": "Expense",
  "bank transactions": "Expense",

  new Set([
    ...CREATE_FLYOUT_RECENT,
    ...CREATE_FLYOUT_CATEGORIES.flatMap((cat) => cat.actions),
    ...CREATE_LARGE_COLUMNS.flatMap((col) => flattenCreateMenuActions(col.actions)),
  ])
);
const CREATE_FLYOUT_ACTION_ORDER = CREATE_FLYOUT_ALL_ACTION_LABELS;
const CREATE_FLYOUT_ACTION_ORDER_INDEX = CREATE_FLYOUT_ACTION_ORDER.reduce((acc, action, index) => {
  acc[action] = index;
  return acc;
}, {});

function resolveCanonicalCreateActionLabel(value) {
  const normalized = (value || "").trim().toLowerCase();
  if (!normalized) return "";
  const alias = CREATE_FLYOUT_LABEL_ALIASES[normalized];
  if (alias) return alias;
  const match = CREATE_FLYOUT_ALL_ACTION_LABELS.find((entry) => entry.trim().toLowerCase() === normalized);
  return match || String(value).trim();
}

function CreateFlyoutActionRow({
  label,
  onActivate,
  onTogglePin = null,
  isPinned = false,
  highlightQuery = "",
  badge = null,
  paddingX = CREATE_FLYOUT_GUTTER,
  extraRightPad = 0,
  topGap = 0,
}) {
  const [hovered, setHovered] = useState(false);
  const hasPinToggle = typeof onTogglePin === "function";
  const pinTextGapPx = 8;
  const pinHitboxPx = CREATE_FLYOUT_ACTION_ICON + 2;
  const baseTextToPinGapPx = Math.max(0, extraRightPad - pinHitboxPx);
  const textReservePx = Math.max(0, pinTextGapPx - baseTextToPinGapPx);
  return (
    <button
      className="profile-flyout-row-btn"
      type="button"
      onClick={onActivate}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        display: "flex",
        alignItems: "center",
        justifyContent: "flex-start",
        gap: 8,
        width: "100%",
        boxSizing: "border-box",
        border: "none",
        backgroundColor: hovered ? HOVER_BG : "transparent",
        cursor: "pointer",
        fontFamily: FONT,
        fontSize: NAV_L1_FONT_SIZE,
        fontWeight: NAV_L1_FONT_WEIGHT,
        lineHeight: NAV_LABEL_LINE_HEIGHT,
        color: PROFILE_FLYOUT_LINK_COLOR,
        paddingTop: 8,
        paddingBottom: 8,
        paddingLeft: paddingX,
        paddingRight: paddingX + extraRightPad,
        marginTop: topGap,
        textAlign: "left",
        transition: "background-color 100ms ease",
        position: "relative",
      }}
    >
      <span
        style={{
          minWidth: 0,
          flex: 1,
          display: "flex",
          alignItems: "center",
          gap: 8,
          maxWidth: (hovered && hasPinToggle) ? `calc(100% - ${textReservePx}px)` : "100%",
          transition: "max-width 100ms ease",
        }}
      >
        <span style={{ minWidth: 0, flex: 1, textAlign: "left", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
          {highlightQuery ? renderHighlightedText(label, highlightQuery, { bold: true }) : label}
        </span>
        {badge ? (
          <span style={{ flexShrink: 0, fontFamily: FONT_DEMI, fontWeight: 600, fontSize: 10, letterSpacing: "0.04em", color: "#FFFFFF", background: "#9B3C8E", borderRadius: 4, padding: "2px 6px", lineHeight: 1.2 }}>
            {badge}
          </span>
        ) : null}
      </span>
      <span
        role={hasPinToggle ? "button" : undefined}
        tabIndex={hasPinToggle ? 0 : -1}
        aria-label={isPinned ? ("Unpin " + label) : ("Pin " + label)}
        onClick={(event) => {
          event.stopPropagation();
          if (hasPinToggle) onTogglePin();
        }}
        onKeyDown={(event) => {
          if (!hasPinToggle) return;
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            event.stopPropagation();
            onTogglePin();
          }
        }}
        style={{
          width: CREATE_FLYOUT_ACTION_ICON + 2,
          height: CREATE_FLYOUT_ACTION_ICON + 2,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          opacity: hovered ? 1 : 0,
          transition: "opacity 100ms ease",
          pointerEvents: (hasPinToggle && hovered) ? "auto" : "none",
          border: "none",
          background: "transparent",
          padding: 0,
          margin: 0,
          position: "absolute",
          right: Math.max(0, paddingX),
          top: "50%",
          transform: "translateY(-50%)",
          cursor: hasPinToggle ? "pointer" : "default",
