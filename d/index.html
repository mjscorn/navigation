          overflow: "visible",
        }}
      >
        <PinToggleIcon filled={isPinned && hovered} size={CREATE_FLYOUT_ACTION_ICON} />
      </span>
    </button>
  );
}

function CreateFlyoutMenu({ isOpen, onClose, anchorRef, fixedPos, onMenuPointerEnter, onMenuPointerLeave, launcherModalOpen, setLauncherModalOpen, expanded, onToggleExpanded, onActionTaken, alignRight = false }) {
  const menuRef = useRef(null);
  const [createActionTakenLabel, setCreateActionTakenLabel] = useState(null);
  const runCreateAction = (label) => {
    if (!label) return;
    setCreateActionTakenLabel(label);
    if (typeof onActionTaken === "function") onActionTaken();
    if (typeof onClose === "function") onClose();
  };
  const [pinnedActions, setPinnedActions] = useState([]);
  const normalizeCreateActionLabel = (value) => (value || "").trim().toLowerCase();
  const resolveCanonicalCreateLabel = (value) => resolveCanonicalCreateActionLabel(value);
  const pinnedActionSet = new Set(pinnedActions.map((action) => normalizeCreateActionLabel(action)));
  const frequentActions = CREATE_FLYOUT_RECENT.filter((action) => !pinnedActionSet.has(normalizeCreateActionLabel(action)));
  const topActions = [...pinnedActions, ...frequentActions];
  const categoriesWithUnpinnedActions = CREATE_FLYOUT_CATEGORIES.map((cat) => ({
    ...cat,
    actions: cat.actions.filter((action) => {
      const label = typeof action === "string" ? action : action.label;
      return !pinnedActionSet.has(normalizeCreateActionLabel(label));
    }),
  }));

  const togglePinnedAction = (label) => {
    setPinnedActions((prev) => {
      const canonicalLabel = resolveCanonicalCreateLabel(label);
      const normalizedLabel = normalizeCreateActionLabel(canonicalLabel);
      const existingIndex = prev.findIndex((entry) => normalizeCreateActionLabel(entry) === normalizedLabel);
      if (existingIndex >= 0) return prev.filter((_, index) => index !== existingIndex);
      return [...prev, canonicalLabel];
    });
  };

  useEffect(() => {
    if (!isOpen) return;
    const handler = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target) && anchorRef.current && !anchorRef.current.contains(e.target)) {
        onClose();
      }
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [isOpen, onClose, anchorRef]);

  if (!isOpen && !launcherModalOpen && !createActionTakenLabel) return null;

  const resolvedPos = (() => {
    if (!alignRight || fixedPos.left > 0) return fixedPos;
    const anchor = anchorRef && anchorRef.current;
    if (!anchor) return fixedPos;
    const ar = anchor.getBoundingClientRect();
    return { top: Math.round(ar.bottom + 6), left: Math.round(ar.right) };
  })();

  const maxH = `min(560px, calc(100vh - ${Math.max(0, resolvedPos.top)}px - 16px))`;
  const largeMaxW = alignRight
    ? `${Math.max(240, Math.round(resolvedPos.left) - 16)}px`
    : `calc(100vw - ${Math.max(0, resolvedPos.left)}px - 16px)`;
  const createExpandedColInset = CREATE_FLYOUT_GUTTER;

  const panel = isOpen ? (
    <div
      ref={menuRef}
      onPointerEnter={onMenuPointerEnter}
      onPointerLeave={onMenuPointerLeave}
      onClick={(e) => e.stopPropagation()}
      style={{
        position: "fixed",
        top: resolvedPos.top,
        ...(alignRight ? {
          right: Math.max(8, Math.round(window.innerWidth - resolvedPos.left)),
          left: "auto",
        } : {
          left: resolvedPos.left,
        }),
        minWidth: CREATE_FLYOUT_MIN_WIDTH,
        backgroundColor: "white",
        borderRadius: "6px",
        border: "1px solid #BABEC5",
        boxShadow: "6px 8px 24px rgba(0,0,0,0.12), 2px 2px 4px rgba(0,0,0,0.06)",
        zIndex: 2400,
        animation: "dropIn 150ms ease",
        display: "flex",
        flexDirection: "column",
        ...(expanded ? {
          width: "max-content",
          maxWidth: largeMaxW,
          overflowX: "auto",
          overflowY: "hidden",
        } : {
          ...CREATE_FLYOUT_PANEL_STYLE,
          maxHeight: maxH,
          overflow: "hidden",
        }),
      }}
    >
      <div style={CREATE_FLYOUT_HEADER_WRAP_STYLE}>
        <div style={CREATE_FLYOUT_HEADER_TITLE_STYLE}>Create new</div>
      </div>
      {expanded ? (
        <div style={{ padding: `${CREATE_FLYOUT_BODY_TOP_PAD}px 0 24px`, flex: 1, minHeight: 0, display: "flex", gap: 24, alignItems: "flex-start" }}>
          <div style={{ flexShrink: 0, display: "flex", flexDirection: "column", width: "max-content", minWidth: CREATE_FLYOUT_EXPANDED_TOP_ACTIONS_MIN_WIDTH }}>
            <div style={CREATE_FLYOUT_SECTION_TITLE_STYLE}>Top actions</div>
            {topActions.map((label) => (
              <CreateFlyoutActionRow
                key={"create-top:" + label}
                label={label}
                onActivate={() => runCreateAction(label)}
                onTogglePin={() => togglePinnedAction(label)}
                isPinned={pinnedActionSet.has(normalizeCreateActionLabel(label))}
                paddingX={createExpandedColInset}
                extraRightPad={24}
              />
            ))}
          </div>
          {CREATE_LARGE_COLUMNS.map((col) => (
            <div key={col.title} style={{ flexShrink: 0, display: "flex", flexDirection: "column", width: "max-content" }}>
              <div style={CREATE_FLYOUT_SECTION_TITLE_STYLE}>{col.title}</div>
              {col.actions.map((action) => {
                const actionConfig = typeof action === "string" ? { label: action } : action;
                if (actionConfig.sectionTitle) {
                  return (
                    <div
                      key={col.title + ":section:" + actionConfig.sectionTitle}
                      style={{
                        fontFamily: FONT_DEMI,
                        fontWeight: NAV_L0_FONT_WEIGHT,
                        fontSize: NAV_L0_FONT_SIZE,
                        color: TEXT_PRIMARY,
                        lineHeight: NAV_LABEL_LINE_HEIGHT,
                        marginTop: actionConfig.spacerBefore ? 16 : 8,
                        marginBottom: 4,
                        paddingLeft: createExpandedColInset,
                      }}
                    >
                      {actionConfig.sectionTitle}
                    </div>
                  );
                }
                const label = actionConfig.label;
                const badge = actionConfig.badge || null;
                const topGap = actionConfig.spacerBefore ? 16 : 0;
                return (
                  <CreateFlyoutActionRow
                    key={label}
                    label={label}
                    onActivate={() => runCreateAction(label)}
                    onTogglePin={() => togglePinnedAction(label)}
                    isPinned={pinnedActionSet.has(normalizeCreateActionLabel(label))}
                    badge={badge}
                    paddingX={createExpandedColInset}
                    extraRightPad={24}
                    topGap={topGap}
                  />
                );
              })}
            </div>
          ))}
        </div>
      ) : (
        <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          <div style={{ padding: `${CREATE_FLYOUT_BODY_TOP_PAD}px 0`, overflowY: "auto", flex: 1, minHeight: 0 }}>
            <div style={CREATE_FLYOUT_SECTION_TITLE_STYLE}>Top actions</div>
            {topActions.map((label) => (
              <CreateFlyoutActionRow
                key={"create-top:" + label}
                label={label}
                onActivate={() => runCreateAction(label)}
                onTogglePin={() => togglePinnedAction(label)}
                isPinned={pinnedActionSet.has(normalizeCreateActionLabel(label))}
              />
            ))}
          </div>
          <div style={{ flexShrink: 0, paddingBottom: 6 }}>
            {topActions.length > 0 ? (
              <div aria-hidden="true" style={{ height: 1, width: "100%", backgroundColor: "#eef1f3", marginTop: 2 }} />
            ) : null}
            <button
              type="button"
              className="profile-flyout-row-btn"
              aria-label="Show all create actions"
              onClick={() => { if (typeof onToggleExpanded === "function") onToggleExpanded(true); }}
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                gap: 8,
                border: "none",
                background: "transparent",
                cursor: "pointer",
                fontFamily: FONT,
                fontSize: 13,
                fontWeight: 400,
                lineHeight: 1.35,
                color: TEXT_PRIMARY,
                padding: `8px ${CREATE_FLYOUT_GUTTER}px`,
                marginTop: topActions.length > 0 ? 8 : 0,
                textAlign: "left",
              }}
            >
              <span style={{ minWidth: 0, flex: 1, textAlign: "left", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>Show all</span>
              <CreateExpandIcon size={16} />
            </button>
          </div>
        </div>
      )}
    </div>
  ) : null;

  const launcherModal = launcherModalOpen ? (
    <div
      onClick={() => setLauncherModalOpen(false)}
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(33,38,42,0.24)",
        zIndex: 2600,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: 420,
          maxWidth: "calc(100vw - 24px)",
          background: "#FFFFFF",
          border: "1px solid #BABEC5",
          borderRadius: 8,
          boxShadow: "6px 8px 24px rgba(0,0,0,0.12), 2px 2px 4px rgba(0,0,0,0.06)",
          padding: "14px 16px",
        }}
      >
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
          <span style={{ fontFamily: FONT_DEMI, fontSize: 14, fontWeight: 500, color: TEXT_PRIMARY }}>Create modal</span>
          <button type="button" aria-label="Close modal" onClick={() => setLauncherModalOpen(false)} style={{ border: "none", background: "transparent", cursor: "pointer", padding: 0, color: TEXT_PRIMARY }}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><line x1="3" y1="3" x2="13" y2="13" /><line x1="13" y1="3" x2="3" y2="13" /></svg>
          </button>
        </div>
        <div style={{ marginTop: 10, fontFamily: FONT, fontSize: 13, fontWeight: 400, color: TEXT_PRIMARY, lineHeight: 1.35 }}>
          Placeholder modal opened from Create flyout title action.
        </div>
      </div>
    </div>

function CreateNavSection({ collapsed, navRailRef, flyoutOpen, setFlyoutOpen, closeOtherFlyouts, closeHoverFlyouts, menuExpanded = false, setMenuExpanded, ownsFlyout = true, layoutStack = false, titlesOnly = false, editPreviewRowLead = false }) {
  const anchorRef = useRef(null);
  const [menuPos, setMenuPos] = useState({ top: 0, left: 0 });
  const [createLauncherModalOpen, setCreateLauncherModalOpen] = useState(false);

  const commitMenuPosition = React.useCallback(() => {
    const anchor = anchorRef.current;
    if (!anchor) return;
    const ar = anchor.getBoundingClientRect();
    const left = Math.round(ar.right) - 6;
    const top = Math.round(ar.top);
    setMenuPos({ top, left });
  }, [navRailRef]);

  useLayoutEffect(() => {
    if (!flyoutOpen) return;
    commitMenuPosition();
    let rafInner = null;
    const rafOuter = requestAnimationFrame(() => {
      rafInner = requestAnimationFrame(() => commitMenuPosition());
    });
    const onWin = () => commitMenuPosition();
    window.addEventListener("resize", onWin);
    let roA;
    let roR;
    if (typeof ResizeObserver !== "undefined") {
      if (anchorRef.current) {
        roA = new ResizeObserver(() => commitMenuPosition());
        roA.observe(anchorRef.current);
      }
      if (navRailRef && navRailRef.current) {
        roR = new ResizeObserver(() => commitMenuPosition());
        roR.observe(navRailRef.current);
      }
    }
    return () => {
      cancelAnimationFrame(rafOuter);
      if (rafInner != null) cancelAnimationFrame(rafInner);
      window.removeEventListener("resize", onWin);
      if (roA) roA.disconnect();
      if (roR) roR.disconnect();
    };
  }, [flyoutOpen, collapsed, commitMenuPosition, navRailRef]);

  useEffect(() => {
    if (!flyoutOpen && typeof setMenuExpanded === "function") setMenuExpanded(false);
  }, [flyoutOpen, setMenuExpanded]);

  const handleRowClick = () => {
    if (flyoutOpen && menuExpanded) {
      if (typeof setMenuExpanded === "function") setMenuExpanded(false);
      return;
    }
    if (flyoutOpen && !menuExpanded) {
      if (typeof setMenuExpanded === "function") setMenuExpanded(true);
      return;
    }
    if (typeof closeHoverFlyouts === "function") closeHoverFlyouts();
    else closeOtherFlyouts();
    commitMenuPosition();
    setFlyoutOpen(true);
    if (typeof setMenuExpanded === "function") setMenuExpanded(false);
  };

  return (
    <div>
      <Tooltip label="Create new" enabled={collapsed && !flyoutOpen}>
        <HomeAppsEditPreviewRowLead enabled={editPreviewRowLead} collapsed={collapsed}>
          <div ref={anchorRef} style={{ width: "100%", position: "relative" }}>
            <CreateNavButton
              collapsed={collapsed}
              flyoutOpen={flyoutOpen}
              menuExpanded={menuExpanded}
              onClick={handleRowClick}
              layoutStack={layoutStack}
              titlesOnly={titlesOnly}
              leftMargin={editPreviewRowLead && !collapsed ? 0 : 10}
            />
          </div>
        </HomeAppsEditPreviewRowLead>
      </Tooltip>
      <CreateFlyoutMenu
        isOpen={flyoutOpen && ownsFlyout}
        fixedPos={menuPos}
        onClose={() => setFlyoutOpen(false)}
        anchorRef={anchorRef}
        launcherModalOpen={createLauncherModalOpen}
        setLauncherModalOpen={setCreateLauncherModalOpen}
        expanded={menuExpanded}
        onToggleExpanded={setMenuExpanded}
        onActionTaken={() => setFlyoutOpen(false)}
      />
    </div>
  );
}

function CreateHeaderSection({ flyoutOpen, setFlyoutOpen, menuExpanded, setMenuExpanded, closeOtherFlyouts }) {
  const anchorRef = useRef(null);
  const [menuPos, setMenuPos] = useState({ top: 0, left: 0 });
  const [createLauncherModalOpen, setCreateLauncherModalOpen] = useState(false);

  const commitMenuPosition = React.useCallback(() => {
    const anchor = anchorRef.current;
    if (!anchor) return;
    const ar = anchor.getBoundingClientRect();
    setMenuPos({ top: Math.round(ar.bottom + 6), left: Math.round(ar.right) });
  }, []);

  useLayoutEffect(() => {
    if (!flyoutOpen) return;
    commitMenuPosition();
    const onWin = () => commitMenuPosition();
    window.addEventListener("resize", onWin);
    window.addEventListener("scroll", onWin, true);
    let roA;
    if (typeof ResizeObserver !== "undefined" && anchorRef.current) {
      roA = new ResizeObserver(() => commitMenuPosition());
      roA.observe(anchorRef.current);
    }
    return () => {
      window.removeEventListener("resize", onWin);
      window.removeEventListener("scroll", onWin, true);
      if (roA) roA.disconnect();
    };
  }, [flyoutOpen, commitMenuPosition]);

  useEffect(() => {
    if (!flyoutOpen && typeof setMenuExpanded === "function") setMenuExpanded(false);
  }, [flyoutOpen, setMenuExpanded]);

  const handleClick = () => {
    if (flyoutOpen) {
      setFlyoutOpen(false);
      if (typeof setMenuExpanded === "function") setMenuExpanded(false);
      return;
    }
    if (typeof closeOtherFlyouts === "function") closeOtherFlyouts();
    if (typeof setMenuExpanded === "function") setMenuExpanded(false);
    commitMenuPosition();
    setFlyoutOpen(true);
  };

  return (
    <>
      <HeaderCreateButton
        open={flyoutOpen}
        onClick={handleClick}

          )}
          {isFlyoutOpen && (
            <NavItem icon={icon} label={item.name} hasChevron isExpanded={false} onClick={onToggle} collapsed={collapsed} isActive={isActive} showActiveBg={false} />
          )}
          <FlyoutMenu
            label={item.name}
            items={subItems}
            isOpen={isFlyoutOpen}
            onClose={onCloseFlyout}
            onItemClick={(sub) => onSubItemClick(sub)}
            activeSubItem={activeSubItems[item.name]}
            anchorRef={rowRef}
          />
        </>
      ) : (
        <>
          <NavItem icon={icon} label={item.name} hasChevron isExpanded={isOpen} chevronMode="up-down" onClick={onToggle} collapsed={collapsed} isActive={isActive} showActiveBg={false} />
          <SubItems items={subItems} isOpen={isOpen} activeSubItem={activeSubItems[item.name]} onSubItemClick={onSubItemClick} collapsed={collapsed} />
        </>
      )}
    </div>
  );
}

// ─── Flyout Menu for collapsed app items ───
function FlyoutMenu({ label, items, isOpen, onClose, onItemClick, activeSubItem, anchorRef, footer, onMenuPointerEnter, onMenuPointerLeave }) {
  const [pos, setPos] = useState({ top: 0, left: 0 });
  const menuRef = useRef(null);

  useEffect(() => {
    if (isOpen && anchorRef.current) {
      const r = anchorRef.current.getBoundingClientRect();
      setPos({ top: r.top, left: r.right + 4 });
    }
  }, [isOpen]);

  // Never scroll: if the menu would run off the bottom, shift it up to stay within 20px
  // of the bottom edge (grows upward instead of clipping/scrolling).
  useLayoutEffect(() => {
    if (!isOpen || !menuRef.current || !anchorRef.current) return;
    const h = menuRef.current.getBoundingClientRect().height;
    const anchorTop = anchorRef.current.getBoundingClientRect().top;
    const maxTop = Math.max(8, window.innerHeight - 20 - h);
    const next = Math.max(8, Math.min(anchorTop, maxTop));
    setPos((p) => (p.top === next ? p : { ...p, top: next }));
  }, [isOpen, items.length, label]);

  useEffect(() => {
    if (!isOpen) return;
    const handler = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target) && anchorRef.current && !anchorRef.current.contains(e.target)) {
        onClose();
      }
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [isOpen]);

  if (!isOpen) return null;

  return (
    <div ref={menuRef} onPointerEnter={onMenuPointerEnter} onPointerLeave={onMenuPointerLeave} onClick={(e) => e.stopPropagation()} style={{
      position: "fixed", top: pos.top, left: pos.left,
      backgroundColor: "white",
        borderRadius: "6px",
      border: "1px solid #BABEC5",
      boxShadow: "0 8px 32px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08)",
      zIndex: 1000, animation: "dropIn 150ms ease",
      overflow: "hidden", minWidth: 180,
    }}>
      {/* Header */}
      <div style={{
        padding: "8px 12px", borderBottom: "1px solid #eef1f3",
        fontFamily: FONT_DEMI, fontWeight: NAV_L0_FONT_WEIGHT, fontSize: NAV_L0_FONT_SIZE, color: NAV_TEXT_ACTIVE,
        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
      }}>
        <span style={{ minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{label}</span>
        {label === "Bookmarks" ? (
          <button
            type="button"
            aria-label="Open bookmarks in new window"
            onClick={() => {}}
            style={{
              border: "none",
              background: "transparent",
              padding: 0,
              margin: 0,
              width: 20,
              height: 20,
              color: NAV_TEXT_ACTIVE,
              cursor: "pointer",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              flexShrink: 0,
            }}
          >
            <OpenInNewWindowIcon size={20} />
          </button>
        ) : null}
      </div>
      {/* Items */}
      <div style={{ padding: "4px 0" }}>
        {items.map((item) => (
          <FlyoutItem key={item} label={item} isActive={activeSubItem === item} onClick={() => onItemClick(item)} />
        ))}
      </div>
      {footer ? (
        <div style={{ padding: "8px 12px" }}>
          {footer}
        </div>
      ) : null}
    </div>
  );
}

function FlyoutItem({ label, isActive, onClick, paddingLeft = 12 }) {
  const shell = useShell();
  const [hovered, setHovered] = useState(false);
  return (
    <div onClick={onClick} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
      style={{
        width: "calc(100% - 8px)",
        marginLeft: 4,
        marginRight: 4,
        borderRadius: 6,
        boxSizing: "border-box",
        padding: "6px 12px", paddingLeft, cursor: "pointer",
        backgroundColor: isActive ? shell.activeRowBg : (hovered ? shell.hoverBg : "transparent"),
        transition: "background-color 100ms ease",
      }}>
      <span style={{
        fontSize: NAV_L1_FONT_SIZE, fontWeight: NAV_L1_FONT_WEIGHT, color: isActive ? shell.navTextActive : shell.navTextInactive,
        fontFamily: FONT, lineHeight: NAV_LABEL_LINE_HEIGHT,
      }}>{label}</span>
    </div>
  );
}

function HoverNavFlyoutMenu({ isOpen, label, items, widthItems = null, fixedPos, anchorRect, onClose, onItemClick, onMenuPointerEnter, onMenuPointerLeave, onOpenBookmarksWindow, onAddBookmark, onToggleShortcut, shortcutBurstKey, sourceCollapsed = true }) {
  const shell = useShell();
  const primaryMenuRef = useRef(null);
  const secondaryMenuRef = useRef(null);
  const [resolvedTop, setResolvedTop] = useState(fixedPos.top);
  const [allAppsHoverEntry, setAllAppsHoverEntry] = useState(null);
  const [secondaryTargetTop, setSecondaryTargetTop] = useState(fixedPos.top);
  const [secondaryResolvedTop, setSecondaryResolvedTop] = useState(fixedPos.top);
  const displayLabel = label === "More apps"
    ? "All apps"
    : label;
  const isMoreAppsFlyout = label === "More apps";
  const widthSourceItems = Array.isArray(widthItems) ? widthItems : items;
  const allAppsFlyoutWidth = (() => {
    // Hug content: size the flyout to its longest label so nothing truncates, within a
    // sensible min/max. Account for padding, optional icon, indent, and the trailing
    // bookmark/chevron slot. For Reports, widthItems includes collapsed FP children so
    // expand/collapse does not change flyout width.
    let maxL1Length = 0;
    widthSourceItems.forEach((entry) => {
      const l1Label = String(entry && entry.label ? entry.label : "");
      const indentChars = (entry && entry.flyoutIndentPx ? entry.flyoutIndentPx : 0) / 7.2;
      if (l1Label.length + indentChars > maxL1Length) maxL1Length = l1Label.length + indentChars;
    });
    const hasIcon = widthSourceItems.some((e) => e && e.icon);
    const estimatedL1Width = 14 + (hasIcon ? NAV_ICON + 8 : 0) + Math.ceil(maxL1Length * 7.2) + 20 + 14;
    return Math.max(180, Math.min(360, estimatedL1Width));
  })();
  const allAppsSecondaryItems = (isMoreAppsFlyout && allAppsHoverEntry && Array.isArray(allAppsHoverEntry.children)) ? allAppsHoverEntry.children : [];
  const hasAllAppsSecondary = isMoreAppsFlyout && allAppsSecondaryItems.length > 0;
  const allAppsSecondaryWidth = (() => {
    if (!hasAllAppsSecondary) return 220;
    let maxLen = 0;
    allAppsSecondaryItems.forEach((entry) => {
      const value = String(entry && entry.label ? entry.label : "");
      if (value.length > maxLen) maxLen = value.length;
    });
    const shortcutActionWidth = IS_VARIANT_C ? 28 : 0;
    const estimated = 14 + Math.ceil(maxLen * 7.2) + 14 + 8 + shortcutActionWidth;
    return Math.max(180, Math.min(340, estimated));
  })();

  useEffect(() => {
    if (!isOpen || !isMoreAppsFlyout) {
      setAllAppsHoverEntry(null);
      return;
    }
    setAllAppsHoverEntry(null);
  }, [isOpen, isMoreAppsFlyout]);
  useEffect(() => {
    if (!isMoreAppsFlyout || !allAppsHoverEntry) return;
    const activeKey = allAppsHoverEntry.key || allAppsHoverEntry.label;
    const refreshedEntry = (items || []).find((entry) => (entry.key || entry.label) === activeKey);
    if (refreshedEntry && refreshedEntry !== allAppsHoverEntry) {
      setAllAppsHoverEntry(refreshedEntry);
    }
  }, [isMoreAppsFlyout, allAppsHoverEntry, items]);

  useEffect(() => {
    if (!isOpen) return;
    const handler = (e) => {
      const inPrimary = primaryMenuRef.current && primaryMenuRef.current.contains(e.target);
      const inSecondary = secondaryMenuRef.current && secondaryMenuRef.current.contains(e.target);
      if (!inPrimary && !inSecondary) onClose();
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [isOpen, onClose]);

  useLayoutEffect(() => {
    if (!isOpen) return;
    const nextTop = fixedPos.top;
    if (!primaryMenuRef.current) {
      setResolvedTop(nextTop);
      return;
    }
    const menuHeight = primaryMenuRef.current.getBoundingClientRect().height;
    const bottomGutter = 20;
    const maxTop = Math.max(8, window.innerHeight - bottomGutter - menuHeight);
    if (label !== "More apps" || !anchorRect) {
      setResolvedTop(Math.max(8, Math.min(nextTop, maxTop)));
      return;
    }
    const alignedTop = Math.round(anchorRect.top);
    setResolvedTop(Math.max(8, Math.min(alignedTop, maxTop)));
  }, [isOpen, fixedPos.top, label, anchorRect, items.length]);

  useLayoutEffect(() => {
    if (!hasAllAppsSecondary) return;
    if (!secondaryMenuRef.current) {
      setSecondaryResolvedTop(secondaryTargetTop);
      return;
    }
    const menuHeight = secondaryMenuRef.current.getBoundingClientRect().height;
    const bottomGutter = 20;
    const maxTop = Math.max(8, window.innerHeight - bottomGutter - menuHeight);
    setSecondaryResolvedTop(Math.max(8, Math.min(secondaryTargetTop, maxTop)));
  }, [hasAllAppsSecondary, secondaryTargetTop, allAppsSecondaryItems.length]);

  if (!isOpen) return null;

  const maxH = `min(520px, calc(100vh - ${Math.max(0, fixedPos.top || 0)}px - 16px))`;
  const primaryMenu = (
    <div
      ref={primaryMenuRef}
      onPointerEnter={onMenuPointerEnter}
      onPointerLeave={onMenuPointerLeave}
      onClick={(e) => e.stopPropagation()}
      style={{
        position: "fixed",
        left: fixedPos.left,
        top: resolvedTop,
        width: allAppsFlyoutWidth,
        maxHeight: "none",
        backgroundColor: "white",
        borderRadius: "6px",
        border: "1px solid #BABEC5",
        boxShadow: "6px 8px 24px rgba(0,0,0,0.12), 2px 2px 4px rgba(0,0,0,0.06)",
        zIndex: 2400,
        animation: "dropIn 150ms ease",
        overflow: "hidden",
        display: "flex",
        flexDirection: "column",
      }}
    >
      {/* Title only when the source item is icon-only (collapsed rail). When the
          source row already shows its label (expanded nav, or the All-apps
          submenu source), the title duplicates it, so hide it. The Bookmarks
          new-window action still shows when relevant. */}
      {(() => {
        // EXPERIMENT (B): flyout shows the L0 title only when the rail is icon-only
        // (collapsed). When the rail is expanded (icons + titles), the row already shows
        // its label, so the flyout lists L1 items only — no title. Exception: in B the
        // Bookmarks flyout always shows its title.
        const showTitle = !isMoreAppsFlyout && (sourceCollapsed || (!IS_VARIANT_C && label === "Bookmarks"));
        const showAction = label === "Bookmarks";
        if (!showTitle && !showAction) return null;
        return (
          <div style={{ padding: "12px 14px", borderBottom: "1px solid #eef1f3", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: showTitle ? "space-between" : "flex-end", gap: 8 }}>
            {showTitle ? (
              <div style={{ minWidth: 0, fontFamily: FONT_DEMI, fontWeight: NAV_L0_FONT_WEIGHT, fontSize: NAV_L0_FONT_SIZE, color: NAV_TEXT_ACTIVE, lineHeight: NAV_LABEL_LINE_HEIGHT, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                {displayLabel}
              </div>
            ) : null}
            {showAction ? (
              <button
                type="button"
                aria-label="Open bookmarks in new window"
                onClick={(event) => {
                  event.stopPropagation();
                  if (typeof onOpenBookmarksWindow === "function") onOpenBookmarksWindow();
                  if (typeof onClose === "function") onClose();
                }}
                style={{ border: "none", background: "transparent", padding: 0, margin: 0, width: 20, height: 20, color: NAV_TEXT_ACTIVE, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}
              >
                <OpenInNewWindowIcon size={20} />
              </button>
            ) : null}
          </div>
        );
      })()}
      <div style={{ padding: (label === "Bookmarks" ? "0 0 6px" : "6px 0"), overflowY: "visible", overflowX: "hidden", flex: "unset", minHeight: "auto" }}>
        {items.map((entry, entryIndex) => (
          entry.isDivider ? (
            <div key={entry.key || ("divider:" + entryIndex)} aria-hidden="true" style={{ height: 1, width: "100%", backgroundColor: "#eef1f3", margin: "6px 0" }} />
          ) : entry.isSectionTitle ? (
            <div
              key={entry.key || entry.label}
              style={{
                padding: (entryIndex === 0 ? "8px 14px 4px" : "10px 14px 4px"),
                fontFamily: FONT,
                fontWeight: NAV_L0_FONT_WEIGHT,
                fontSize: NAV_L0_FONT_SIZE,
                lineHeight: NAV_LABEL_LINE_HEIGHT,
                color: shell.navTextInactive,
                whiteSpace: "nowrap",
                overflow: "hidden",
                textOverflow: "ellipsis",
              }}
            >
              {entry.label}
            </div>
          ) : (
            <button
              key={entry.key || entry.label}
              type="button"
              onClick={() => onItemClick(entry)}
              onPointerEnter={(event) => {
                if (!isMoreAppsFlyout) return;
                if (!Array.isArray(entry.children) || entry.children.length === 0) {
                  setAllAppsHoverEntry(null);
                  return;
                }
                const rowRect = event.currentTarget.getBoundingClientRect();
                setAllAppsHoverEntry(entry);
                setSecondaryTargetTop(Math.round(rowRect.top - 6));
              }}
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                gap: 8,
                width: "100%",
                boxSizing: "border-box",
                border: "none",
                background: ((label !== "Bookmarks" && entry.isActive) || (isMoreAppsFlyout && allAppsHoverEntry && allAppsHoverEntry.label === entry.label)) ? shell.activeRowBg : "transparent",
                cursor: "pointer",
                fontFamily: FONT,
                fontSize: NAV_L1_FONT_SIZE,
                fontWeight: NAV_L1_FONT_WEIGHT,
                lineHeight: NAV_LABEL_LINE_HEIGHT,
                color: entry.isActive ? shell.navTextActive : shell.navTextInactive,
                padding: "8px 14px 8px " + (14 + (entry.flyoutIndentPx || 0)) + "px",
                textAlign: "left",
              }}
              className="profile-flyout-row-btn"
            >
              {entry.icon ? (
                <span style={{ width: NAV_ICON, height: NAV_ICON, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }} aria-hidden>
                  {entry.icon}
                </span>
              ) : null}
              <span style={{ minWidth: 0, flex: 1, textAlign: "left", overflow: "hidden" }}>
                <span style={{ display: "block", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{entry.label}</span>
              </span>
              {entry.connectionStatus ? (
                <Tooltip label={entry.connectionStatus === "down" ? "Connection down" : "Connected"} enabled={true}>
                  <span
                    role="img"
                    aria-label={entry.connectionStatus === "down" ? "Connection down" : "Connected"}
                    style={{ display: "block", width: 8, height: 8, borderRadius: "50%", flexShrink: 0, backgroundColor: entry.connectionStatus === "down" ? "#D52B1E" : "#2CA01C", cursor: "default" }}
                  />
                </Tooltip>
              ) : null}
              {isMoreAppsFlyout && Array.isArray(entry.children) && entry.children.length > 0 ? (
                <span style={{ display: "flex", flexShrink: 0, alignItems: "center", justifyContent: "center", opacity: 0.85 }} aria-hidden>
                  <span style={{ display: "block", transform: "rotate(-90deg)" }}>
                    <ChevronDownSvg size={12} color={TEXT_SECONDARY} />
                  </span>
                </span>
              ) : null}
              {entry && entry.financialPlanningParent ? (
                <span aria-hidden="true" style={{ width: NAV_ICON, height: NAV_ICON, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {entry.financialPlanningExpanded ? <ReportsUpChevronIcon /> : <ReportsDownChevronIcon />}
                </span>
              ) : null}
              {entry && entry.targetL0 && entry.targetPage && !entry.financialPlanningParent && !isMoreAppsFlyout && label !== "Bookmarks" ? (
                <span
                  role="button"
                  tabIndex={0}
                  className={"profile-flyout-shortcut-star" + (entry.isShortcut ? " profile-flyout-shortcut-star--active" : "") + (shortcutBurstKey && shortcutBurstKey === (entry.targetL0 + "::" + entry.targetPage) ? " profile-flyout-shortcut-star--burst" : "")}
                  aria-label={entry.isShortcut ? "Added to bookmarks" : "Add to bookmarks"}
                  onClick={(event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    if (typeof onToggleShortcut === "function") onToggleShortcut(entry);
                  }}
                  style={{ height: 20, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 4, cursor: "pointer", color: TEXT_PRIMARY }}
                >
                  <ShortcutsIcon active={!!entry.isShortcut} size={14} />
                </span>
              ) : null}
            </button>
          )
        ))}
        {label === "Bookmarks" ? (
          <>
            {items.some((entry) => !entry.isSectionTitle) ? (
              <div aria-hidden="true" style={{ height: 1, width: "100%", backgroundColor: "#eef1f3", marginTop: 2 }} />
            ) : null}
            <button
              type="button"
              onClick={() => { onClose(); if (typeof onAddBookmark === "function") onAddBookmark(); }}
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "flex-start",
                gap: 8,
                width: "100%",
                boxSizing: "border-box",
                border: "none",
                background: "transparent",
                cursor: "pointer",
                fontFamily: FONT,
                fontSize: 13,
                fontWeight: 400,
                lineHeight: 1.35,
                color: NAV_TEXT_INACTIVE,
                padding: "8px 14px",
                marginTop: 8,
                textAlign: "left",
              }}
              className="profile-flyout-row-btn"
            >
              <span style={{ height: NAV_ICON, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }} aria-hidden>
                <AddShortcutPlusIcon size={12} />
              </span>
              <span style={{ minWidth: 0, flex: 1, textAlign: "left", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>Add new</span>
            </button>
          </>
        ) : null}
      </div>
    </div>
  );

  const secondaryLeftBase = fixedPos.left + allAppsFlyoutWidth - 1;
  const secondaryLeft = Math.max(8, Math.min(Math.round(secondaryLeftBase), window.innerWidth - allAppsSecondaryWidth - 8));
  const secondaryMenu = hasAllAppsSecondary ? (
    <div
      ref={secondaryMenuRef}
      onPointerEnter={onMenuPointerEnter}
      onPointerLeave={onMenuPointerLeave}
      onClick={(e) => e.stopPropagation()}
      style={{
        position: "fixed",
        left: secondaryLeft,
        top: secondaryResolvedTop,
        width: allAppsSecondaryWidth,
        backgroundColor: "white",
        borderRadius: "6px",
        border: "1px solid #BABEC5",
        boxShadow: "6px 8px 24px rgba(0,0,0,0.12), 2px 2px 4px rgba(0,0,0,0.06)",
        zIndex: 2401,
        animation: "dropIn 150ms ease",
        overflow: "hidden",
      }}
    >
      {/* No title: the source row in the All-apps list already shows this label. */}
      <div style={{ padding: "6px 0" }}>
        {allAppsSecondaryItems.map((entry) => (
          <button
            key={entry.key || ((allAppsHoverEntry ? allAppsHoverEntry.label : "all-apps") + ":" + entry.label)}
            type="button"
            onClick={() => onItemClick(entry)}
            style={{
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              gap: 8,
              width: "100%",
              boxSizing: "border-box",
              border: "none",
              background: entry.isActive ? shell.activeRowBg : "transparent",
              cursor: "pointer",
              fontFamily: FONT,
              fontSize: 13,
              fontWeight: entry.isActive ? boostedWeight(500) : 400,
              lineHeight: 1.35,
              color: entry.isActive ? shell.navTextActive : shell.navTextInactive,
              padding: "8px 14px 8px " + (14 + (entry.flyoutIndentPx || 0)) + "px",
              textAlign: "left",
            }}
            className="profile-flyout-row-btn"
          >
            <span style={{ minWidth: 0, flex: 1, textAlign: "left", overflow: "hidden" }}>
              <span style={{ display: "block", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{entry.label}</span>
            </span>
            {IS_VARIANT_C && entry && entry.financialPlanningParent ? (
              <span className="profile-flyout-secondary-chevron" aria-hidden="true">
                {entry.financialPlanningExpanded ? <ReportsDownChevronIcon /> : <ReportsUpChevronIcon />}
              </span>
            ) : null}
            {entry && entry.targetL0 && entry.targetPage && !entry.financialPlanningParent ? (
              <button
                className={"profile-flyout-shortcut-star" + (entry.isShortcut ? " profile-flyout-shortcut-star--active" : "") + (shortcutBurstKey && shortcutBurstKey === (entry.targetL0 + "::" + entry.targetPage) ? " profile-flyout-shortcut-star--burst" : "")}
                type="button"
                aria-label={entry.isShortcut ? "Added to bookmarks" : "Add to bookmarks"}
                onClick={(event) => {
                  event.preventDefault();
                  event.stopPropagation();
                  if (typeof onToggleShortcut === "function") onToggleShortcut(entry);
                }}
                style={{
                  height: 20,
                  border: "none",
                  borderRadius: 4,
                  background: "transparent",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  padding: 0,
                  margin: 0,
                  cursor: "pointer",
                  flexShrink: 0,
                }}
              >
                <ShortcutsIcon active={!!entry.isShortcut} size={14} />
              </button>
            ) : null}
          </button>
        ))}
      </div>
    </div>
  ) : null;

  if (typeof ReactDOM.createPortal === "function") {
    return ReactDOM.createPortal(
      <>
        {primaryMenu}
        {secondaryMenu}
      </>,
      document.body
    );
  }
  return (
    <>
      {primaryMenu}
      {secondaryMenu}
    </>
  );
}

      return true;

      const pageName = path.slice(splitIndex + 1);
      if (APP_L0_NAMES.includes(appName) && pageName) {

<div id="passkey-gate" role="dialog" aria-modal="true" aria-label="Enter passkey">
  <style>
    #passkey-gate {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(244, 247, 249, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-family: "Avenir Next", "Avenir Next forINTUIT", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      transition: opacity 220ms ease, visibility 220ms ease;
    }
    #passkey-gate.passkey-gate--hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .passkey-gate-card {
      background: #fff;
      border: 1px solid #d5dee3;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(43, 49, 53, 0.12);
      padding: 28px 32px 24px;
      text-align: center;
      min-width: 280px;
    }
    .passkey-gate-title {
      font-size: 16px;
      font-weight: 500;
      color: #2B3135;
      line-height: 1.4;
      margin: 0 0 20px;
    }
    .passkey-gate-fields {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .passkey-gate-digit {
      width: 44px;
      height: 52px;
      border: 1px solid #babec5;
      border-radius: 8px;
      font-size: 22px;
      font-weight: 500;
      text-align: center;
      color: #2B3135;
      background: #fff;
      outline: none;
      caret-color: #16587A;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .passkey-gate-digit:focus {
      border-color: rgba(22, 88, 122, 0.75);
      box-shadow: 0 0 0 3px rgba(22, 88, 122, 0.16);
    }
    .passkey-gate-digit.passkey-gate-digit--error {
      border-color: #c0392b;
      box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.12);
    }
    .passkey-gate-error {
      min-height: 20px;
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
      color: #c0392b;
      visibility: hidden;
    }
    .passkey-gate-error.passkey-gate-error--visible {
      visibility: visible;
    }
  </style>
  <div class="passkey-gate-card">
    <p class="passkey-gate-title">Enter passkey to continue</p>
    <div class="passkey-gate-fields" id="passkey-fields">
      <input class="passkey-gate-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 1" data-index="0" />
      <input class="passkey-gate-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 2" data-index="1" />
      <input class="passkey-gate-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 3" data-index="2" />
      <input class="passkey-gate-digit" type="password" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 4" data-index="3" />
    </div>
    <p class="passkey-gate-error" id="passkey-error" aria-live="polite">Wrong passkey</p>
  </div>
</div>
<script>
(function () {
  var STORAGE_KEY = "nav_proto_passkey_ok";
  var REDIRECT = "";
  function todayPasskey() {
    var now = new Date();
    var month = now.getMonth() + 1;
    var day = now.getDate();
    return (month < 10 ? "0" : "") + month + (day < 10 ? "0" : "") + day;
  }
  function expectedPasskey() { return todayPasskey(); }
  function isUnlockedForToday() {
    try { return sessionStorage.getItem(STORAGE_KEY) === todayPasskey(); } catch (e) { return false; }
  }
  var gate = document.getElementById("passkey-gate");
  var inputs = Array.prototype.slice.call(document.querySelectorAll(".passkey-gate-digit"));
  var errorEl = document.getElementById("passkey-error");

  function unlock() {
    try { sessionStorage.setItem(STORAGE_KEY, expectedPasskey()); } catch (e) {}
    gate.classList.add("passkey-gate--hidden");
    setTimeout(function () {
      if (gate && gate.parentNode) gate.parentNode.removeChild(gate);
      if (REDIRECT) window.location.replace(REDIRECT);
    }, 240);
  }

  if (isUnlockedForToday()) {
    if (REDIRECT) { window.location.replace(REDIRECT); return; }
    if (gate && gate.parentNode) gate.parentNode.removeChild(gate);
    return;
  }

  function clearError() {
    errorEl.classList.remove("passkey-gate-error--visible");
    inputs.forEach(function (input) { input.classList.remove("passkey-gate-digit--error"); });
  }

  function showError() {
    errorEl.classList.add("passkey-gate-error--visible");
    inputs.forEach(function (input) {
      input.classList.add("passkey-gate-digit--error");
      input.value = "";
    });
    inputs[0].focus();
  }

  function readValue() {
    return inputs.map(function (input) { return input.value; }).join("");
  }

  function checkComplete() {
    var value = readValue();
    if (value.length < 4) return;
    if (value === expectedPasskey()) {
      unlock();
    } else {
      showError();
    }
  }

  inputs.forEach(function (input, index) {
    input.addEventListener("input", function () {
      clearError();
      var digit = input.value.replace(/\D/g, "").slice(-1);
      input.value = digit;
      if (digit && index < inputs.length - 1) inputs[index + 1].focus();
      if (digit) checkComplete();
    });

    input.addEventListener("keydown", function (event) {
      if (event.key === "Backspace" && !input.value && index > 0) {
        inputs[index - 1].focus();
        inputs[index - 1].value = "";
        clearError();
      }
    });

    input.addEventListener("paste", function (event) {
      event.preventDefault();
      var pasted = (event.clipboardData || window.clipboardData).getData("text").replace(/\D/g, "").slice(0, 4);
      if (!pasted) return;
      pasted.split("").forEach(function (ch, i) {
        if (inputs[i]) inputs[i].value = ch;
      });
      if (pasted.length === 4) checkComplete();
      else if (inputs[pasted.length]) inputs[pasted.length].focus();
    });
  });

  inputs[0].focus();
})();
</script>
